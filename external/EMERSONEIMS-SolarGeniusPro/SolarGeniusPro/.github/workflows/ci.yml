name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Backend Jest tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crc
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crc/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Jest test suites
        run: npx jest tests --no-coverage

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: false

  e2e:
    name: End-to-end (live backend smoke)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: crc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crc/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Boot backend
        run: |
          node server/index.js &
          echo $! > backend.pid
          sleep 5
      - name: Run e2e smoke
        run: npx jest tests/engineering-global.e2e.test.js --no-coverage --runInBand
      - name: Stop backend
        if: always()
        run: kill $(cat backend.pid) || true
