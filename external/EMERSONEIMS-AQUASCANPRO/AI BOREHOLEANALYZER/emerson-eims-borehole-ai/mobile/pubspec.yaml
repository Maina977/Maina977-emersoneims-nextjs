name: borehole_ai
description: AI Borehole Analyzer Mobile App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  image_picker: ^1.0.4
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  flutter_dotenv: ^5.1.0
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.2
  camera: ^0.10.5+5
  sqflite: ^2.3.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/