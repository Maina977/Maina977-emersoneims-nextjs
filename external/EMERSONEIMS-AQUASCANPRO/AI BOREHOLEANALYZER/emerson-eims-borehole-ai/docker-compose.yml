version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/borehole_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    networks:
      - borehole-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - borehole-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=borehole_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - borehole-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - borehole-network

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/borehole_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - backend
      - redis
      - db
    volumes:
      - ./backend:/app
    networks:
      - borehole-network

  celery_beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/borehole_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - db
    volumes:
      - ./backend:/app
    networks:
      - borehole-network

volumes:
  postgres_data:

networks:
  borehole-network:
    driver: bridge