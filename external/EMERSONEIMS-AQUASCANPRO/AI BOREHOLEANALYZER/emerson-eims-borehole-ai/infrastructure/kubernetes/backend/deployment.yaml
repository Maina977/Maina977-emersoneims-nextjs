apiVersion: apps/v1
kind: Deployment
metadata:
  name: borehole-backend
  namespace: borehole-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: borehole-backend
  template:
    metadata:
      labels:
        app: borehole-backend
    spec:
      containers:
      - name: backend
        image: borehole-ai/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: borehole-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: borehole-secrets
              key: redis-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: borehole-backend-service
  namespace: borehole-ai
spec:
  selector:
    app: borehole-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer