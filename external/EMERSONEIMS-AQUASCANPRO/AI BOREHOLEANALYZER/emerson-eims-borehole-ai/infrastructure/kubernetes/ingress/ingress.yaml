apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: borehole-ingress
  namespace: borehole-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.borehole-ai.com
    - app.borehole-ai.com
    secretName: borehole-tls
  rules:
  - host: api.borehole-ai.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: borehole-backend-service
            port:
              number: 8000
  - host: app.borehole-ai.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: borehole-frontend-service
            port:
              number: 80