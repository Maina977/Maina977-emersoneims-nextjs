openapi: 3.0.0
info:
  title: Borehole AI API
  version: 1.0.0
  description: AI-powered borehole site analysis API

paths:
  /api/v1/analysis/analyze:
    post:
      summary: Analyze terrain image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Analysis results
          content:
            application/json:
              schema:
                type: object
                properties:
                  probability:
                    type: number
                  recommended_depth:
                    type: number
                  estimated_yield:
                    type: number

  /api/v1/auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful