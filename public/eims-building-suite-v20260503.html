function _repProjectSlug(){
    const name = (document.getElementById('rp-name')?.value || 'EIMS-Report').trim();
    const stamp = new Date().toISOString().slice(0,10);
    return name.replace(/[^A-Za-z0-9_\-]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60) + '_' + stamp;
}

function _repTriggerDownload(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

/* ========= Paystack — full report / quotation unlock (server-verified) ========= */
if(typeof window._repPaywallState==='undefined') window._repPaywallState = { unlocked:false, enabled:false, pollTimer:null };

async function repFetchPaywallConfig(){
  try{
    const r = await fetch(API+'/api/pay/report-unlock/config', {credentials:'same-origin'});
    const j = await r.json();
    return j && j.success ? j : { success:false, enabled:false };
  }catch(_e){ return { success:false, enabled:false }; }
}

async function repSyncReportUnlockSession(){
  try{
    const r = await fetch(API+'/api/pay/report-unlock/session', {credentials:'same-origin'});
    const j = await r.json();
    if(j && j.unlocked){
      window._repPaywallState.unlocked = true;
      repRemoveReportPaywall();
    }
  }catch(_e){}
}

function repRemoveReportPaywall(){
  const body = document.getElementById('rep-body');
  if(!body) return;
  body.style.maxHeight = '';
  body.style.overflow = '';
  body.style.position = '';
  const ov = document.getElementById('rep-paywall-overlay');
  if(ov) ov.remove();
  window._repPaywallState.unlocked = true;
}

async function repApplyReportPaywallIfNeeded(){
  if(!window._repPaywallState) window._repPaywallState = { unlocked:false, enabled:false, pollTimer:null };
  const cfg = await repFetchPaywallConfig();
  window._repPaywallState.enabled = !!cfg.enabled;
  if(!cfg.enabled){
    repRemoveReportPaywall();
    return;
  }
  await repSyncReportUnlockSession();
  if(window._repPaywallState.unlocked){
    repRemoveReportPaywall();
    return;
  }
  const body = document.getElementById('rep-body');
  if(!body) return;
  const fullH = body.scrollHeight;
  if(fullH < 120) return;
  const clipH = Math.max(360, Math.floor(fullH * 0.7));
  body.style.position = 'relative';
  body.style.maxHeight = clipH + 'px';
  body.style.overflow = 'hidden';
  const existing = document.getElementById('rep-paywall-overlay');
  if(existing) existing.remove();
  const amt = cfg.amount_usd != null ? cfg.amount_usd : 50;
  const cur = (cfg.currency || 'USD').toUpperCase();
  body.insertAdjacentHTML('beforeend',
    `<div id="rep-paywall-overlay" style="position:absolute;left:0;right:0;bottom:0;height:42%;min-height:150px;background:linear-gradient(to bottom,rgba(255,255,255,0),#eceff1 35%,#fff 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px 14px 28px;box-sizing:border-box;z-index:20">
      <div style="text-align:center;max-width:440px;background:#0d47a1;color:#fff;padding:16px 18px;border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.22)">
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">Unlock the full report &amp; quotation</div>
        <div style="font-size:12px;opacity:.95;margin-bottom:12px;line-height:1.45">You are viewing an extended preview (about 70%). Pay <strong>${cur} ${amt}</strong> once for full download, export, and print.</div>
        <button type="button" onclick="repStartReportPayment()" style="background:#ff9800;color:#1a1a1a;border:0;padding:10px 22px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px">Pay securely (Paystack)</button>
        <div style="font-size:10px;margin-top:10px;opacity:.88">After payment we verify on the server, then unlock this page automatically (you can keep this tab open).</div>
      </div>
    </div>`);
}

function repStartReportPayment(){
  (async()=>{
    let em = (document.getElementById('rp-client')?.value || '').trim();
    if(!em || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){
      alert('Please enter a valid email in the Client field — Paystack needs it for the receipt.');
      return;
    }
    const cfg = await repFetchPaywallConfig();
    if(!cfg.enabled){ alert('Online payments are not enabled on this server yet.'); return; }
    try{
      const bare = window.location.href.split('#')[0].split('?')[0];
      const r = await fetch(API+'/api/pay/report-unlock/init', {
        method:'POST', credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: em, callback_url: bare })
      });
      const j = await r.json();
      if(!j.success || !j.authorization_url){
        alert((j && (j.error||j.message)) ? String(j.error||j.message) : 'Could not start checkout.');
        return;
      }
      sessionStorage.setItem('eims_rep_lock_id', j.lock_id);
      window.open(j.authorization_url, '_blank', 'noopener,noreferrer');
      if(window._repPaywallState.pollTimer) clearInterval(window._repPaywallState.pollTimer);
      window._repPaywallState.pollTimer = setInterval(repPollReportUnlockStatus, 2800);
    }catch(e){ alert('Payment error: '+(e.message||e)); }
  })();
}

async function repPollReportUnlockStatus(){
  const lock = sessionStorage.getItem('eims_rep_lock_id');
  if(!lock) return;
  try{
    const r = await fetch(API+`/api/pay/report-unlock/status?lock_id=${encodeURIComponent(lock)}`, {credentials:'same-origin'});
    const j = await r.json();
    if(j && j.paid){
      await fetch(API+'/api/pay/report-unlock/activate', { method:'POST', credentials:'same-origin',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify({ lock_id: lock }) });
      await repSyncReportUnlockSession();
      if(window._repPaywallState.pollTimer){ clearInterval(window._repPaywallState.pollTimer); window._repPaywallState.pollTimer = null; }
    }
  }catch(_e){}
}

function repCheckPaystackReturn(){
  const u = new URL(window.location.href);
  const ref = u.searchParams.get('reference') || u.searchParams.get('trxref');
  if(!ref) return;
  fetch(API+`/api/pay/report-unlock/verify-callback?reference=${encodeURIComponent(ref)}`, {credentials:'same-origin'})
    .then(r=>r.json()).then(j=>{
      if(j && j.success && j.paid){
        if(j.lock_id) sessionStorage.setItem('eims_rep_lock_id', j.lock_id);
        repSyncReportUnlockSession().then(()=>{
          try{
            u.searchParams.delete('reference'); u.searchParams.delete('trxref');
            history.replaceState({}, '', u.pathname + u.search + u.hash);
          }catch(_e){}
        });
      }
    }).catch(()=>{});
}

async function repReportExportBlocked(){
  const cfg = await repFetchPaywallConfig();
  if(!cfg.enabled) return false;
  await repSyncReportUnlockSession();
  if(window._repPaywallState.unlocked) return false;
  const amt = cfg.amount_usd != null ? cfg.amount_usd : 50;
  const cur = (cfg.currency || 'USD').toUpperCase();
  alert(`Full export requires unlocking the complete report (${cur} ${amt}). Use the Paystack button at the bottom of the preview.`);
  try{ document.getElementById('rep-paywall-overlay')?.scrollIntoView({behavior:'smooth',block:'center'}); }catch(_e){}
  return true;
}

function repRecalcQuote(){
    const sym = window._repData?.quote?.symbol || (window._repData?.params?.currency || 'USD');
    const fmt = (n) => (n==null||isNaN(n)) ? '-' : Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
    const overrides = window._repOverrides || (window._repOverrides = {});
    const tradeSubs = {};
    document.querySelectorAll('tr[data-okey]').forEach(tr => {
        const okey = decodeURIComponent(tr.dataset.okey);
        const trade = decodeURIComponent(tr.dataset.trade);
        const qty = parseFloat(tr.dataset.qty)||0;
        const auto = parseFloat(tr.dataset.auto)||0;
        const inp = tr.querySelector('input.qs-rate');
        const mark = tr.querySelector('.qs-edit-mark');
        const rate = parseFloat(inp.value)||0;
        const amount = rate * qty;
        const edited = Math.abs(rate - auto) > 0.005;
        if(edited){ overrides[okey] = rate; }
        else { delete overrides[okey]; }
        inp.style.background = edited ? '#fff8e1' : '#fff';
        inp.style.borderColor = edited ? '#f9a825' : '#ddd';
        inp.parentElement.style.background = edited ? '#fff8e1' : 'transparent';
        if(mark) mark.style.display = edited ? 'inline' : 'none';
        const amtCell = tr.querySelector('.qs-amount');
        if(amtCell) amtCell.textContent = `${sym} ${fmt(amount)}`;
        tradeSubs[trade] = (tradeSubs[trade]||0) + amount;
    });
    // Update trade subtotals
    Object.entries(tradeSubs).forEach(([t,sub]) => {
        document.querySelectorAll(`.qs-trade-sub[data-trade="${t}"]`).forEach(el => {
            el.textContent = fmt(sub);
        });
    });
    // Recompute Cost Summary using same proportions as the original quote.cost_summary
    const cs = window._repData?.quote?.cost_summary;
    if(cs){
        const works = Object.values(tradeSubs).reduce((a,b)=>a+b, 0);
        const orig  = cs.subtotal?.local || works || 1;
        const k = works / orig;          // scale factor vs original auto-calc subtotal
        const apply = (v) => (v==null) ? null : v * k;
        const newRows = [
            ['Material Cost',     apply(cs.material_cost?.local)],
            ['Labor Cost',        apply(cs.labor_cost?.local)],
            ['Equipment',         apply(cs.equipment_cost?.local)],
            ['Overhead',          apply(cs.overhead?.local)],
            ['Contingency',       apply(cs.contingency?.local)],
            ['Subtotal',          works],
            ['Contractor Profit', apply(cs.contractor_profit?.local)],
            ['Gross Total',       apply(cs.gross_total?.local)],
        ];
        if(cs.discount?.percentage>0) newRows.push([`Discount (${cs.discount.percentage}%)`, -apply(cs.discount?.local)]);
        if(cs.vat?.rate>0)            newRows.push([`VAT (${cs.vat.rate}%)`,                  apply(cs.vat?.local)]);
        const grand = apply(cs.grand_total?.local) || (works * (cs.grand_total?.local / orig));
        const tbl = document.getElementById('qsCostSummary');
        if(tbl){
            tbl.innerHTML = newRows.map(([l,v])=>`<tr><td style=\"padding:5px 8px;border-bottom:1px solid #eee\">${l}</td><td style=\"padding:5px 8px;border-bottom:1px solid #eee;text-align:right\">${sym} ${fmt(v)}</td></tr>`).join('') +
              `<tr style=\"background:#1b5e20;color:#fff;font-weight:bold;font-size:14px\"><td style=\"padding:10px 8px\">GRAND TOTAL</td><td style=\"padding:10px 8px;text-align:right\" id=\"qsGrandTotal\">${sym} ${fmt(grand)}</td></tr>`;
        }
    }
    const st = document.getElementById('repOvrStatus');
    const n = Object.keys(overrides).length;
    if(st) st.textContent = n ? `${n} rate edit(s) — not yet saved` : '';
    st && (st.style.color = n ? '#e65100' : '#1b5e20');
    localStorage.setItem('eims_quote_overrides', JSON.stringify(overrides));
}

async function repSaveOverrides(){
    const overrides = window._repOverrides || {};
    // Re-key each override under both "trade|desc" AND bare description so the
    // backend's build_boq lookup (which falls back to description-only) can
    // match either form regardless of trade label drift.
    const payload = {};
    Object.entries(overrides).forEach(([k, v]) => {
        payload[k] = v;
        const desc = k.includes('|') ? k.split('|').slice(1).join('|') : k;
        payload[desc] = v;
    });
    const st = document.getElementById('repOvrStatus');
    if(st){ st.textContent = 'Saving…'; st.style.color = '#0d47a1'; }
    try {
        const r = await fetch('/api/project/price-overrides', {
            method:'POST', credentials:'same-origin',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({overrides: payload}),
        });
        const j = await r.json();
        if(!r.ok) throw new Error(j.error || ('HTTP '+r.status));
        if(st){ st.textContent = `\u2705 Saved ${j.updated} edit(s) — re-export PDF to apply`; st.style.color = '#1b5e20'; }
    } catch(e){
        if(st){ st.textContent = '\u26a0\ufe0f Save failed: ' + e.message; st.style.color = '#c62828'; }
    }
}

async function repResetOverrides(){
    if(!confirm('Reset all rate overrides back to auto-calculated KQS-2025 values?')) return;
    window._repOverrides = {};
    localStorage.removeItem('eims_quote_overrides');
    try {
        await fetch('/api/project/price-overrides', {
            method:'DELETE', credentials:'same-origin'
        });
    } catch(_e){}
    // Restore inputs to data-auto values, then recompute
    document.querySelectorAll('tr[data-okey]').forEach(tr => {
        const auto = parseFloat(tr.dataset.auto)||0;
        const inp = tr.querySelector('input.qs-rate');
        if(inp) inp.value = auto;
    });
    repRecalcQuote();
    const st = document.getElementById('repOvrStatus');
    if(st){ st.textContent = '\u21bb Reset to defaults'; st.style.color = '#1b5e20'; }
}

async function repDownloadPDF(){
    // Server-side PDF: requires session seeded via /api/generate first, then GET /api/export/pdf
    const btns = document.querySelectorAll('#rep-toolbar button');
    btns.forEach(b => b.disabled = true);
    try {
        const p = window._repData?.params || {
            area: parseFloat(document.getElementById('rp-area')?.value || 220),
            stories: parseInt(document.getElementById('rp-stories')?.value || 1),
            units: parseInt(document.getElementById('rp-units')?.value || 1),
            bedrooms: parseInt(document.getElementById('rp-beds')?.value || 4),
            location: document.getElementById('rp-loc')?.value || '',
            currency: document.getElementById('rp-cur')?.value || 'USD',
            style: document.getElementById('rp-style')?.value || 'modern',
            client_name: document.getElementById('rp-client')?.value || '',
            project_name: document.getElementById('rp-name')?.value || 'EIMS Report'
        };
        // Seed session so /api/export/pdf has project state to render
        await fetch('/api/generate', {
            method:'POST', credentials:'same-origin',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(p)
        }).catch(()=>{});
        // Re-bind QS rate overrides AFTER /api/generate (which recreates the
        // project record).  Without this, the printed BOQ silently reverts to
        // auto-calculated rates.
        const overrides = window._repOverrides || JSON.parse(localStorage.getItem('eims_quote_overrides')||'{}');
        if(overrides && Object.keys(overrides).length){
            const payload = {};
            Object.entries(overrides).forEach(([k, v]) => {
                payload[k] = v;
                const desc = k.includes('|') ? k.split('|').slice(1).join('|') : k;
                payload[desc] = v;
            });
            await fetch('/api/project/price-overrides', {
                method:'POST', credentials:'same-origin',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({overrides: payload}),
            }).catch(()=>{});
        }
        const r = await fetch('/api/export/pdf', { credentials:'same-origin' });
        if(r.status === 402){
            let msg = 'Full PDF export requires completing the report unlock payment.';
            try{ const ej = await r.clone().json(); if(ej && ej.message) msg = String(ej.message); }catch(_x){}
            alert(msg);
            return;
        }
        if(!r.ok) throw new Error('PDF endpoint returned HTTP ' + r.status);
        const ct = r.headers.get('Content-Type') || '';
        const blob = await r.blob();
        if(ct.includes('application/pdf') || blob.size > 1000){
            _repTriggerDownload(blob, _repProjectSlug() + '.pdf');
        } else {
            throw new Error('PDF endpoint did not return a PDF (got ' + ct + ')');
        }
    } catch(e){
        console.warn('Server PDF failed, using browser print fallback:', e);
        if(confirm('Server-side PDF unavailable (' + e.message + ').\n\nUse the browser "Save as PDF" dialog instead?')){
            repPrint();
        }
    } finally {
        btns.forEach(b => b.disabled = false);
    }
}

function repPrint(){
    // Hide the toolbar during print, then trigger browser's native print dialog
    const tb = document.getElementById('rep-toolbar');
    if(tb) tb.style.display='none';
    const css = document.createElement('style');
    css.id = 'rep-print-css';
    css.textContent = '@media print { body{margin:0} #rep-root{box-shadow:none} section{page-break-inside:avoid !important} .mode-tab,#topbar,.sidebar{display:none !important} }';
    document.head.appendChild(css);
    setTimeout(()=>{
        window.print();
        if(tb) tb.style.display='';
        const c = document.getElementById('rep-print-css'); if(c) c.remove();
    }, 200);
}

    for(let ck in catalog){for(let it of catalog[ck].items){if(it.id===id)return it;}}

}

function initThreeScene(el,tag){
    scene3d=new THREE.Scene();
    scene3d.background=new THREE.Color(0x060818);
    scene3d.fog=new THREE.FogExp2(0x060818,0.008);
    cam3d=new THREE.PerspectiveCamera(45,el.clientWidth/el.clientHeight,0.1,500);
    cam3d.position.set(25,20,30);
    ren3d=new THREE.WebGLRenderer({antialias:true});
    ren3d.setSize(el.clientWidth,el.clientHeight);
    ren3d.shadowMap.enabled=true;
    ren3d.shadowMap.type=THREE.PCFSoftShadowMap;
    el.insertBefore(ren3d.domElement,el.firstChild);

    scene3d.add(new THREE.AmbientLight(0xffffff,0.35));
    let dir=new THREE.DirectionalLight(0xffffff,0.8);dir.position.set(20,25,15);dir.castShadow=true;dir.shadow.mapSize.set(2048,2048);scene3d.add(dir);
    scene3d.add(new THREE.DirectionalLight(0x6688ff,0.25).translateX(-10).translateY(10));
    scene3d.add(new THREE.HemisphereLight(0x87ceeb,0x362d25,0.2));

    let gnd=new THREE.Mesh(new THREE.PlaneGeometry(120,120),new THREE.MeshStandardMaterial({color:0x1a3a1a,roughness:0.95}));
    gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene3d.add(gnd);
    scene3d.add(new THREE.GridHelper(120,120,0x222244,0x111133));

    meshes3d=[];rotX=0.5;rotY=0.5;dist=40;autoRot=false;wireM=false;

    el.onmousedown=e=>{dragV=true;prevMX=e.clientX;prevMY=e.clientY;};
    el.onmouseup=()=>dragV=false;
    el.onmouseleave=()=>dragV=false;
    el.onmousemove=e=>{if(!dragV)return;rotY+=(e.clientX-prevMX)*0.008;rotX+=(e.clientY-prevMY)*0.008;rotX=Math.max(0.05,Math.min(1.5,rotX));prevMX=e.clientX;prevMY=e.clientY;};
    el.onwheel=e=>{dist=Math.max(5,Math.min(120,dist+e.deltaY*0.05));e.preventDefault();};

    (function animate(){requestAnimationFrame(animate);if(autoRot)rotY+=0.004;
        let tx=0,ty=4,tz=0;
        cam3d.position.set(tx+dist*Math.sin(rotY)*Math.cos(rotX),ty+dist*Math.sin(rotX),tz+dist*Math.cos(rotY)*Math.cos(rotX));
        cam3d.lookAt(tx,ty,tz);
        ren3d.render(scene3d,cam3d);
    })();
}

function updateBuildPreview(){
    if(!scene3d)return;
    meshes3d.forEach(m=>scene3d.remove(m));meshes3d=[];
    // Ground slab
    addMesh({type:'box',position:[0,-0.15,0],size:[40,0.3,30],color:'#1a1a2e'},'Foundation');
    // Grid on ground
    placed.forEach(p=>{
        let comp=findComp(p.id);if(!comp)return;
        let w=comp.w*(p.scale_w||1),d=comp.d*(p.scale_d||1),h=comp.h>0?comp.h:3;
        let y=p.floor*3+h/2;
        addMesh({type:'box',position:[p.x+w/2,y,p.z+d/2],size:[w,h,d],color:comp.color,transparent:comp.transparent,material:comp.transparent?'glass':'wall'},comp.name);
        // Floor surface
        if(h>=2)addMesh({type:'box',position:[p.x+w/2,p.floor*3+0.01,p.z+d/2],size:[w-0.02,0.02,d-0.02],color:'#3e2723'},'floor');
    });
    let info=document.getElementById('bV3info');if(info)info.textContent='Components: '+placed.length;
}

function addMesh(obj,name){
    let geo;
    if(obj.type==='cylinder'){
        let r=Math.max(obj.size[0],obj.size[2])/2;
        geo=new THREE.CylinderGeometry(r,r,obj.size[1],16);
    }else if(obj.type==='sphere'){
        let r=Math.max(obj.size[0],obj.size[1],obj.size[2])/2;
        geo=new THREE.SphereGeometry(r,12,12);
    }else if(obj.type==='pyramid'){
        geo=new THREE.ConeGeometry(Math.max(obj.size[0],obj.size[2])/2,obj.size[1],4);
    }else if(obj.type==='hemisphere'){
        let r=Math.max(obj.size[0],obj.size[2])/2;
        geo=new THREE.SphereGeometry(r,12,12,0,Math.PI*2,0,Math.PI/2);
    }else{
        geo=new THREE.BoxGeometry(obj.size[0],obj.size[1],obj.size[2]);
    }
    let mat=new THREE.MeshStandardMaterial({color:obj.color,roughness:obj.material==='glass'?0.1:0.75,metalness:obj.material==='glass'?0.8:0.05,transparent:!!obj.transparent,opacity:obj.transparent?0.35:1,wireframe:wireM});
    let mesh=new THREE.Mesh(geo,mat);mesh.position.set(obj.position[0],obj.position[1],obj.position[2]);
    if(obj.rotation){mesh.rotation.x=(obj.rotation.x||0)*Math.PI/180;mesh.rotation.y=(obj.rotation.y||0)*Math.PI/180;mesh.rotation.z=(obj.rotation.z||0)*Math.PI/180;}
    mesh.castShadow=true;mesh.receiveShadow=true;mesh.userData={name:name};
    scene3d.add(mesh);meshes3d.push(mesh);
}

function resetBCam(){dist=40;rotX=0.5;rotY=0.5;}
function toggleBWire(){wireM=!wireM;meshes3d.forEach(m=>m.material.wireframe=wireM);}
function toggleBRot(){autoRot=!autoRot;}

async function buildHouse(){
    if(!placed.length)return alert('Add components first');
    try{
        let r=await fetch(API+'/components/build-house',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({components:placed,stories:Math.max(...placed.map(p=>p.floor))+1,style:gv('p4_style')||'modern'})});
        let d=await r.json();
        if(d.success){
            meshes3d.forEach(m=>scene3d.remove(m));meshes3d=[];
            d.model.objects.forEach(o=>addMesh(o,o.name));
            let info=document.getElementById('bV3info');if(info)info.textContent='Built: '+d.stats.objects+' objects from '+d.stats.components_placed+' components';
        }
    }catch(e){alert('Server unavailable');}
}

/* ============ DRAWING ENGINE ============ */
async function loadDraw(type,params){
    let vp=document.getElementById('drawVP');if(!vp)return;
    vp.innerHTML='<div style="padding:30px"><div class="spinner"></div></div>';
    let body=Object.assign({units:+gv('p4_units')||3,bedrooms:+gv('p4_beds')||3,area:+gv('p1_area')||450,stories:+gv('p2_stories')||2,style:gv('p4_style')||'modern',location:gv('p1_location')||'',foundation_type:'strip'},params||{});
    let url=API+'/drawings/'+type;
    try{
        let r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        let text=await r.text();
        let d;
        try{ d=JSON.parse(text); }catch(_){
            vp.innerHTML='<div style="padding:20px;color:#ef5350;font:12px monospace">HTTP '+r.status+' '+r.statusText+' — response was not JSON:<br><br>'+text.substring(0,400).replace(/</g,'&lt;')+'</div>';
            return;
        }
        if(d.success){ currentSVG=d.svg; vp.innerHTML=d.svg; }
        else {
            vp.innerHTML='<div style="padding:20px;color:#ef5350;font:12px monospace">HTTP '+r.status+': '+(d.error||d.message||'unknown error')+'</div>';
        }
    }catch(e){
        // Actual network / CORS / DNS failure — distinguish from backend error
        vp.innerHTML='<div style="padding:20px;color:#ef5350;font:12px monospace">Request failed:<br>'+
            '<b>'+type+'</b> → '+url+'<br>'+
            (e.message||e)+'<br><br>'+
            '<span style="color:#7986cb">Check the Flask server is running on this origin. If opened via a different host (LAN, tunnel), clear browser cache and reload.</span></div>';
    }
}

/* ============ 3D GENERATION ============ */
async function genFull3D(){
    if(!scene3d)return;
    // Prefer the BIM-driven 3D when a project's BIM model is available
    // (closes the bi-directional loop: edits in BIM Studio show up here).
    // Fall back to the legacy params-driven endpoint otherwise.
    const pid = (typeof currentProjectId === 'string' && currentProjectId)
                  || (window.dgState && dgState.projectId)
                  || (window.bimState && bimState.projectId) || '';
    const useBIM = !!pid;
    const url = useBIM ? API+'/bim/3d-model' : API+'/drawings/3d-model';
    const body = useBIM ? {project_id: pid}
        : {units:+gv('p4_units')||3,stories:+gv('p2_stories')||2,
           area:+gv('p1_area')||450,style:gv('p4_style')||'modern'};
    try{
        let r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        let d=await r.json();
        if(d.success){
            meshes3d.forEach(m=>scene3d.remove(m));meshes3d=[];
            // Centre the BIM model on origin (legacy already centres internally)
            if (useBIM && d.model.objects && d.model.objects.length){
                const xs=[],zs=[];
                d.model.objects.forEach(o => { xs.push(o.position[0]); zs.push(o.position[2]); });
                const cx=(Math.min(...xs)+Math.max(...xs))/2, cz=(Math.min(...zs)+Math.max(...zs))/2;
                d.model.objects.forEach(o => { o.position[0]-=cx; o.position[2]-=cz; });
            }
            d.model.objects.forEach(o=>addMesh(o,o.name));
            let info=document.getElementById('fV3info')||document.getElementById('bV3info');
            if(info){
                const tag = useBIM ? '· BIM-driven' : '· params-driven';
                info.textContent=d.stats.objects+' objects | '+(d.stats.style||'?')+' | '+d.stats.storeys+' storey(s) '+tag;
            }
        }
    }catch(e){}
}

async function validateIFC(){
    let out=document.getElementById('bimOut');if(!out)return;
    if(!D._ifc){out.innerHTML='<div style="color:#ef5350;font-size:11px">Generate IFC first before validating.</div>';return;}
    out.innerHTML='<div class="spinner"></div>';
    let ifc=D._ifc;
    let checks=[];
    // Schema check
    let hasHeader=ifc.includes('FILE_SCHEMA');
    let schema=ifc.includes('IFC2X3')?'IFC2X3':ifc.includes('IFC4')?'IFC4':'UNKNOWN';
    checks.push({name:'Schema',pass:hasHeader&&schema!=='UNKNOWN',detail:schema});
    // Required entities
    let reqEntities=['IFCPROJECT','IFCSITE','IFCBUILDING','IFCBUILDINGSTOREY','IFCWALL'];
    let missingE=reqEntities.filter(e=>!ifc.includes(e));
    checks.push({name:'Hierarchy',pass:missingE.length===0,detail:missingE.length?'Missing: '+missingE.join(', '):'All required entities present'});
    // Geometry check
    let hasGeom=ifc.includes('IFCEXTRUDEDAREASOLID')||ifc.includes('IFCRECTANGLEPROFILEDEF');
    checks.push({name:'Geometry',pass:hasGeom,detail:hasGeom?'Extruded solids found':'No geometry definitions'});
    // Property sets
    let hasPsets=ifc.includes('IFCPROPERTYSET')||ifc.includes('IFCRELDEFINESBYPROPERTIES');
    checks.push({name:'Properties',pass:hasPsets,detail:hasPsets?'Property sets found':'No property sets (optional)'});
    // Spatial containment
    let hasSpatial=ifc.includes('IFCRELCONTAINEDINSPATIALSTRUCTURE');
    checks.push({name:'Spatial',pass:hasSpatial,detail:hasSpatial?'Spatial containment valid':'Missing spatial relationships'});
    // Entity count
    let entityCount=(ifc.match(/^#\d+=/gm)||[]).length;
    checks.push({name:'Entities',pass:entityCount>10,detail:entityCount+' entities'});
    let h='<div style="margin-top:8px">';
    checks.forEach(c=>{
        h+='<div style="margin:3px 0"><b style="color:#90caf9;font-size:10px">'+c.name+':</b> <span class="tag '+(c.pass?'tag-ok':'tag-fail')+'">'+(c.pass?'PASS':'FAIL')+'</span> <span style="color:#888;font-size:10px">'+c.detail+'</span></div>';
    });
    let allPass=checks.every(c=>c.pass);
    h+='<div style="margin-top:6px;padding:6px;background:rgba('+(allPass?'76,175,80':'244,67,54')+',.1);border-radius:3px"><b style="color:'+(allPass?'#81c784':'#ef9a9a')+'">'+(allPass?'\u2705 IFC Valid - Ready for import':'\u26A0\uFE0F Issues found - Review above')+'</b></div></div>';
    out.innerHTML=h;
}

function drawTypes(n){
    let base=[['floor-plan','Floor Plan'],['elevation','N Elev',{direction:'north'}],['section','Section'],['structural','Structural']];
    if(n===1)return [['site-plan','Site Plan']].concat(base);
    if(n===4)return [['floor-plan','Floor Plan'],['elevation','N',{direction:'north'}],['elevation','S',{direction:'south'}],['elevation','E',{direction:'east'}],['elevation','W',{direction:'west'}],['section','Section']];
    if(n===5)return [['mep','Electrical',{mep_type:'electrical'}]].concat(base);
    if(n===6)return [['mep','Plumbing',{mep_type:'plumbing'}]].concat(base);
    return base;
}

function markDone(n){let nv=document.getElementById('nv'+(n-1));if(nv)nv.classList.add('done');}

function showResults(n,data){
    let el=document.getElementById('phaseRes');if(!el)return;
    if(!data||!data.phases){
        el.innerHTML='<div class="card" style="border-color:#c62828;margin-top:12px"><div class="card-h" style="color:#ef5350">\u26A0\uFE0F Phase '+n+' - No Data</div><div style="color:#ef9a9a;font-size:11px">Server did not return results. Check connection and try again.</div></div>';
        return;
    }
    let pd=(data.phases['phase_'+n]&&data.phases['phase_'+n].data)||{};
    if(!Object.keys(pd).length && n!==11 && n!==13){
        el.innerHTML='<div class="card" style="border-color:#e65100;margin-top:12px"><div class="card-h" style="color:#ffb74d">\u26A0\uFE0F Phase '+n+' - Empty Response</div><div style="color:#ffcc80;font-size:11px">Phase ran but returned no data. Provide more project inputs.</div></div>';
        return;
    }
    let h='<div class="card" style="border-color:#2e7d32;margin-top:12px"><div class="card-h" style="color:#81c784">\u2705 Phase '+n+' Complete</div>';
    h+='<div class="res-grid">';
    if(n===1)h+=rb('Water Table',pd.water_table_depth+'m')+rb('Soil',pd.soil_type)+rb('Slope',pd.slope_angle+'\u00B0')+rb('Suitability',pd.suitability_pct+'%');
    else if(n===2)h+=rb('Bearing',pd.bearing_capacity_kPa+' kPa')+rb('Settlement',pd.settlement_mm+'mm')+rb('Foundation',pd.recommended_foundation);
    else if(n===3)h+=rb('Type',pd.foundation_type)+rb('Depth',pd.foundation_depth+'m')+rb('Concrete',pd.concrete_volume+'m\u00B3')+rb('Steel',Math.round(pd.reinforcement_steel)+'kg');
    else if(n===4)h+=rb('Area',pd.total_area_sqm+'m\u00B2')+rb('Quality',pd.design_quality_score+'%')+rb('Compliance',pd.building_code_compliance);
    else if(n===5)h+=rb('Load',pd.total_load_kW+'kW')+rb('Circuits',pd.circuits)+rb('Cable',pd.main_cable)+rb('Board',pd.db_size);
    else if(n===6)h+=rb('Tank',pd.cold_tank_L+'L')+rb('Pipe',pd.main_pipe_mm+'mm')+rb('Fixtures',pd.total_fixtures)+rb('Hot Water',pd.hw_demand_kW+'kW');
    else if(n===7)h+=rb('Items',pd.material_items)+rb('Cost',fCUR(pd.total_material_cost))+rb('Accuracy',pd.accuracy_percentage+'%');
    else if(n===8)h+=rb('Solar',pd.solar_recommended||'N/A')+rb('Water',(pd.water_storage_L||0)+'L')+rb('Savings',pd.annual_savings?fCUR(pd.annual_savings):'N/A');
    else if(n===9)h+=rb('Plants',pd.plants||0)+rb('Irrigation',pd.irrigation?'Yes':'No')+rb('Cost',fCUR(pd.landscape_cost||0));
    else if(n===10)h+=rb('Permits',pd.permits_required||0)+rb('Timeline',pd.timeline_weeks||0)+' wks'+rb('Status',pd.compliance_status||'Pending');
    else if(n===12){let tc=pd.total_project_cost;let mi=pd.monthly_income||0;h+=rb('Cost',fCUR(tc))+rb('Monthly',fCUR(Math.round(mi)))+rb('Payback',pd.payback_years+' yr');}
    else h+=rb('Status','Complete')+rb('Phase',n+'/13');
    h+='</div>';
    h+='<div class="recs" style="margin-top:8px"><b>Next:</b> Generate Drawings \u2022 View 3D \u2022 Export BIM/IFC</div></div>';
    el.innerHTML=h;
}

function export3DOBJ(){if(!meshes3d.length)return alert('Generate 3D first');let lines=['# EIMS 3D Model'];let voff=1;meshes3d.forEach(m=>{lines.push('o '+(m.userData.name||'obj'));let pos=m.geometry.attributes.position;for(let i=0;i<pos.count;i++){let v=new THREE.Vector3().fromBufferAttribute(pos,i);v.applyMatrix4(m.matrixWorld);lines.push('v '+v.x.toFixed(4)+' '+v.y.toFixed(4)+' '+v.z.toFixed(4));}let idx=m.geometry.index;if(idx)for(let i=0;i<idx.count;i+=3)lines.push('f '+(idx.getX(i)+voff)+' '+(idx.getX(i+1)+voff)+' '+(idx.getX(i+2)+voff));voff+=pos.count;});let b=new Blob([lines.join('\n')],{type:'text/plain'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='EIMS_Model.obj';a.click();}

async function dgRun(){
    const brief = document.getElementById('dgBrief').value.trim();
    if (!brief && !document.getElementById('dgBeds').value){
        return alert('Please describe the house, or fill at least Bedrooms in Override.');

    const out = document.getElementById('dgOutput');
    const btn = document.getElementById('dgBtn');
    btn.disabled = true; btn.textContent = '… working …';

    out.innerHTML = `
      <div style="padding:14px;background:#0d1030;border:1px solid #1e2560;border-radius:6px;margin-bottom:10px">
        <div style="font-size:11px;color:#7986cb;margin-bottom:6px">Step 1 / 4 · Parsing brief</div>
        <div class="spinner" style="margin:8px auto"></div>
      </div>`;

    let parsed = null;
    if (brief){
      try{
        const r = await fetch(API+'/design/brief/parse', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({brief})});
        parsed = await r.json();
      }catch(e){ /* parser failure is non-fatal — fall through to overrides */ }
    }
    dgState.lastBrief = brief;
    const ext = (parsed && parsed.extracted) || {};

    // Merge: explicit override wins over parsed wins over default
    const num = (id, fallback) => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? fallback : v; };
    const sel = (id, fallback) => { const v = document.getElementById(id).value; return v || fallback; };

    const params = {
        name: 'DescribeMode_'+Date.now().toString(36),
        building_type: ext.building_type || 'BUNGALOW',
        location: (ext.location && ext.location.city) ? (ext.location.city + (ext.location.country ? (', ' + ext.location.country) : '')) : 'Nairobi, Kenya',
        area:     num('dgArea', ext.area_m2 || 180),
        bedrooms: num('dgBeds', ext.bedrooms || 3),
        stories:  num('dgStories', ext.stories || 1),
        units:    num('dgUnits', ext.units || 1),
        style:    sel('dgStyle', (ext.styles && ext.styles[0]) || 'modern'),
        gps_lat: -1.29, gps_lng: 36.82,
        features: ext.features || [],
    };
    dgState.params = params;

    // Step 2: /api/generate
    out.innerHTML = `
      <div style="padding:14px;background:#0d1030;border:1px solid #1e2560;border-radius:6px;margin-bottom:10px">

    let project = null;
    try{
        const r = await fetch(API+'/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(params)});

    }catch(e){
        btn.disabled = false; btn.textContent = '🪄 Generate';
        out.innerHTML = `<div class="err" style="padding:14px">Generate failed: ${dgEsc(e.message||e)}</div>`;
        return;
    }
    dgState.projectId = project.project_id || project.id;

    // Step 3: floor plan + elevation SVGs (parallel)
    out.innerHTML = `
      <div style="padding:14px;background:#0d1030;border:1px solid #1e2560;border-radius:6px;margin-bottom:10px">
        <div style="font-size:11px;color:#7986cb;margin-bottom:6px">Step 3 / 4 · Drawing floor plan &amp; elevation</div>
        <div class="spinner" style="margin:8px auto"></div>
      </div>`;

    const drawBody = {
        units: params.units, bedrooms: params.bedrooms,
        area:  params.area,  stories:  params.stories,
        style: params.style, area_per_unit: params.area / Math.max(params.units,1),
    };
    const [fpRes, elRes] = await Promise.all([
        fetch(API+'/drawings/floor-plan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(drawBody)}).catch(()=>null),
        fetch(API+'/drawings/elevation',  {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...drawBody, direction:'north', unit_w:Math.sqrt(params.area/Math.max(params.stories,1)/Math.max(params.units,1))})}).catch(()=>null),
    ]);
    const fpJson = fpRes ? await fpRes.json().catch(()=>null) : null;
    const elJson = elRes ? await elRes.json().catch(()=>null) : null;
    const fpSvg = (fpJson && (fpJson.svg || fpJson.drawing)) || '';
    const elSvg = (elJson && (elJson.svg || elJson.drawing)) || '';

    // Step 4: render the result panel and kick off the AI exterior in parallel
    const totalCost = project.total_cost || (project.phases && project.phases['9'] && project.phases['9'].data && project.phases['9'].data.total_cost) || 0;
    const currency = project.currency || 'USD';

    out.innerHTML = `

        <div class="card" style="margin:0">
          <div class="card-h">✓ Detected</div>
          <div style="font-size:11px;line-height:1.7;color:#bbdefb">
            <div><b style="color:#7986cb">Type:</b> ${dgEsc(params.building_type)}</div>
            <div><b style="color:#7986cb">Style:</b> ${dgEsc((params.style||'').replace(/_/g,' '))}</div>
            <div><b style="color:#7986cb">Area:</b> ${params.area} m²  ·  <b style="color:#7986cb">Units:</b> ${params.units}</div>
            <div><b style="color:#7986cb">Bedrooms:</b> ${params.bedrooms}  ·  <b style="color:#7986cb">Storeys:</b> ${params.stories}</div>
            <div><b style="color:#7986cb">Location:</b> ${dgEsc(params.location)}</div>
            ${params.features.length ? `<div><b style="color:#7986cb">Features:</b> ${dgEsc(params.features.join(', '))}</div>` : ''}
            ${parsed ? `<div style="margin-top:6px;font-size:10px;color:#7986cb">Brief confidence: <b style="color:${parsed.confidence>=0.5?'#81c784':'#ffb74d'}">${Math.round((parsed.confidence||0)*100)}%</b></div>` : ''}
          </div>
        </div>
        <div class="card" style="margin:0">
          <div class="card-h">💰 Cost summary</div>
          <div class="rb" style="margin:0">
            <div class="rl">Estimated total</div>
            <div class="rv">${currency} ${Number(totalCost).toLocaleString(undefined,{maximumFractionDigits:0})}</div>
          </div>
          <div style="font-size:10px;color:#7986cb;margin-top:6px;line-height:1.5">
            Per m²: ${currency} ${(totalCost / Math.max(params.area,1)).toFixed(0)}<br>
            Project ID: <span style="font-family:monospace;font-size:9px">${dgEsc(dgState.projectId||'')}</span>
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="card" style="margin:0">
          <div class="card-h">📐 Floor plan (editable SVG)</div>
          <div class="draw-vp" style="min-height:240px;background:#fff">
            ${fpSvg || '<div style="padding:30px;color:#999">Floor plan unavailable.</div>'}
          </div>
        </div>
        <div class="card" style="margin:0">
          <div class="card-h">🏛️ North elevation (editable SVG)</div>
          <div class="draw-vp" style="min-height:240px;background:#fff">
            ${elSvg || '<div style="padding:30px;color:#999">Elevation unavailable.</div>'}
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:10px">
        <div class="card-h">🎨 AI photorealistic exterior</div>
        <div id="dgAi" style="min-height:200px;display:flex;align-items:center;justify-content:center;background:#000;border-radius:6px;border:1px solid #1e2560">
          <div style="text-align:center;color:#7986cb;font-size:11px">
            <div class="spinner" style="margin:0 auto 10px"></div>
            Generating AI render via Pollinations.ai · 10–30 s
          </div>
        </div>
        <div style="margin-top:8px;font-size:10px;color:#ffb74d;background:rgba(255,152,0,.06);border-left:3px solid #ff9800;padding:6px 10px;border-radius:0 4px 4px 0">
          ⚠ AI image is concept art. The construction drawings above (SVG) are the source of truth.
        </div>
      </div>

      <div class="btn-row" style="margin-top:14px">
        <button class="btn btn-p" onclick="dgDownloadPDF()">📥 Generate Full PDF Report</button>
        <button class="btn btn-g" onclick="setMode('floorEditor')">✏️ Open in Floor Plan Editor</button>
        <button class="btn" onclick="dgRun()">↻ Regenerate</button>
        <button class="btn" onclick="dgRenderAi(true)">🎲 New AI render</button>

    btn.disabled = false; btn.textContent = '🪄 Generate';

// Module-level so the Cancel button can reach it
let dgRenderAbort = null;

async function dgRenderAi(newSeed){
    // Cancel any in-flight render before starting a new one
    if (dgRenderAbort){ try { dgRenderAbort.abort('superseded'); } catch{} }
    const slot = document.getElementById('dgAi');
    if (!slot || !dgState.params) return;
    const p = dgState.params;
    const promptParts = [
      'architectural photography',
      (p.style||'modern').replace(/_/g,' ') + ' style ' + (p.building_type||'house').toLowerCase(),
      p.bedrooms + ' bedroom, ' + p.stories + ' storey',
      p.area + ' square meters',
      'location: ' + p.location,
      p.features && p.features.length ? 'featuring ' + p.features.join(', ').replace(/_/g,' ') : '',
      'lit by golden hour, ultra realistic, wide angle, professional photograph, 8k, no people'
    ].filter(Boolean);
    const prompt = promptParts.join(', ');
    const seed = newSeed ? Math.floor(Math.random()*100000) : Math.abs((p.area*1000 + p.bedrooms*100 + p.stories*10) | 0);
    const w=1024, h=576;
    // Pollinations.ai blocks browser-direct requests (Cloudflare Turnstile on
    // Origin/Referer headers). We proxy through our backend, which runs without
    // browser headers. The server handles model fall-through (flux-dev →
    // flux-schnell → turbo) so the client makes a single request.
    const url = `${API}/ai/render?prompt=${encodeURIComponent(prompt)}&width=${w}&height=${h}&seed=${seed}`;
    const TIMEOUT_MS = 120000; // server may try 3 models @ ~25 s each

    const ctrl = new AbortController();
    dgRenderAbort = ctrl;
    const t0 = Date.now();
    const renderProgress = (elapsed) => `
        <div style="text-align:center;color:#7986cb;font-size:11px;padding:14px">
          <div class="spinner" style="margin:0 auto 10px"></div>
          <div>AI render · proxying via backend · trying flux-dev, flux-schnell, turbo</div>
          <div style="margin-top:4px;color:#5c6bc0;font-size:10px">elapsed ${elapsed}s</div>
          <button class="btn" style="margin-top:10px;font-size:10px" onclick="dgCancelRender()">✕ Cancel</button>
        </div>`;
    slot.innerHTML = renderProgress(0);
    const tick = setInterval(() => {
      if (slot && dgRenderAbort === ctrl){
        slot.innerHTML = renderProgress(((Date.now()-t0)/1000|0));
      }
    }, 500);
    const timer = setTimeout(() => ctrl.abort('timeout'), TIMEOUT_MS);
    try{
      const r = await fetch(url, {method:'GET', cache:'no-store', signal: ctrl.signal});
      clearTimeout(timer); clearInterval(tick);
      const ctype = r.headers.get('Content-Type') || '';
      if (r.ok && ctype.startsWith('image/')){
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        const usedModel = r.headers.get('X-AI-Render-Model') || '?';
        const usedSeed = r.headers.get('X-AI-Render-Seed') || seed;
        dgRenderAbort = null;
        slot.style.display = 'block';
        slot.innerHTML = `
          <img src="${blobUrl}" style="display:block;width:100%;height:auto;border-radius:6px"/>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center">
            <a href="${blobUrl}" download="eims_render_${usedSeed}.jpg" class="btn btn-g">⬇ Download image</a>
            <button class="btn" onclick="dgRenderAi(true)" style="font-size:10px">🎲 New variation</button>
            <span style="font-size:10px;color:#7986cb">model=${dgEsc(usedModel)} · seed=${dgEsc(String(usedSeed))} · ${(blob.size/1024)|0} KB · ${((Date.now()-t0)/1000).toFixed(1)}s</span>
          </div>`;
        return;
      }
      // Backend returned JSON error (502, 400, etc.)
      let detail = '';
      try { const j = await r.json(); detail = (j.detail || j.error || '') + (j.models_tried ? ` — tried ${j.models_tried.join(', ')}` : ''); } catch(_){}
      throw new Error(`HTTP ${r.status}${detail ? ': ' + detail : ''}`);
    }catch(e){
      clearTimeout(timer); clearInterval(tick);
      if (e.name === 'AbortError'){
        if (ctrl.signal.reason === 'cancelled'){
          dgRenderAbort = null;
          slot.innerHTML = `<div style="padding:14px;text-align:center;color:#7986cb;font-size:11px">
            Render cancelled. <button class="btn" style="margin-left:8px" onclick="dgRenderAi(false)">↻ Try again</button>
          </div>`;
          return;
        }
        dgRenderAbort = null;
        slot.innerHTML = `<div style="padding:14px;color:#ef9a9a;font-size:11px;text-align:center">
          AI render timed out after ${TIMEOUT_MS/1000}s.
          <div style="margin-top:8px"><button class="btn" onclick="dgRenderAi(true)">↻ Try again</button></div>
        </div>`;
        return;
      }
      dgRenderAbort = null;
      slot.innerHTML = `<div style="padding:14px;color:#ef9a9a;font-size:11px;text-align:center;line-height:1.6">
        <b>AI render failed</b><br>
        <span style="font-family:monospace;font-size:10px">${dgEsc(e.message||String(e))}</span><br>
        <span style="color:#ffb74d">Floor plan &amp; elevation above are unaffected.</span><br>
        <div style="margin-top:8px"><button class="btn" onclick="dgRenderAi(true)">↻ Try again (new seed)</button></div>
      </div>`;
    }
}

function dgCancelRender(){
    if (dgRenderAbort){ try { dgRenderAbort.abort('cancelled'); } catch{} dgRenderAbort = null; }
}

        document.getElementById('bimRight').innerHTML =
            `<div style="padding:30px;color:#7986cb">Load a model first.</div>`;
        return;
    }
    if (which === 'plan')           bimRenderPlan();
    else if (which === '3d')        bimRender3D();
    else if (which === 'library')   bimRenderLibrary();
    else if (which === 'sheets')    bimRenderSheets();
    else if (which === 'copilot')   bimRenderCopilot();
    else                             bimRenderSchedules();
}

async function bimApplyLibrary(cat, libId){
    const sel = bimState.selected;
    if (!sel){
        alert('Select an element in the Plan tab first, then come back to Library and click Apply.');
        return;
    }
    if (!bimState.projectId){
        alert('Family-apply requires a saved project (loaded by ID). Use Quick build to test, then run /api/generate to persist.');
        return;
    }
    // Compatibility: walls→walls, openings→doors|windows depending on opening kind, spaces are not types
    const valid = (sel.kind === 'wall'    && cat === 'walls')
               || (sel.kind === 'opening' && ((sel.target.kind === 'door'   && cat === 'doors') ||
                                                (sel.target.kind === 'window' && cat === 'windows')));
    if (!valid){
        alert(`Cannot apply ${cat} family to selected ${sel.kind}${sel.kind==='opening'?' ('+sel.target.kind+')':''}.`);
        return;
    }

    // Step 1: ensure the type is in the project's catalog (idempotent server-side import).
    try{
        await fetch(API + '/bim/types/import', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({project_id: bimState.projectId}),
        });
    }catch(_){}

    // Step 2: patch the selected element to the new type
    try{
        const r = await fetch(API + '/bim/element/update', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({project_id: bimState.projectId, element_id: sel.id,
                                   patch: {type_name: libId}}),
        });
        const j = await r.json();
        if (!j.success){ alert('Apply failed: ' + (j.error||'?')); return; }
        // Refresh model + view
        const r2 = await fetch(API + '/bim/project/' + encodeURIComponent(bimState.projectId));
        const j2 = await r2.json();
        if (j2.success){ bimState.bim = j2.bim; }
        bimRefreshStats();
        bimTab('plan');
        setTimeout(() => bimSelect(sel.id), 250);
    }catch(e){
        alert('Apply error: ' + (e.message||e));
    }
}

async function bimImportLibrary(){

    const r = await fetch(API + '/bim/types/import', {

    }
}

async function bimRenderCopilot(){

    }

    right.innerHTML = `<div style="padding:30px;text-align:center;color:#7986cb">
        <div class="spinner" style="margin:0 auto 10px"></div>Connecting Copilot…</div>`;

    // Check configuration once per session
    if (copilotState.configured === null){
        try {
            const s = await (await fetch(API + '/bim/copilot/status')).json();
            copilotState.configured = !!s.configured;
        } catch { copilotState.configured = false; }
    }

    // Load persisted history
    try {
        const h = await (await fetch(API + `/bim/copilot/history/${bimState.projectId}`)).json();

           </div>`
        : `<div style="font-size:12px;color:#ffcc80;background:#3e2723;padding:10px;border-radius:4px;margin-bottom:10px;line-height:1.5">
             <b>⚠ Copilot not configured</b> on this server.<br>
             Set the <code style="background:#000;padding:1px 4px;border-radius:2px">ANTHROPIC_API_KEY</code> environment variable and restart, then everything else just works.
           </div>`;

    right.innerHTML = `
      <div style="display:flex;flex-direction:column;height:600px">
        ${banner}
        <div id="copilotMsgs" style="flex:1;overflow-y:auto;background:#0a0e27;border:1px solid #1e2560;border-radius:6px;padding:12px;margin-bottom:10px"></div>
        <div style="display:flex;gap:6px">
          <textarea id="copilotInput" rows="2" placeholder="${copilotState.configured ? 'Ask anything about your building...' : 'Copilot disabled'}"
                    ${copilotState.configured ? '' : 'disabled'}
                    style="flex:1;background:#1a1d2e;color:#fff;border:1px solid #1e2560;border-radius:4px;padding:8px;font-family:inherit;font-size:12px;resize:none"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();copilotSend();}"></textarea>
          <button class="btn btn-p" onclick="copilotSend()" ${copilotState.configured ? '' : 'disabled'}
                  style="padding:8px 14px">Send →</button>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <div style="font-size:10px;color:#5c6bc0">Enter to send · Shift+Enter for newline</div>
          <button class="btn" onclick="copilotReset()" style="font-size:10px">↻ New conversation</button>
        </div>
      </div>`;

function copilotRenderMessages(){
    const box = document.getElementById('copilotMsgs');
    if (!box) return;
    if (!copilotState.history.length){
        box.innerHTML = `<div style="text-align:center;color:#5c6bc0;padding:40px 20px">
            <div style="font-size:32px;margin-bottom:6px">✨</div>
            <div style="font-size:12px">Talk to your building. The Copilot can read schedules, change wall types, resize the project, and explain what's in your model — all by just asking.</div>
        </div>`;
        return;
    }
    let html = '';
    for (const m of copilotState.history){
        if (m.role === 'user'){
            const txt = (typeof m.content === 'string') ? m.content
                          : (m.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
            if (!txt) continue;
            html += `<div style="margin-bottom:10px;display:flex;justify-content:flex-end">
                <div style="background:#3949ab;color:#fff;padding:8px 12px;border-radius:12px 12px 0 12px;max-width:80%;font-size:12px;line-height:1.5;white-space:pre-wrap">${bimEsc(txt)}</div>
            </div>`;
        } else if (m.role === 'assistant'){
            const blocks = Array.isArray(m.content) ? m.content : [];
            const text = blocks.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
            const tools = blocks.filter(b=>b.type==='tool_use');
            if (tools.length){
                const chips = tools.map(t => `<span style="background:#1a237e;color:#90caf9;padding:1px 6px;border-radius:3px;font-size:9px;margin-right:3px">⚙ ${bimEsc(t.name)}</span>`).join('');
                html += `<div style="margin-bottom:6px;font-size:10px;color:#5c6bc0">${chips}</div>`;
            }
            if (text){
                html += `<div style="margin-bottom:10px;display:flex;justify-content:flex-start;gap:8px">
                    <div style="font-size:18px;line-height:1">✨</div>
                    <div style="background:#1a1d2e;color:#e8eaf6;padding:8px 12px;border-radius:12px 12px 12px 0;max-width:80%;font-size:12px;line-height:1.5;white-space:pre-wrap;border:1px solid #1e2560">${bimEsc(text)}</div>
                </div>`;
            }
        }
        // tool_result blocks (role:user with content array of tool_result) — skip rendering raw JSON; chips above signal them.
    }
    box.innerHTML = html;
    box.scrollTop = box.scrollHeight;
}

async function copilotSend(){
    if (copilotState.busy || !copilotState.configured) return;
    const ta = document.getElementById('copilotInput');
    const msg = (ta.value || '').trim();
    if (!msg) return;
    ta.value = '';
    copilotState.busy = true;

    // Optimistic user echo
    copilotState.history.push({role:'user', content: msg});
    copilotRenderMessages();
    // Thinking indicator
    const box = document.getElementById('copilotMsgs');
    box.insertAdjacentHTML('beforeend',
        `<div id="copilotThinking" style="display:flex;gap:8px;align-items:center;color:#7986cb;font-size:11px;padding:6px 0">
            <div class="spinner" style="width:14px;height:14px"></div>Copilot is thinking…
         </div>`);
    box.scrollTop = box.scrollHeight;

    try {
        const r = await fetch(API + '/bim/copilot', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({project_id: bimState.projectId, message: msg}),
        });
        const j = await r.json();
        document.getElementById('copilotThinking')?.remove();

        if (!j.success){
            box.insertAdjacentHTML('beforeend',
                `<div class="err" style="margin:8px 0;padding:8px;border-radius:4px;font-size:11px">${bimEsc(j.error||'request failed')}</div>`);
        } else {
            // Server returns full message log — overwrite our local history with it
            // Re-fetch the canonical history (server already trimmed/persisted)
            try {
                const h2 = await (await fetch(API + `/bim/copilot/history/${bimState.projectId}`)).json();
                if (h2.success) copilotState.history = h2.history || [];
            } catch {}
            copilotRenderMessages();

            // If the building changed, refresh the BIM model & current tab so the user sees it
            if (j.building_changed){
                await bimLoad();
                // Show a transient toast about the change
                const toast = document.createElement('div');
                toast.textContent = '✓ Building updated by Copilot — views refreshed';
                toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#2e7d32;color:#fff;padding:10px 16px;border-radius:6px;font-size:12px;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.4)';
                document.body.appendChild(toast);
                setTimeout(()=>toast.remove(), 3500);
                // Re-render the copilot panel since bimLoad may have switched tabs
                if (document.getElementById('bimTabCopilot')?.classList.contains('on')){
                    bimRenderCopilot();
                }
            }
        }
    } catch (e) {
        document.getElementById('copilotThinking')?.remove();
        box.insertAdjacentHTML('beforeend',
            `<div class="err" style="margin:8px 0;padding:8px;font-size:11px">network error: ${bimEsc(String(e))}</div>`);
    } finally {
        copilotState.busy = false;
    }
}

async function copilotReset(){
    if (!confirm('Clear this conversation? Building edits already made will not be undone.')) return;
    await fetch(API + `/bim/copilot/reset/${bimState.projectId}`, {method:'POST'});
    copilotState.history = [];
    copilotRenderMessages();
}

let bim3dState = {scene:null, cam:null, ren:null, meshes:[], dist:25, rotX:0.6, rotY:0.7,
                   autoRot:false, wire:false, dragV:false, prevMX:0, prevMY:0, animLoop:null};

async function bimRender3D(){
    const b = bimState.bim;
    if (!b) return;
    if (typeof THREE === 'undefined'){
        document.getElementById('bimRight').innerHTML =
            `<div class="err" style="padding:14px">three.js not loaded yet — wait a moment and click 3D again.</div>`;
        return;
    }
    document.getElementById('bimRight').innerHTML = `
      <div style="position:relative;height:600px;background:#0a0e27;border:1px solid #1e2560;border-radius:6px;overflow:hidden">
        <div id="bim3dCanvas" style="width:100%;height:100%"></div>
        <div style="position:absolute;top:8px;left:10px;font-size:10px;color:#7986cb;background:rgba(0,0,0,.4);padding:4px 8px;border-radius:3px"
             id="bim3dInfo">loading…</div>
        <div style="position:absolute;top:8px;right:10px;display:flex;gap:4px">
          <button class="btn" onclick="bim3dReset()">reset</button>
          <button class="btn" onclick="bim3dToggleWire()">wire</button>
          <button class="btn" onclick="bim3dToggleRot()">rotate</button>
          <button class="btn btn-g" onclick="bim3dExportOBJ()">⬇ OBJ</button>
        </div>
      </div>
      <div style="margin-top:8px;font-size:10px;color:#7986cb">
        🖱️ drag to orbit · scroll to zoom · BIM-driven — edits in Properties panel update this view
      </div>
    `;
    bim3dInit();
    await bim3dLoadModel();
}

function bim3dInit(){
    const wrap = document.getElementById('bim3dCanvas');
    if (!wrap) return;
    // Clean up prior renderer if any
    if (bim3dState.animLoop){ cancelAnimationFrame(bim3dState.animLoop); bim3dState.animLoop = null; }
    if (bim3dState.ren){ bim3dState.ren.dispose && bim3dState.ren.dispose(); }
    bim3dState.meshes = [];

    const W = wrap.clientWidth || 900, H = wrap.clientHeight || 600;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e27);
    scene.fog = new THREE.Fog(0x0a0e27, 30, 80);

    const cam = new THREE.PerspectiveCamera(40, W/H, 0.1, 1000);
    bim3dState.cam = cam;
    bim3dPlaceCam();

    const ren = new THREE.WebGLRenderer({antialias:true});
    ren.setSize(W, H);
    ren.shadowMap.enabled = true;
    wrap.innerHTML = '';
    wrap.appendChild(ren.domElement);
    bim3dState.ren = ren;

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xfff5d6, 0.9);
    sun.position.set(15, 25, 10);
    sun.castShadow = true;
    scene.add(sun);
    // Ground
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 120),
        new THREE.MeshStandardMaterial({color:0x1a2050, roughness:0.95, metalness:0}));
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.05;
    ground.receiveShadow = true;
    scene.add(ground);
    // Grid
    const grid = new THREE.GridHelper(60, 30, 0x2a3070, 0x1e2560);
    scene.add(grid);
    bim3dState.scene = scene;

    // Pointer events. Order of precedence:
    //   1. pointerdown on a wall-endpoint handle  → start handle drag (no orbit)
    //   2. otherwise pointerdown anywhere on canvas → start orbit
    //   3. pointerup with < 5 px movement → raycast & select
    //   4. pointerup after handle drag → persist new wall geometry
    let moveSum = 0;
    ren.domElement.addEventListener('pointerdown', e => {
        if (bim3dHandlePointerDown(e)){
            // Drag-handle path: don't engage the orbit camera
            bim3dState.dragV = false;
            return;
        }
        bim3dState.dragV = true;
        bim3dState.prevMX = e.clientX; bim3dState.prevMY = e.clientY;
        moveSum = 0;
    });
    window.addEventListener('pointerup', async e => {
        // If we were dragging a handle, persist and return without doing a click-select
        if (bim3dState.dragHandle){
            await bim3dHandlePointerUp();
            return;
        }
        if (bim3dState.dragV && moveSum < 5){
            bim3dHandleClick(e);
        }
        bim3dState.dragV = false;
    });
    window.addEventListener('pointermove', e => {
        if (bim3dHandlePointerMove(e)) return;
        if (!bim3dState.dragV) return;
        const dx = e.clientX - bim3dState.prevMX, dy = e.clientY - bim3dState.prevMY;
        moveSum += Math.abs(dx) + Math.abs(dy);
        bim3dState.rotY += dx * 0.005;
        bim3dState.rotX += dy * 0.005;
        bim3dState.rotX = Math.max(0.05, Math.min(Math.PI/2 - 0.05, bim3dState.rotX));
        bim3dState.prevMX = e.clientX; bim3dState.prevMY = e.clientY;
        bim3dPlaceCam();
    });
    ren.domElement.addEventListener('wheel', e => {
        e.preventDefault();
        bim3dState.dist *= (1 + e.deltaY * 0.001);
        bim3dState.dist = Math.max(5, Math.min(120, bim3dState.dist));
        bim3dPlaceCam();
    }, {passive:false});

    const animate = () => {
        bim3dState.animLoop = requestAnimationFrame(animate);
        if (bim3dState.autoRot){
            bim3dState.rotY += 0.005;
            bim3dPlaceCam();
        }
        ren.render(scene, cam);
    };
    animate();
}

function bim3dHandleClick(e){
    if (!bim3dState.ren || !bim3dState.cam || !bim3dState.scene) return;
    const rect = bim3dState.ren.domElement.getBoundingClientRect();
    if (e.clientX < rect.left || e.clientX > rect.right ||
        e.clientY < rect.top  || e.clientY > rect.bottom) return;   // click outside canvas
    const ndcX = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    const ndcY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), bim3dState.cam);
    // Only test our placed meshes, not ground/grid/handles
    const hits = raycaster.intersectObjects(bim3dState.meshes, false);
    if (!hits.length){ bim3dHideHandles(); return; }
    const hit = hits[0].object;
    const elemId = hit.userData && hit.userData.bim_element_id;
    if (!elemId) return;
    bim3dHighlight(hit);
    bimSelect(elemId);
    // If the selected element is a wall, drop two endpoint handles for drag-to-reshape
    if (hit.userData.name && hit.userData.name.startsWith('wall_')){
        bim3dShowWallHandles(elemId);
    } else {
        bim3dHideHandles();
    }
    // Pulse a small toast so the user knows what happened
    const info = document.getElementById('bim3dInfo');
    if (info){
        const orig = info.textContent;
        const tail = hit.userData.name && hit.userData.name.startsWith('wall_')
            ? ' — drag the orange spheres at endpoints to reshape'
            : ' — see Properties on the left';
        info.textContent = '✓ selected ' + (hit.userData.name || elemId) + tail;
        setTimeout(() => { if (info) info.textContent = orig; }, 3000);
    }
}

/* ---- Drag-to-reshape: endpoint spheres on selected walls ---- */

function bim3dHideHandles(){
    if (!bim3dState.scene) return;
    if (bim3dState.handles){
        bim3dState.handles.forEach(h => bim3dState.scene.remove(h));
        bim3dState.handles = [];
    }
    if (bim3dState.ghost){ bim3dState.scene.remove(bim3dState.ghost); bim3dState.ghost = null; }
}

function bim3dShowWallHandles(wallId){
    bim3dHideHandles();
    if (!bimState.bim || !bim3dState.scene) return;
    // Find the wall in the model
    let wall = null, storey = null;
    for (const s of bimState.bim.storeys){
        const w = s.walls.find(w => w.id === wallId);
        if (w){ wall = w; storey = s; break; }
    }
    if (!wall || !wall.points || wall.points.length < 2) return;

    // Recompute the centring offset the renderer applied (so handle positions match the meshes)
    bim3dState.handles = [];
    const off = bim3dState.centerOffset || {x:0, z:0};
    const yPlane = (storey.level_m || 0) + (wall.height_m || 3) / 2;

    for (let i = 0; i < wall.points.length; i++){
        const p = wall.points[i];
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.25, 16, 16),
            new THREE.MeshBasicMaterial({color: 0xff7800, depthTest: false, transparent: true, opacity: 0.95})
        );
        sphere.renderOrder = 999;
        sphere.position.set(p.x - off.x, yPlane, p.y - off.z);
        sphere.userData = {kind: 'wall_handle', wallId, idx: i};
        bim3dState.scene.add(sphere);
        bim3dState.handles.push(sphere);
    }
    // Ghost line preview during drag (initially placed at current geometry)
    bim3dState.ghost = bim3dMakeGhostLine(wall, storey, off);
    bim3dState.scene.add(bim3dState.ghost);
}

function bim3dMakeGhostLine(wall, storey, off){
    const yPlane = (storey.level_m || 0) + (wall.height_m || 3) / 2;
    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(wall.points[0].x - off.x, yPlane, wall.points[0].y - off.z),
        new THREE.Vector3(wall.points[1].x - off.x, yPlane, wall.points[1].y - off.z),
    ]);
    const mat = new THREE.LineDashedMaterial({color: 0xffb74d, dashSize: 0.3, gapSize: 0.2, depthTest: false});
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    line.renderOrder = 998;
    return line;
}

function bim3dHandlePointerDown(e){
    if (!bim3dState.handles || !bim3dState.handles.length) return false;
    const rect = bim3dState.ren.domElement.getBoundingClientRect();
    if (e.clientX < rect.left || e.clientX > rect.right ||
        e.clientY < rect.top  || e.clientY > rect.bottom) return false;
    const ndcX = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    const ndcY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(ndcX, ndcY), bim3dState.cam);
    const hits = ray.intersectObjects(bim3dState.handles, false);
    if (!hits.length) return false;
    bim3dState.dragHandle = hits[0].object;
    bim3dState.dragHandle.material.color.setHex(0xffeb3b);
    return true;
}

function bim3dHandlePointerMove(e){
    if (!bim3dState.dragHandle) return false;
    // Project pointer onto the horizontal plane at the handle's current Y
    const rect = bim3dState.ren.domElement.getBoundingClientRect();
    const ndcX = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    const ndcY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(ndcX, ndcY), bim3dState.cam);
    const yPlane = bim3dState.dragHandle.position.y;
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -yPlane);
    const hitPoint = new THREE.Vector3();
    if (!ray.ray.intersectPlane(plane, hitPoint)) return true;
    bim3dState.dragHandle.position.set(hitPoint.x, yPlane, hitPoint.z);
    // Update ghost line to follow
    if (bim3dState.ghost && bim3dState.handles.length === 2){
        const a = bim3dState.handles[0].position;
        const b = bim3dState.handles[1].position;
        bim3dState.ghost.geometry.setFromPoints([a.clone(), b.clone()]);
        bim3dState.ghost.computeLineDistances();
    }
    return true;
}

async function bim3dHandlePointerUp(){
    if (!bim3dState.dragHandle) return false;
    const handle = bim3dState.dragHandle;
    bim3dState.dragHandle = null;
    handle.material.color.setHex(0xff7800);

    if (!bimState.projectId){
        const info = document.getElementById('bim3dInfo');
        if (info) info.textContent = 'Drag persisted only when project is loaded by ID. Use bim/build for ad-hoc.';
        return true;
    }
    const off = bim3dState.centerOffset || {x:0, z:0};
    // Read both handle positions, convert back to world (uncentred) BIM coords
    const newPoints = bim3dState.handles.map(h => ({
        x: +(h.position.x + off.x).toFixed(4),
        y: +(h.position.z + off.z).toFixed(4),
    }));
    const wallId = handle.userData.wallId;
    try{
        const r = await fetch(API + '/bim/element/update', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({project_id: bimState.projectId, element_id: wallId,
                                   patch: {points: newPoints}}),
        });
        const j = await r.json();
        if (!j.success){ alert('Drag-persist failed: ' + (j.error||'?')); return true; }
        // Reload model + re-render 3D and stats
        const r2 = await fetch(API + '/bim/project/' + encodeURIComponent(bimState.projectId));
        const j2 = await r2.json();
        if (j2.success){ bimState.bim = j2.bim; }
        bimRefreshStats();
        await bim3dLoadModel();
        // Reapply selection so user can keep dragging
        setTimeout(() => bim3dShowWallHandles(wallId), 200);
    }catch(e){
        alert('Drag-persist error: ' + (e.message||e));
    }
    return true;
}

function bim3dHighlight(mesh){
    bim3dState.meshes.forEach(m => {
        if (m.material && m.material.emissive){
            m.material.emissive.setHex(m === mesh ? 0xff7800 : 0x000000);
            m.material.emissiveIntensity = m === mesh ? 0.45 : 0;
        }
    });
}

function bim3dPlaceCam(){
    const r = bim3dState.dist;
    const x = r * Math.sin(bim3dState.rotY) * Math.cos(bim3dState.rotX);
    const y = r * Math.sin(bim3dState.rotX) + 3;
    const z = r * Math.cos(bim3dState.rotY) * Math.cos(bim3dState.rotX);
    if (!bim3dState.cam) return;
    bim3dState.cam.position.set(x, y, z);
    bim3dState.cam.lookAt(0, 2, 0);
}

async function bim3dLoadModel(){
    const info = document.getElementById('bim3dInfo');
    if (info) info.textContent = 'fetching BIM 3D model…';
    const body = bimState.projectId ? {project_id: bimState.projectId} : {bim: bimState.bim};
    try{
        const r = await fetch(API + '/bim/3d-model', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(body),
        });
        const j = await r.json();
        if (!j.success){
            if (info) info.textContent = 'error: ' + (j.error||'?');
            return;
        }
        // Centre the model on origin so the orbit camera frames it
        const objs = j.model.objects || [];
        let cx = 0, cz = 0;
        if (objs.length){
            let xs=[],zs=[];
            objs.forEach(o => { xs.push(o.position[0]); zs.push(o.position[2]); });
            cx = (Math.min(...xs)+Math.max(...xs))/2;
            cz = (Math.min(...zs)+Math.max(...zs))/2;
            objs.forEach(o => { o.position[0] -= cx; o.position[2] -= cz; });
        }
        bim3dState.centerOffset = {x: cx, z: cz};
        // Wipe old meshes (and any handles/ghost lines)
        bim3dState.meshes.forEach(m => bim3dState.scene.remove(m));
        bim3dState.meshes = [];
        bim3dHideHandles();
        objs.forEach(o => bim3dAddMesh(o));
        if (info){
            const s = j.stats;
            info.textContent = `${s.objects} objects · ${s.storeys} storey(s) · ${s.walls} walls · ${s.openings} openings · ${s.gross_floor_area_m2} m²`;
        }
    }catch(e){
        if (info) info.textContent = 'fetch error: ' + (e.message||e);
    }
}

function bim3dAddMesh(o){
    let geo;
    if (o.type === 'cylinder'){
        const r = Math.max(o.size[0], o.size[2]) / 2;
        geo = new THREE.CylinderGeometry(r, r, o.size[1], 16);
    } else if (o.type === 'sphere'){
        geo = new THREE.SphereGeometry(Math.max(...o.size)/2, 12, 12);
    } else {
        geo = new THREE.BoxGeometry(o.size[0], o.size[1], o.size[2]);
    }
    const mat = new THREE.MeshStandardMaterial({
        color: o.color,
        roughness: o.material === 'glass' ? 0.1 : 0.85,
        metalness: o.material === 'glass' ? 0.2 : 0.04,
        transparent: !!o.transparent,
        opacity: o.transparent ? 0.4 : 1,
        wireframe: bim3dState.wire,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(o.position[0], o.position[1], o.position[2]);
    if (o.rotation){
        mesh.rotation.x = (o.rotation.x||0) * Math.PI/180;
        mesh.rotation.y = (o.rotation.y||0) * Math.PI/180;
        mesh.rotation.z = (o.rotation.z||0) * Math.PI/180;
    }
    mesh.castShadow = true; mesh.receiveShadow = true;
    mesh.userData = {name: o.name, bim_element_id: o.bim_element_id};
    bim3dState.scene.add(mesh);
    bim3dState.meshes.push(mesh);
}

function bim3dReset(){ bim3dState.dist=25; bim3dState.rotX=0.6; bim3dState.rotY=0.7; bim3dPlaceCam(); }
function bim3dToggleWire(){ bim3dState.wire = !bim3dState.wire; bim3dState.meshes.forEach(m => m.material.wireframe = bim3dState.wire); }
function bim3dToggleRot(){ bim3dState.autoRot = !bim3dState.autoRot; }
function bim3dExportOBJ(){
    const ms = bim3dState.meshes;
    if (!ms.length){ alert('No meshes.'); return; }
    let voff = 1;
    const lines = ['# EIMS BIM 3D Export'];
    ms.forEach(m => {
        lines.push('o ' + (m.userData.name || 'obj'));
        const pos = m.geometry.attributes.position;
        m.updateMatrixWorld(true);
        for (let i = 0; i < pos.count; i++){
            const v = new THREE.Vector3().fromBufferAttribute(pos, i);
            v.applyMatrix4(m.matrixWorld);
            lines.push('v ' + v.x.toFixed(4) + ' ' + v.y.toFixed(4) + ' ' + v.z.toFixed(4));
        }
        const idx = m.geometry.index;
        if (idx){
            for (let i = 0; i < idx.count; i += 3){
                lines.push('f ' + (idx.getX(i)+voff) + ' ' + (idx.getX(i+1)+voff) + ' ' + (idx.getX(i+2)+voff));
            }
        }
        voff += pos.count;
    });
    const blob = new Blob([lines.join('\n')], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'EIMS_BIM_Model.obj'; a.click();
}

async function bimLoad(){
    const pid = document.getElementById('bimPid').value.trim();
    if (!pid){ alert('Project ID required, or use Quick build.'); return; }
    bimState.projectId = pid;
    const right = document.getElementById('bimRight');
    right.innerHTML = `<div style="padding:30px;text-align:center;color:#7986cb">
        <div class="spinner" style="margin:0 auto 10px"></div>Loading BIM model…</div>`;
    try{
        const r = await fetch(API + '/bim/project/' + encodeURIComponent(pid));
        const j = await r.json();
        if (!j.success){
            right.innerHTML = `<div class="err" style="padding:14px">${bimEsc(j.error||'load failed')}</div>`;
            return;
        }
        bimState.bim = j.bim;
        bimState.storeyIndex = 0;
        bimRefreshStats();
        bimRenderPlan();
    }catch(e){
        right.innerHTML = `<div class="err" style="padding:14px">${bimEsc(e.message||e)}</div>`;
    }
}

function bimRefreshStats(){
    const b = bimState.bim;
    if (!b){ return; }
    const wallCount = b.storeys.reduce((n,s)=>n+s.walls.length,0);
    const openings  = b.storeys.reduce((n,s)=>n+s.openings.length,0);
    const doors     = b.storeys.reduce((n,s)=>n+s.openings.filter(o=>o.kind==='door').length,0);
    const windows   = openings - doors;
    const spaces    = b.storeys.reduce((n,s)=>n+s.spaces.length,0);
    const cols      = b.storeys.reduce((n,s)=>n+(s.columns||[]).length,0);
    const slabs     = b.storeys.reduce((n,s)=>n+(s.slabs||[]).length,0);
    document.getElementById('bimStats').innerHTML = `
      <div><b style="color:#7986cb">Building:</b> ${bimEsc(b.name)}</div>
      <div><b style="color:#7986cb">Storeys:</b> ${b.storeys.length}  ·

async function bimRenderPlan(){

    const right = document.getElementById('bimRight');

    const tabsHtml = b.storeys.length > 1 ?
        '<div class="rtabs" style="margin-bottom:8px">' +
        b.storeys.map((s,i)=>`<div class="rtab ${i===bimState.storeyIndex?'on':''}" onclick="bimSelectStorey(${i})">${bimEsc(s.name)}</div>`).join('') +
        '</div>' : '';

    right.innerHTML = tabsHtml + `<div style="padding:30px;text-align:center;color:#7986cb">
        <div class="spinner" style="margin:0 auto 10px"></div>Rendering BIM plan…</div>`;

    // Use the inline `bim` payload — server is happy with either project_id or bim
    const body = bimState.projectId ? {project_id: bimState.projectId, storey_index: bimState.storeyIndex}
                                     : {bim: b, storey_index: bimState.storeyIndex};
    try{
        const r = await fetch(API + '/bim/floor-plan', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(body),
        });
        const j = await r.json();
        if (!j.success){
            right.innerHTML = tabsHtml + `<div class="err" style="padding:14px">${bimEsc(j.error||'render failed')}</div>`;
            return;
        }
        right.innerHTML = tabsHtml +
            `<div style="background:#fff;border-radius:6px;padding:6px;border:1px solid #1e2560">
                <div id="bimPlanWrap">${j.svg}</div>
            </div>
            <div style="margin-top:8px;font-size:10px;color:#7986cb">
              Click any wall, door, window or room to edit · ${j.walls_drawn} walls / ${j.openings_drawn} openings / ${j.spaces_drawn} spaces
            </div>`;
        // Wire click-to-select on every element with data-element-id
        const wrap = document.getElementById('bimPlanWrap');
        wrap.querySelectorAll('[data-element-id]').forEach(el => {
            el.style.cursor = 'pointer';
            el.addEventListener('click', e => {
                e.stopPropagation();

}

function bimSelect(elemId){
    const b = bimState.bim;
    if (!b) return;
    let target = null, kind = null, storey = null;
    for (const s of b.storeys){
        target = s.walls.find(w => w.id === elemId);     if (target){ kind='wall'; storey=s; break; }
        target = s.openings.find(o => o.id === elemId);  if (target){ kind='opening'; storey=s; break; }
        target = s.spaces.find(sp => sp.id === elemId);  if (target){ kind='space'; storey=s; break; }
        target = (s.slabs||[]).find(sl => sl.id === elemId); if (target){ kind='slab'; storey=s; break; }
    }
    if (!target){ console.warn('element not found:', elemId); return; }
    bimState.selected = {id: elemId, kind, target, storey};
    bimRenderPropertyForm();
    // Highlight
    document.querySelectorAll('#bimPlanWrap [data-element-id]').forEach(el => {
        el.style.outline = el.getAttribute('data-element-id') === elemId ? '3px solid #ff9800' : '';
    });
}
