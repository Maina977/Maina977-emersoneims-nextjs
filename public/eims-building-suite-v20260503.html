<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMERSON EIMS - Global Construction Intelligence Platform | 28 Countries</title>
<!-- Start TCP/TLS handshakes with the Three.js CDNs in parallel with HTML parsing.
     Saves ~150-300ms on first visit before the cache warms up. -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="https://image.pollinations.ai">
<!-- Three.js is deferred: browser downloads it in parallel with HTML parsing
     but doesn't execute until the document is fully parsed. HTML paints first,
     Three.js becomes available before any 3D-tab function actually runs.
     SRI (integrity=) means a CDN compromise or MITM cannot substitute a
     malicious payload — the browser will refuse to execute any file whose
     hash does not match. crossorigin=anonymous is required for the browser
     to apply the integrity check at all. -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
        integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"
        integrity="sha384-wagZhIFgY4hD+7awjQjR4e2E294y6J2HSnd8eTNc15ZubTeQeVRZwhQJ+W6hnBsf"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0e27;color:#e0e0e0;font-size:13px;overflow:hidden;height:100vh}
/* VISIBLE SCROLLBARS — clear affordance for clients */
*{scrollbar-width:thin;scrollbar-color:#5c6bc0 #0d1030}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:#0d1030;border-left:1px solid #1e2560}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#3f51b5,#283593);border-radius:6px;border:2px solid #0d1030;min-height:40px}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#5c6bc0,#3f51b5);cursor:pointer}
::-webkit-scrollbar-thumb:active{background:linear-gradient(180deg,#7986cb,#5c6bc0)}
::-webkit-scrollbar-corner{background:#0d1030}

/* TOP BAR */
.top{background:linear-gradient(90deg,#0d1234,#1a237e);padding:4px 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #2a3070;height:40px}
.top .logo{font-size:12px;font-weight:800;color:#fff;letter-spacing:0.5px;white-space:nowrap}
.top .logo span{color:#64b5f6}
.mode-tabs{display:flex;gap:1px;margin-left:8px;overflow-x:auto;flex-shrink:1;min-width:0}
.mode-tab{padding:4px 8px;background:rgba(255,255,255,.06);color:#aaa;border:none;border-radius:4px 4px 0 0;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;transition:.15s;white-space:nowrap}
.mode-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.mode-tab.active{background:#1a237e;color:#64b5f6;border:1px solid #2a3070;border-bottom-color:#1a237e}
.top-actions{margin-left:auto;display:flex;gap:3px;flex-shrink:0}
.top-actions button{background:rgba(255,255,255,.08);color:#ccc;border:1px solid #333;padding:3px 6px;border-radius:3px;cursor:pointer;font-size:9px;font-weight:600;font-family:inherit;transition:.15s}
.top-actions button:hover{background:rgba(100,181,246,.15);color:#64b5f6;border-color:#64b5f6}

/* LAYOUT */
.app{display:flex;height:calc(100vh - 40px)}

/* LEFT NAV */
.nav{width:200px;background:#0f1338;border-right:1px solid #1e2560;overflow-y:auto;flex-shrink:0;padding:8px}
.nav-grp{font-size:9px;font-weight:700;color:#5c6bc0;text-transform:uppercase;letter-spacing:1.5px;padding:8px 6px 4px;margin-top:4px}
.nav-item{padding:6px 8px;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:6px;color:#8899aa;transition:.12s;margin-bottom:1px}
.nav-item:hover{background:rgba(100,181,246,.08);color:#bbdefb}
.nav-item.active{background:rgba(100,181,246,.15);color:#64b5f6;font-weight:600}
.nav-item .dot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0}
.nav-item.done .dot{background:#4caf50}

/* MAIN AREA */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-scroll{flex:1;overflow-y:auto;padding:16px 20px}

/* BUILDER SPLIT */
.builder-split{display:flex;height:100%;overflow:hidden}
.builder-left{width:360px;border-right:1px solid #1e2560;overflow-y:auto;padding:12px;flex-shrink:0;background:#0d1030}
.builder-right{flex:1;position:relative;background:#060818}

/* CARDS */
.card{background:#111640;border:1px solid #1e2560;border-radius:6px;padding:14px;margin-bottom:12px}
.card-h{font-size:12px;font-weight:700;color:#64b5f6;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-h::before{content:'';width:3px;height:14px;background:#64b5f6;border-radius:2px}

/* FORM */
.fg{margin-bottom:10px}
.fl{font-size:10px;font-weight:600;color:#7986cb;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;display:block}
input[type=text],input[type=number],input[type=email],select,textarea{width:100%;padding:6px 8px;background:#0a0e27;border:1px solid #1e2560;border-radius:3px;color:#e0e0e0;font-size:12px;font-family:inherit}
textarea{min-height:50px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:#5c6bc0;box-shadow:0 0 0 2px rgba(92,107,192,.15)}
select option{background:#111640;color:#e0e0e0}
.row{display:grid;gap:8px}.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:4px}
.opt{border:1px solid #1e2560;border-radius:4px;padding:8px 6px;text-align:center;cursor:pointer;transition:.12s;font-size:10px;color:#8899aa}
.opt:hover{border-color:#5c6bc0;color:#bbdefb}
.opt.sel{border-color:#64b5f6;background:rgba(100,181,246,.1);color:#64b5f6;font-weight:600}
.opt em{font-size:16px;display:block;margin-bottom:2px;font-style:normal}
.chk{display:flex;align-items:center;gap:5px;font-size:11px;margin-bottom:4px;color:#8899aa}
.chk input{accent-color:#5c6bc0}
.upload-zone{border:1px dashed #5c6bc0;border-radius:4px;padding:14px;text-align:center;cursor:pointer;font-size:10px;color:#7986cb;transition:.12s}
.upload-zone:hover{background:rgba(92,107,192,.08)}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:6px 14px;border:1px solid #1e2560;background:transparent;color:#8899aa;border-radius:3px;cursor:pointer;font-weight:600;font-size:10px;font-family:inherit;transition:.12s}
.btn:hover{background:rgba(255,255,255,.05);color:#fff}
.btn-p{background:#1a237e;color:#64b5f6;border-color:#283593}.btn-p:hover{background:#283593}
.btn-g{background:#1b5e20;color:#81c784;border-color:#2e7d32}.btn-g:hover{background:#2e7d32}
.btn-o{background:#e65100;color:#ffcc80;border-color:#bf360c}.btn-o:hover{background:#bf360c}
.btn-r{background:#b71c1c;color:#ef9a9a;border-color:#c62828}.btn-r:hover{background:#c62828}

/* RESULTS */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:8px}
.rb{background:rgba(100,181,246,.06);border:1px solid #1e3a6e;padding:10px;border-radius:4px}
.rb .rl{font-size:9px;font-weight:700;color:#5c6bc0;text-transform:uppercase}
.rb .rv{font-size:16px;font-weight:700;color:#64b5f6;margin-top:2px}
.recs{background:rgba(255,152,0,.06);border-left:3px solid #ff9800;padding:10px;border-radius:0 4px 4px 0;margin-top:10px}
.recs b{color:#ffb74d}
.safety{background:rgba(76,175,80,.06);border-left:3px solid #4caf50;padding:10px;border-radius:0 4px 4px 0;margin-top:10px}

/* DRAWING */
.draw-vp{width:100%;min-height:280px;overflow:auto;background:#fff;border-radius:4px;text-align:center;position:relative}
.draw-vp svg{max-width:100%;height:auto}
.draw-bar{display:flex;gap:4px;padding:6px;background:#0d1030;flex-wrap:wrap;border-bottom:1px solid #1e2560}
.draw-bar button{padding:3px 8px;background:#1a237e;color:#90caf9;border:1px solid #283593;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit}
.draw-bar button:hover{background:#283593}
.draw-bar select{padding:2px 4px;font-size:10px;background:#0a0e27;border:1px solid #1e2560;color:#e0e0e0;border-radius:3px;font-family:inherit}

/* 3D VIEWER */
.v3d{width:100%;height:100%;position:relative}
.v3d canvas{display:block}
.v3d-info{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#90caf9;padding:6px 10px;border-radius:3px;font-size:10px}
.v3d-controls{position:absolute;bottom:8px;left:8px;display:flex;gap:4px}
.v3d-controls button{padding:4px 8px;background:rgba(26,35,126,.8);color:#90caf9;border:1px solid #283593;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}

/* COMPONENT CATALOG */
.cat-section{margin-bottom:10px}
.cat-label{font-size:10px;font-weight:700;color:#5c6bc0;padding:4px 0;cursor:pointer;display:flex;align-items:center;gap:4px}
.cat-label:hover{color:#7986cb}
.cat-items{display:none;padding-left:4px}
.cat-items.open{display:block}
.comp-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:3px;cursor:pointer;font-size:11px;color:#8899aa;transition:.1s;margin-bottom:1px}
.comp-item:hover{background:rgba(100,181,246,.08);color:#bbdefb}
.comp-item .swatch{width:14px;height:14px;border-radius:2px;border:1px solid #333;flex-shrink:0}
.comp-item .dims{font-size:9px;color:#555;margin-left:auto}

/* PLACED LIST */
.placed-item{display:flex;align-items:center;gap:6px;padding:4px 6px;background:rgba(100,181,246,.05);border:1px solid #1e2560;border-radius:3px;margin-bottom:3px;font-size:10px}
.placed-item .pname{flex:1;color:#90caf9}
.placed-item button{background:none;border:none;color:#ef5350;cursor:pointer;font-size:12px;padding:0 4px}

/* ROLE TABS */
.rtabs{display:flex;gap:0;border-bottom:1px solid #1e2560;margin-bottom:12px}
.rtab{padding:6px 12px;cursor:pointer;font-size:10px;font-weight:600;color:#667;border-bottom:2px solid transparent;transition:.12s}
.rtab:hover{color:#90caf9}
.rtab.on{color:#64b5f6;border-bottom-color:#64b5f6}
.rpanel{display:none}.rpanel.on{display:block}

/* TAGS */
.tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700}
.tag-ok{background:rgba(76,175,80,.15);color:#81c784}
.tag-warn{background:rgba(255,152,0,.15);color:#ffb74d}
.tag-fail{background:rgba(244,67,54,.15);color:#ef9a9a}

.loading{display:none;text-align:center;padding:20px}
.loading.show{display:block}
.spinner{width:24px;height:24px;border:2px solid #1e2560;border-top-color:#64b5f6;border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 6px}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{margin-top:12px;padding-top:8px;border-top:1px solid #1e2560}
.prog-bar{width:100%;height:3px;background:#1e2560;border-radius:2px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,#1a237e,#4caf50);transition:.3s}
.img-preview{max-width:100%;max-height:160px;border-radius:4px;margin-top:6px;border:1px solid #1e2560}

/* BIM tree */
.bim-tree{font-size:10px;font-family:'Cascadia Code',monospace,Consolas;background:#0a0e27;border:1px solid #1e2560;padding:8px;border-radius:4px;max-height:260px;overflow-y:auto;margin-top:6px}
.bim-tree div{padding:1px 0;color:#7986cb}
.bim-node{padding-left:14px;border-left:1px solid #1e2560}

/* CAD Canvas */
.cad-wrap{border:1px solid #1e2560;border-radius:4px;overflow:hidden}
.cad-bar{display:flex;gap:4px;padding:6px;background:#0d1030;flex-wrap:wrap;border-bottom:1px solid #1e2560}
.cad-bar button{padding:3px 8px;background:#1a237e;color:#90caf9;border:1px solid #283593;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit}
canvas.cad{display:block;width:100%;cursor:crosshair;background:#fff}

/* FLOOR PLAN EDITOR */
.fpe-wrap{display:flex;height:100%;overflow:hidden}
.fpe-sidebar{width:220px;background:#0d1030;border-right:1px solid #1e2560;overflow-y:auto;padding:10px;flex-shrink:0}
.fpe-canvas-area{flex:1;position:relative;background:#f5f5f5;overflow:hidden}
.fpe-canvas-area svg{position:absolute;top:0;left:0;cursor:crosshair}
.fpe-toolbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(13,16,48,.92);padding:5px 8px;border-radius:6px;border:1px solid #1e2560;z-index:10}
.fpe-toolbar button{padding:4px 10px;background:rgba(255,255,255,.06);color:#90caf9;border:1px solid #283593;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;transition:.12s;white-space:nowrap}
.fpe-toolbar button:hover{background:rgba(100,181,246,.2);color:#fff}
.fpe-toolbar button.fpe-active{background:#1a237e;color:#64b5f6;border-color:#5c6bc0}
.fpe-status{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.75);color:#90caf9;padding:4px 10px;border-radius:3px;font-size:10px;z-index:10;font-family:'Cascadia Code',monospace}
.fpe-dims{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.75);color:#ffb74d;padding:4px 10px;border-radius:3px;font-size:10px;z-index:10;font-family:'Cascadia Code',monospace}
.fpe-grp{margin-bottom:10px}
.fpe-grp-label{font-size:9px;font-weight:700;color:#5c6bc0;text-transform:uppercase;letter-spacing:1px;padding:5px 0 3px}
.fpe-el{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid transparent;border-radius:4px;cursor:grab;font-size:11px;color:#8899aa;transition:.12s;margin-bottom:2px;user-select:none}
.fpe-el:hover{background:rgba(100,181,246,.1);border-color:#1e2560;color:#bbdefb}
.fpe-el:active{cursor:grabbing}
.fpe-el .fpe-ico{width:28px;height:20px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.fpe-el .fpe-info{font-size:9px;color:#555;margin-left:auto}
.fpe-placed{padding:5px 7px;background:rgba(100,181,246,.06);border:1px solid #1e2560;border-radius:3px;margin-bottom:3px;font-size:10px;display:flex;align-items:center;gap:5px;cursor:pointer;transition:.12s}
.fpe-placed:hover{border-color:#5c6bc0}
.fpe-placed.fpe-sel{border-color:#64b5f6;background:rgba(100,181,246,.15)}
.fpe-placed .pname{flex:1;color:#90caf9}
.fpe-placed button{background:none;border:none;color:#ef5350;cursor:pointer;font-size:12px;padding:0 3px}
.fpe-floor-tabs{display:flex;gap:2px;margin-bottom:8px}
.fpe-floor-tab{padding:4px 10px;background:rgba(255,255,255,.05);color:#667;border:1px solid #1e2560;border-radius:3px;cursor:pointer;font-size:10px;font-weight:600;transition:.12s}
.fpe-floor-tab:hover{border-color:#5c6bc0;color:#90caf9}
.fpe-floor-tab.on{background:#1a237e;color:#64b5f6;border-color:#5c6bc0}
.fpe-props{background:#111640;border:1px solid #1e2560;border-radius:4px;padding:8px;margin-top:8px}
.fpe-props .fl{font-size:9px}
.fpe-handle{fill:#64b5f6;stroke:#fff;stroke-width:1;cursor:nwse-resize}
.fpe-handle:hover{fill:#42a5f5}

@media(max-width:900px){.nav{display:none}.builder-left{width:100%}.builder-split{flex-direction:column}.fpe-sidebar{width:100%}.fpe-wrap{flex-direction:column}}

/* PRO-SUITE SUB-TAB NAVIGATION */
.pro-sub-tabs{display:flex;gap:2px;overflow-x:auto;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #1e2560}
.pro-sub-tab{padding:6px 12px;background:rgba(255,255,255,.04);color:#8899aa;border:1px solid #1e2560;border-radius:4px 4px 0 0;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;white-space:nowrap;transition:.12s}
.pro-sub-tab:hover{background:rgba(100,181,246,.08);color:#bbdefb}
.pro-sub-tab.active{background:#1a237e;color:#64b5f6;border-color:#283593}
.pro-page{display:grid;grid-template-columns:380px 1fr;gap:14px;height:calc(100vh - 150px);overflow:hidden}
.pro-inputs{overflow-y:auto;padding-right:4px}
.pro-output{background:#060818;border:1px solid #1e2560;border-radius:6px;padding:12px;overflow:auto}
.pro-output .hd{font-size:11px;color:#7986cb;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pro-output pre{margin:0;font:11px/1.4 'Cascadia Code',Consolas,monospace;color:#a5b4fc;white-space:pre-wrap;word-break:break-word}
.pro-output .k{color:#64b5f6}.pro-output .s{color:#81c784}.pro-output .n{color:#ffb74d}.pro-output .b{color:#ef9a9a}
.pro-refs{font-size:10px;color:#555;margin-top:8px;padding-top:6px;border-top:1px solid #1e2560}
.pro-refs b{color:#7986cb}
.pro-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin-right:6px;font-family:'Cascadia Code',monospace}
.pro-badge.get{background:#1b5e20;color:#a5d6a7}
.pro-badge.post{background:#0d47a1;color:#90caf9}
.pro-headline{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-bottom:10px}
.pro-output .err{background:rgba(244,67,54,.1);border:1px solid #ef5350;color:#ef9a9a;padding:10px;border-radius:4px;font-size:11px;margin-bottom:10px}
@media(max-width:900px){.pro-page{grid-template-columns:1fr;height:auto}}
</style>
</head>
<body>

/** Detect country from a free-text location and return its statutory regulators.
 *  Returns {country, arch, eng, qs, contractor, permit, notes}. */
function getStatutoryReqs(loc){
  const s = String(loc||'').toLowerCase();
  const cityToCountry = {
    'nairobi':'Kenya','mombasa':'Kenya','kisumu':'Kenya','nakuru':'Kenya','eldoret':'Kenya',
    'thika':'Kenya','kiambu':'Kenya','machakos':'Kenya','kajiado':'Kenya','meru':'Kenya','nyeri':'Kenya',
    'kampala':'Uganda','entebbe':'Uganda',
    'dar es salaam':'Tanzania','dodoma':'Tanzania','arusha':'Tanzania',
    'kigali':'Rwanda','addis ababa':'Ethiopia',
    'lagos':'Nigeria','abuja':'Nigeria','port harcourt':'Nigeria','ibadan':'Nigeria',
    'accra':'Ghana','kumasi':'Ghana',
    'johannesburg':'South Africa','cape town':'South Africa','durban':'South Africa','pretoria':'South Africa',
    'cairo':'Egypt','alexandria':'Egypt','casablanca':'Morocco','rabat':'Morocco',
    'dubai':'UAE','abu dhabi':'UAE','sharjah':'UAE',
    'riyadh':'Saudi Arabia','jeddah':'Saudi Arabia','dammam':'Saudi Arabia','mecca':'Saudi Arabia',
    'doha':'Qatar',
    'london':'UK','manchester':'UK','birmingham':'UK','edinburgh':'UK','glasgow':'UK','liverpool':'UK','bristol':'UK',
    'dublin':'Ireland','cork':'Ireland',
    'madrid':'Spain','barcelona':'Spain','marbella':'Spain','seville':'Spain','valencia':'Spain','malaga':'Spain',
    'berlin':'Germany','munich':'Germany','hamburg':'Germany','frankfurt':'Germany',
    'paris':'France','lyon':'France','marseille':'France','nice':'France',
    'rome':'Italy','milan':'Italy','naples':'Italy','turin':'Italy',
    'amsterdam':'Netherlands','rotterdam':'Netherlands','the hague':'Netherlands',
    'new york':'USA','los angeles':'USA','chicago':'USA','houston':'USA','miami':'USA','san francisco':'USA','boston':'USA','seattle':'USA','washington':'USA','dallas':'USA','atlanta':'USA',
    'toronto':'Canada','vancouver':'Canada','montreal':'Canada','calgary':'Canada','ottawa':'Canada',
    'mexico city':'Mexico','guadalajara':'Mexico','monterrey':'Mexico',
    'sao paulo':'Brazil','rio':'Brazil','rio de janeiro':'Brazil','brasilia':'Brazil',
    'mumbai':'India','delhi':'India','bangalore':'India','chennai':'India','hyderabad':'India','pune':'India','kolkata':'India',
    'beijing':'China','shanghai':'China','shenzhen':'China','guangzhou':'China',
    'tokyo':'Japan','osaka':'Japan','kyoto':'Japan',
    'singapore':'Singapore',
    'sydney':'Australia','melbourne':'Australia','brisbane':'Australia','perth':'Australia','adelaide':'Australia',
    'auckland':'New Zealand','wellington':'New Zealand',
  };
  let country = '';
  for (const k of Object.keys(STATUTORY_REQUIREMENTS)) {
    if (k === '_DEFAULT') continue;
    if (s.includes(k.toLowerCase())) { country = k; break; }
  }
  if (!country) {
    for (const [city, c] of Object.entries(cityToCountry)) {
      if (s.includes(city)) { country = c; break; }
    }
  }
  const r = STATUTORY_REQUIREMENTS[country] || STATUTORY_REQUIREMENTS._DEFAULT;
  return Object.assign({country: country || 'Other'}, r);
}

   synchronous. The component catalog is only needed by the Builder tab,
   so we fetch it lazily on first click — saves ~50-200ms on page load
   over slow networks. */
async function init(){
    buildNav();
    setMode('phases');
    // Warm the catalog in the background AFTER paint. requestIdleCallback
    // if available, otherwise a short setTimeout so it doesn't block
    // interactive tasks.
    const warm = async () => {

      try{
        const r = await fetch(API+'/components/catalog');
        const d = await r.json();
        if (d.success) catalog = d.catalog;

    main.innerHTML += _reqCss;

}

async function repBuild(){
    const body = document.getElementById('rep-body');
    if(!body) return;
    try{ repCheckPaystackReturn(); }catch(_e){}
    // Persist legal/professional metadata across page reloads
    try {
        localStorage.setItem('eims_rep_meta', JSON.stringify({
            name:   document.getElementById('rp-name')?.value   || '',
            client: document.getElementById('rp-client')?.value || '',
            plot:   document.getElementById('rp-plot')?.value   || '',
            coords: document.getElementById('rp-coords')?.value || '',
            title:  document.getElementById('rp-title')?.value  || '',
            arch:   document.getElementById('rp-arch')?.value   || '',
            eng:    document.getElementById('rp-eng')?.value    || '',
            qs:     document.getElementById('rp-qs')?.value     || ''
        }));
    } catch(_) { /* localStorage may be unavailable in private mode */ }
    body.innerHTML = '<div style="text-align:center;color:#0d47a1;padding:80px"><div style="font-size:36px">\u23f3</div><div style="margin-top:12px;font-weight:600">Building comprehensive report\u2026</div><div style="font-size:11px;color:#666;margin-top:8px">Generating drawings, 3D model, render scene, BOQ, quotation, payment schedule</div></div>';
    // ---- Validation & Auto-Correction Engine (pre-flight) ----
    const _autoFixes = [];
    let _loc = (document.getElementById('rp-loc').value || '').trim();
    let _cur = (document.getElementById('rp-cur').value || '').trim();
    let _area = parseFloat(document.getElementById('rp-area').value);
    let _stories = parseInt(document.getElementById('rp-stories').value);
    let _units = parseInt(document.getElementById('rp-units').value);
    let _beds = parseInt(document.getElementById('rp-beds').value);
    if(!_loc){ const fb=(document.getElementById('p1_location')?.value||'').trim()||'Nairobi, Kenya'; _autoFixes.push(['Location','(empty)',fb,'Pulled from wizard / fallback to capital city']); _loc=fb; document.getElementById('rp-loc').value=fb; }
    const _isKE = /kenya|nairobi|mombasa|kisumu|nakuru|eldoret|thika|machakos|kiambu|kajiado/i.test(_loc);
    if(_isKE && _cur && _cur.toUpperCase()!=='KES'){ _autoFixes.push(['Currency',_cur,'KES','Kenyan locality detected — statutory billing currency is KES (CBK Cap.491)']); _cur='KES'; document.getElementById('rp-cur').value='KES'; }
    if(!isFinite(_stories)||_stories<1){ _autoFixes.push(['Stories',_stories,1,'Min 1 storey enforced']); _stories=1; }
    if(!isFinite(_units)||_units<1){ _autoFixes.push(['Units',_units,1,'Min 1 unit enforced']); _units=1; }
    if(!isFinite(_beds)||_beds<1){ _autoFixes.push(['Bedrooms',_beds,1,'Min 1 bedroom enforced']); _beds=1; }
    if(_units > Math.floor(_area/30)){ const fix=Math.max(1,Math.floor(_area/30)); _autoFixes.push(['Units',_units,fix,`Cannot exceed area/30 m² (KQS 2025 min unit footprint)`]); _units=fix; }
    // Auto-pick foundation by stories + area + (assumed) bearing capacity
    let _foundation;
    if(_stories>=3 || _area>500) _foundation='raft';
    else if(_stories>=2)         _foundation='strip+ground beam';
    else if(_area<=120)          _foundation='pad';
    else                          _foundation='strip';
    _autoFixes.push(['Foundation type','(auto)',_foundation,`Selected from ${_stories}-storey × ${_area} m² rule (BS 8004 §7)`]);
    // Floor count = stories (single source of truth — eliminates the storeys-vs-floor-count contradiction)
    const _floorCount = _stories;
    const p = {
        country: _loc,
        currency: _cur || 'KES',
        area: _area,
        stories: _stories,
        floor_count: _floorCount,
        units: _units,
        bedrooms: _beds,
        location: _loc,
        building_type: 'residential',
        foundation_type: _foundation,
        style: document.getElementById('rp-style').value,
        client_name: document.getElementById('rp-client').value,
        company_name: 'EIMS Construction Solutions',

    };
    // Pass any overridden prices from the Costing tab
    try{
        const ov = (typeof crLoadOverrides==='function') ? crLoadOverrides(p.country) : {};
        if(ov && Object.keys(ov).length) p.price_overrides = ov;
    }catch(e){}
    // Fan out all 4 backends in parallel
    const fjson = (url, opt) => fetch(API+url, opt).then(r=>r.json()).catch(e=>({success:false,error:String(e)}));
    const reqOpts = {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(p)};
    const [report, quote, drawings, render] = await Promise.all([
        fjson('/report/comprehensive', reqOpts),
        fjson('/report/quotation', reqOpts),
        fjson('/drawings/all', reqOpts),
        fjson('/render/scene', {method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({environment:'outdoor_daylight', quality:'high', resolution:[1920,1080], objects:[{type:'building'}]})}),
    ]);
    if(!report || !report.success){
        body.innerHTML = '<div style="color:#b71c1c;padding:40px;text-align:center">Report generation failed: '+(report?.error||'unknown')+'</div>';
        return;
    }
    // ---- Discipline-specific deep analysis (Architect / Engineer / QS / Safety) ----
    // Each call is fail-soft — the report still renders if one endpoint errors
    body.innerHTML += '<div style="text-align:center;color:#666;padding:20px;font-size:11px">⚙️ Running 14 discipline calculations (daylight, U-value, acoustics, egress, accessibility, shadow study, wind loads, geotech, RC design, embodied carbon, value-engineering, CPM schedule, ISO-45001 risk register, method statements)…</div>';
    const ss = report.structural_summary||{};
    const post = (b) => ({method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b)});
    const concreteKg = (ss.total_concrete_m3 || p.area*0.15) * 2400;
    const steelKg    = ss.total_steel_kg || p.area*30;
    const blocksKg   = (ss.total_blocks || p.area*15) * 15;
    const H = 3.5 * Math.max(1, p.stories||1);
    const L = Math.sqrt(p.area) * 1.2;
    const W = Math.sqrt(p.area) * 0.83;
    const baseQuoteItems = (quote && quote.trade_sections)
        ? Object.values(quote.trade_sections).flatMap(ts => (ts.items||[]).map(it=>({
              description: it.description, amount: Number(it.amount)||0,
              category: (it.unit==='m³'||it.unit==='kg') ? 'structure' : 'finishes'
          }))).slice(0, 40)
        : [];
    const extras = {};
    const [
        daylight, uvalue, acoustics, egress, access, shadow,
        wind, geotech, rcbeam,
        carbon, ve, cpm,
        risks, msCatalog
    ] = await Promise.all([
        // ---- ARCHITECT ----
        fjson('/arch/daylight/adf', post({
            window_area_m2: p.area*0.15, total_internal_surface_m2: p.area*5,
            T_glass:0.68, sky_angle_deg:65, avg_reflectance:0.5,
            maintenance_factor:0.9, frame_factor:0.7
        })),
        fjson('/arch/uvalue', post({
            heat_flow:'horizontal',
            layers:[
                {description:'External plaster',  thickness_m:0.020, lambda_W_mK:0.60,  source:'EN ISO 10456:2007 Table A.13'},
                {description:'Concrete block 200', thickness_m:0.200, lambda_W_mK:1.00,  source:'EN ISO 10456:2007 Table A.4'},
                {description:'EPS insulation 50',  thickness_m:0.050, lambda_W_mK:0.038, source:'EN ISO 10456:2007 Table A.7'},
                {description:'Internal plaster',   thickness_m:0.012, lambda_W_mK:0.60,  source:'EN ISO 10456:2007 Table A.13'}
            ]
        })),
        fjson('/arch/acoustics/reverberation', post({
            volume_m3: p.area*3, method:'sabine',
            surfaces:[
                {description:'plaster on solid wall', area_m2:p.area*2,    alpha:0.04, source:'EN ISO 11654 Table A.1'},
                {description:'concrete floor',         area_m2:p.area,      alpha:0.02, source:'EN ISO 11654 Table A.1'},
                {description:'glazing',                area_m2:p.area*0.15, alpha:0.18, source:'EN ISO 11654 Table A.1'},
                {description:'soft furnishings',       area_m2:p.area*0.5,  alpha:0.40, source:'BS 8233:2014 Annex'}
            ]
        })),
        fjson('/arch/egress', post({
            occupancy_type:'residential', floor_area_m2:p.area,
            sprinklered:true, voice_notification:false
        })),
        fjson('/arch/accessibility/check', post({
            jurisdiction:'strictest',
            measurements:{
                door_clear_width_mm:900, corridor_width_mm:1200,
                ramp_slope_pct:7, wc_clear_diameter_mm:1500, threshold_height_mm:15
            }
        })),
        fjson('/arch/shadow/solstice', post({lat:-1.286, lng:36.817, pole_height_m:H})),
        // ---- ENGINEER ----
        fjson('/loads/wind/eurocode', post({
            vb_ms:24, height_m:H, length_m:L, width_m:W,
            terrain_category:'II', co:1.0, cprob:1.0, cdir:1.0, cseason:1.0,
            rho_kg_m3:1.25
        })),
        fjson('/geotech/bearing/terzaghi', post({
            c_kPa:15, phi_deg:28, gamma_kN_m3:18, B_m:0.6, Df_m:1.2, shape:'strip'
        })),
        fjson('/rc/beam/bending', post({
            b_mm:300, h_mm:500, d_mm:450, As_mm2:1500,
            fck_MPa:30, fyk_MPa:500, Med_kNm:120
        })),
        // ---- QS ----
        fjson('/qs/carbon/assess', post({
            assessment_stage:'RIBA-3',
            materials:[
                {name:'concrete',        quantity_kg:concreteKg, ec_kgco2e_per_kg:0.13, factor_source:'ICE Database v3.0 (Bath, 2019)'},
                {name:'reinforcing steel', quantity_kg:steelKg,  ec_kgco2e_per_kg:1.85, factor_source:'World Steel Association (2020)'},

    // Stash the last build so Download buttons can export raw data + project name
