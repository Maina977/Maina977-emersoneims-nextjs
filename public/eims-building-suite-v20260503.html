/* In-memory cache for GET responses. Keyed by full URL. Static catalogs
   (palettes, materials, plants, methods, fx rates, etc.) change rarely —
   we cache for 60 s so re-entering a tab is instant instead of waiting
   for a network round-trip every time. POST/PUT/DELETE are never cached. */
const PRO_GET_CACHE = new Map(); // url -> {t: timestamp, ctype, payload}
const PRO_GET_CACHE_TTL_MS = 60_000;
function proCacheGet(url){
  const hit = PRO_GET_CACHE.get(url);
  if (!hit) return null;
  if (Date.now() - hit.t > PRO_GET_CACHE_TTL_MS){ PRO_GET_CACHE.delete(url); return null; }
  return hit;
}
function proCachePut(url, ctype, payload){
  PRO_GET_CACHE.set(url, {t: Date.now(), ctype, payload});
  // Cap cache size to avoid unbounded memory growth in a long session.
  if (PRO_GET_CACHE.size > 80){
    const oldest = [...PRO_GET_CACHE.entries()].sort((a,b)=>a[1].t-b[1].t)[0];
    if (oldest) PRO_GET_CACHE.delete(oldest[0]);
  }
}
async function proExecute(calc){
  const outHd=document.getElementById('pro-out-head');
  const outBd=document.getElementById('pro-out-body');
  if (!outHd || !outBd) return; // pane was swapped out before we ran
  let body,qs;
  try{ ({body,qs}=proReadForm(calc)); }
  catch(err){
    outHd.innerHTML=`<span style="color:#ef9a9a">INPUT ERROR</span>`;
    outBd.innerHTML=`<div class="err">${err.message||err}</div>`;
    return;
  }
  // Pollinations AI path — builds a prompt client-side and hits pollinations.ai
  // directly (no API key, images come back as JPEG). Same-origin CSP policy
  // whitelists image.pollinations.ai for img-src + connect-src.
  if (calc.mth === 'POLLINATIONS'){
    return proExecutePollinations(calc, body);
  }
  let url=calc.ep;
  const qstr=new URLSearchParams(qs).toString();
  if(qstr) url+=(url.includes('?')?'&':'?')+qstr;
  // Serve GET responses from in-memory cache when fresh. Massive perceived
  // speedup when the user revisits a Pro tab.
  if (calc.mth === 'GET'){
    const hit = proCacheGet(url);
    if (hit){
      outHd.innerHTML = `<span style="color:#e0e0e0;font-weight:600">${proEscape(calc.title||'Result')}</span><span style="color:#81c784">Ready (cached)</span>`;
      if (hit.ctype.startsWith('application/json')) outBd.innerHTML = proRenderResult(calc.ep, hit.payload);
      else outBd.innerHTML = hit.payload;
      return;
    }
  }
  outHd.innerHTML = `<span style="color:#e0e0e0;font-weight:600">${proEscape(calc.title||'Result')}</span><span style="color:#7986cb">Working…</span>`;
  try{
    const opts={method:calc.mth,headers:{'Content-Type':'application/json'}};
    if(calc.mth!=='GET') opts.body=JSON.stringify(body);
    const r=await fetch(url,opts);
    const ctype=r.headers.get('Content-Type')||'';
    outHd.innerHTML = `<span style="color:#e0e0e0;font-weight:600">${proEscape(calc.title||'Result')}</span><span style="color:${r.ok?'#81c784':'#ef9a9a'}">${r.ok?'Ready':'Unable to complete'}</span>`;
    if(ctype.startsWith('application/json')){
      const j=await r.json();
      outBd.innerHTML=proRenderResult(calc.ep, j);
      if (calc.mth === 'GET' && r.ok) proCachePut(url, ctype, j);
    } else if(ctype.startsWith('image/svg')){
      const svg=await r.text();
      const html=`<div style="background:#fff;padding:10px;border-radius:6px;overflow:auto;max-height:600px">${svg}</div>
        <div style="margin-top:8px"><button class="btn" onclick="proDownloadText(\`${svg.replace(/`/g,'\\\`')}\`,'eims_drawing.svg','image/svg+xml')">⬇ Download SVG</button></div>`;
      outBd.innerHTML=html;
      if (calc.mth === 'GET' && r.ok) proCachePut(url, ctype, html);
    } else if(ctype.startsWith('image/')||ctype.startsWith('application/octet-stream')||ctype.includes('dxf')||ctype.includes('model')||ctype.includes('sheet')){
      const blob=await r.blob();
      const dl=URL.createObjectURL(blob);
      const fname=(r.headers.get('Content-Disposition')||'').match(/filename=([^;]+)/)?.[1]||'eims_download';
      outBd.innerHTML=`<div style="color:#81c784">Binary response received (${blob.size.toLocaleString()} bytes, ${blob.type}).</div>
        <a href="${dl}" download="${fname}" style="display:inline-block;margin-top:8px;padding:6px 12px;background:#1a237e;color:#64b5f6;text-decoration:none;border-radius:4px;border:1px solid #283593">⬇ Download ${fname}</a>`;
    } else if(ctype.includes('text/html') || ctype.includes('application/xhtml')){
      // HTML response — render the *page* in a sandboxed iframe instead of
      // dumping raw markup at the client. This is what serves /api/design/villa/viewer,
      // /api/health-dashboards, and any other server-rendered page.
      const html=await r.text();
      const blob=new Blob([html], {type:'text/html'});
      const dl=URL.createObjectURL(blob);
      outBd.innerHTML=`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="color:#81c784;font-size:11px">\u2705 Interactive page loaded</span>
          <span style="flex:1"></span>
          <a href="${calc.ep}" target="_blank" class="btn">\u26f6 Open full screen</a>
          <a href="${dl}" download="eims_${(calc.id||'page')}.html" class="btn">\u2b07 Download HTML</a>
        </div>
        <iframe src="${calc.ep}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" style="width:100%;height:600px;border:1px solid #1e2560;border-radius:6px;background:#1a1d24" allow="fullscreen"></iframe>`;
      if (calc.mth === 'GET' && r.ok) proCachePut(url, ctype, outBd.innerHTML);
    } else {
      const t=await r.text();
      // Try to detect HTML even when the server forgot to set the right Content-Type
      const looksHtml = /^\s*<(!doctype|html|head|body|div|script|style)\b/i.test(t);
      if (looksHtml){
        const blob=new Blob([t], {type:'text/html'});
        const dl=URL.createObjectURL(blob);
        outBd.innerHTML=`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="color:#ffb74d;font-size:11px">\u26a0 HTML response (server returned <code>${ctype||'unknown'}</code>)</span>
            <span style="flex:1"></span>
            <a href="${calc.ep}" target="_blank" class="btn">\u26f6 Open in new tab</a>
            <a href="${dl}" download="eims_${(calc.id||'page')}.html" class="btn">\u2b07 Download</a>
          </div>
          <iframe srcdoc="${t.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" style="width:100%;height:600px;border:1px solid #1e2560;border-radius:6px;background:#1a1d24" allow="fullscreen"></iframe>`;
      } else {
        // Plain text response — in client mode, present as a soft info card
        // rather than a raw <pre> dump so it doesn't look like a stack trace.
        outBd.innerHTML = DEV_MODE
          ? `<pre>${t.replace(/</g,'&lt;')}</pre>`
          : `<div style="padding:14px;background:rgba(100,181,246,.04);border:1px solid #1e2560;border-radius:6px;color:#e0e0e0;font-size:12px;line-height:1.6;white-space:pre-wrap">${proEscape(t)}</div>`;
      }
    }
  }catch(err){
    outHd.innerHTML=`<span style="color:#ef9a9a">ERROR</span>`;
    outBd.innerHTML=`<div class="err">${err.message||err}</div>`;
  }
}
/* Pollinations AI image generation — no API key, direct URL GET.
   We build a detailed architectural prompt, hash into a URL, browser
   loads the image. Model=flux gives the best quality-for-architecture.
   The image request goes direct from browser to pollinations.ai — CSP
   whitelists their host. No data passes through our server. */
function proBuildExteriorPrompt(p){
  const styleMap = {
    'marbella_modern':'luxury Marbella modern villa with minimalist white micro-cement render, floor-to-ceiling glass, flat roof, travertine terrace, infinity pool, olive trees, SAOTA-inspired architecture',
    'andalusian_courtyard':'Andalusian courtyard villa with whitewashed walls, terracotta roof tiles, arched windows, interior patio with central fountain, Moorish tilework details, bougainvillea',
    'mediterranean_classic':'classic Mediterranean villa with cream stucco, red clay roof tiles, timber shutters, stone arches, climbing roses, cypress trees, ochre wash',
    'contemporary_minimalist':'contemporary minimalist villa, concrete and glass, cantilevered volumes, integrated landscape, monochrome palette',
    'tropical_beach':'tropical beach villa, open plan, timber slat screens, palm trees, infinity pool merging with ocean, thatched canopies',
    'alpine_chalet':'alpine stone and timber chalet, slate roof, large south-facing glazing, pine forest, mountain backdrop',
  };
  const base = styleMap[p.style] || p.style;
  return [
    'architectural photography',
    base,
    (p.bedrooms||4)+' bedroom, '+(p.levels||2)+' storey',
    'setting: ' + (p.setting||'Mediterranean coast'),
    p.features ? 'featuring '+p.features : '',
    'lit by '+(p.time_of_day||'golden hour'),
    'professional architectural photograph, wide angle, ultra realistic, award winning, 8k, dramatic atmosphere, no people'
  ].filter(Boolean).join(', ');
}
function proBuildInteriorPrompt(p){
  return [
    'interior architectural photography',
    (p.style||'marbella_modern').replace(/_/g,' ')+' style',
    p.room_type||'living room',
    p.palette ? 'palette: '+p.palette : '',
    p.mood ? 'mood: '+p.mood : '',
    'lit by '+(p.time_of_day||'afternoon natural light'),
    'professional interior photograph, ultra realistic, architectural digest quality, 8k, natural materials, no people'
  ].filter(Boolean).join(', ');
}
// Module-level so the Cancel button can reach it
let proRenderAbort = null;
function proCancelRender(){
  if (proRenderAbort){ try { proRenderAbort.abort('cancelled'); } catch{} proRenderAbort = null; }
}
async function proExecutePollinations(calc, body){
  const outHd=document.getElementById('pro-out-head');
  const outBd=document.getElementById('pro-out-body');
  const seed = Number(body.seed)||Math.floor(Math.random()*100000);
  const prompt = calc.ep==='POLLINATIONS_EXTERIOR'
    ? proBuildExteriorPrompt(body)
    : proBuildInteriorPrompt(body);
  const w=1024, h=576;

  outHd.innerHTML = `<span><span class="pro-badge" style="background:#4c1d95;color:#fff">AI</span>Pollinations</span><span style="color:#7986cb">generating…</span>`;
  outBd.innerHTML = `
    <div style="padding:14px;background:rgba(100,181,246,.06);border-left:3px solid #64b5f6;border-radius:0 4px 4px 0;margin-bottom:10px;font-size:11px;color:#a5b4fc;line-height:1.55">
      <b style="color:#64b5f6">Prompt:</b> ${proEscape(prompt)}
    </div>
    <div id="pro-ai-status" style="text-align:center;padding:40px;background:#0a0e27;border:1px solid #1e2560;border-radius:6px">
      <div class="spinner" style="margin:0 auto 10px"></div>
      <div style="color:#7986cb;font-size:11px">Proxying via backend · trying flux-dev, flux-schnell, turbo</div>
    </div>`;

  // Pollinations.ai blocks browser-direct fetches with a Cloudflare Turnstile
  // gate (rejects any request carrying browser Origin/Referer headers). We proxy
  // through `/api/ai/render`, which runs server-side without those headers and
  // handles model fall-through internally.
  const url = `${API}/ai/render?prompt=${encodeURIComponent(prompt)}&width=${w}&height=${h}&seed=${seed}`;
  const TIMEOUT_MS = 120000;
  const status = document.getElementById('pro-ai-status');
  const ctrl = new AbortController();
  proRenderAbort = ctrl;
  const t0 = Date.now();
  const renderProgress = (elapsed) => `
      <div class="spinner" style="margin:0 auto 10px"></div>
      <div style="color:#7986cb;font-size:11px">Backend proxying request to Pollinations · trying flux-dev → flux-schnell → turbo</div>
      <div style="margin-top:4px;color:#5c6bc0;font-size:10px">elapsed ${elapsed}s</div>
      <button class="btn" style="margin-top:10px;font-size:10px" onclick="proCancelRender()">✕ Cancel</button>`;
  if (status) status.innerHTML = renderProgress(0);
  const tick = setInterval(() => {
    const s = document.getElementById('pro-ai-status');
    if (s && proRenderAbort === ctrl) s.innerHTML = renderProgress(((Date.now()-t0)/1000|0));
  }, 500);
  const timer = setTimeout(() => ctrl.abort('timeout'), TIMEOUT_MS);

  let lastError = null;
  try {
    const r = await fetch(url, {method:'GET', cache:'no-store', signal: ctrl.signal});
    clearTimeout(timer); clearInterval(tick);
    const ctype = r.headers.get('Content-Type') || '';
    if (r.ok && ctype.startsWith('image/')){
      const blob = await r.blob();
      const blobUrl = URL.createObjectURL(blob);
      const usedModel = r.headers.get('X-AI-Render-Model') || '?';
      const usedSeed = r.headers.get('X-AI-Render-Seed') || seed;
      proRenderAbort = null;
      outHd.innerHTML = `<span><span class="pro-badge" style="background:#4c1d95;color:#fff">AI</span>Pollinations · ${proEscape(usedModel)}</span><span style="color:#81c784">✓ ${w}×${h}  ·  ${(blob.size/1024).toFixed(0)} KB · ${((Date.now()-t0)/1000).toFixed(1)}s</span>`;
      outBd.innerHTML = `
        <div style="padding:10px 14px;background:rgba(100,181,246,.06);border-left:3px solid #64b5f6;border-radius:0 4px 4px 0;margin-bottom:10px;font-size:11px;color:#a5b4fc;line-height:1.55">
          <b style="color:#64b5f6">Prompt:</b> ${proEscape(prompt)}
          <div style="color:#7986cb;margin-top:4px">Seed: ${proEscape(String(usedSeed))} · Model: ${proEscape(usedModel)} · Same prompt + same seed = same image. Change seed for variations.</div>
        </div>
        <div style="background:#000;border-radius:6px;overflow:hidden;border:1px solid #1e2560">
          <img src="${blobUrl}" style="display:block;width:100%;height:auto" alt="AI render"/>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <a href="${blobUrl}" download="eims_ai_render_${usedSeed}.jpg" class="btn btn-g">⇩ Download</a>
          <button class="btn" onclick="document.getElementById('pf_seed').value=Math.floor(Math.random()*100000); proExecute(PRO_CATALOG.find(x=>x.id==='${calc.id}'))">🎲 Regenerate (new seed)</button>
        </div>
        <div style="margin-top:10px;padding:8px 10px;background:rgba(255,152,0,.06);border-left:3px solid #ff9800;border-radius:0 4px 4px 0;font-size:10px;color:#ffb74d">
          ⚠ AI-generated concept art — for mood boards & client presentations, not construction. Final geometry must come from the Villa Studio CAD/BIM pipeline.
        </div>`;
      return;
    }
    // Backend returned a JSON error
    let detail = '';
    try { const j = await r.json(); detail = (j.detail || j.error || '') + (j.models_tried ? ` — tried ${j.models_tried.join(', ')}` : ''); } catch(_){}
    lastError = `HTTP ${r.status}${detail ? ': ' + detail : ''}`;
  } catch (e) {
    clearTimeout(timer); clearInterval(tick);
    if (e.name === 'AbortError'){
      if (ctrl.signal.reason === 'cancelled'){
        proRenderAbort = null;
        outHd.innerHTML = `<span style="color:#7986cb">Cancelled</span>`;
        outBd.innerHTML = `<div style="padding:14px;text-align:center;color:#7986cb;font-size:11px">
          Render cancelled. <button class="btn" style="margin-left:8px" onclick="proExecute(PRO_CATALOG.find(x=>x.id==='${calc.id}'))">↻ Try again</button>
        </div>`;
        return;
      }
      lastError = `Render timed out after ${TIMEOUT_MS/1000}s.`;
    } else {
      lastError = 'network error: ' + (e.message || e);
    }
  }
  proRenderAbort = null;

  outHd.innerHTML = `<span style="color:#ef9a9a">AI GENERATION FAILED</span>`;
  outBd.innerHTML = `<div class="err" style="font-size:12px;line-height:1.6">
    <b>Pollinations request failed.</b><br><br>
    <div style="font-family:monospace;font-size:10px;color:#ef9a9a;background:#1a0a0a;padding:8px;border-radius:4px;margin:6px 0">${proEscape(lastError || 'unknown')}</div>
    <div style="color:#e0e0e0;margin-top:10px;font-size:11px">
      <b style="color:#ffb74d">Most likely cause:</b> upstream Pollinations.ai is throttling, or all three models are warming caches. Wait ~60 s and click 🎲 Regenerate.
    </div>
  </div>`;
}

function proShowCalc(calcId){
  const c=PRO_CATALOG.find(x=>x.id===calcId); if(!c) return;
  document.querySelectorAll('.pro-sub-tab').forEach(b=>b.classList.toggle('active',b.dataset.cid===calcId));
  if(c.embed||c.openInTab){
    const pane=document.getElementById('pro-pane');
    const refsHtml=c.refs&&c.refs.length?`<div style="color:#7986cb;font-size:10px;margin-top:6px"><b>Includes:</b> ${c.refs.join(' · ')}</div>`:'';
    pane.innerHTML=`
      <div style="display:flex;flex-direction:column;height:100%;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(100,181,246,.06);border-radius:6px;border:1px solid #1e2560">
          <div style="flex:1">
            <div style="color:#64b5f6;font-weight:600;font-size:13px">${c.title}</div>
            ${refsHtml}
          </div>
          <button class="btn" onclick="document.getElementById('pro-iframe').src=document.getElementById('pro-iframe').src">↻ Reload</button>
          <a href="${c.ep}" target="_blank" class="btn btn-p">⛶ Full screen</a>
        </div>
        <iframe id="pro-iframe" src="${c.ep}" style="flex:1;width:100%;min-height:500px;border:1px solid #1e2560;border-radius:6px;background:#1a1d24" allow="fullscreen"></iframe>
      </div>`;
    return;
  }
  const formHtml=c.f.map(proFieldInput).join('');
  const refsHtml=c.refs&&c.refs.length?`<div class="pro-refs"><b>Standards / sources:</b> ${c.refs.join(' · ')}</div>`:'';
  const pane=document.getElementById('pro-pane');
  pane.innerHTML=`
    <div class="pro-page">
      <div class="pro-inputs">
        <div class="card">
          <div class="card-h">${c.title}</div>
          ${c.desc?`<div style="color:#8899aa;font-size:11px;margin-bottom:10px;line-height:1.5">${c.desc}</div>`:''}
          ${formHtml||'<div style="color:#7986cb;font-size:11px;margin:12px 0">No inputs required — press Run to fetch.</div>'}
          <div class="btn-row">
            <button class="btn btn-g" onclick="proExecute(PRO_CATALOG.find(x=>x.id==='${calcId}'))">▶ Run</button>
            <button class="btn" onclick="document.getElementById('pro-out-body').innerHTML='<div style=color:#555>— cleared —</div>';">Clear</button>
          </div>
          ${refsHtml}
        </div>
      </div>
      <div class="pro-output">
        <div class="hd" id="pro-out-head"><span>Response</span><span style="color:#555">— awaiting execution —</span></div>
        <div id="pro-out-body"><div style="color:#555;font-size:11px">Press ▶ Run. Results appear here as summaries, tables, or download links.</div></div>
      </div>
    </div>`;
  // Auto-run GET tiles that have no required inputs (or only optional querystring fields)
  // — the user shouldn't have to click Run just to see a catalog like anchor colours.
  // Defer to the next animation frame so the tab DOM paints FIRST; the user
  // perceives the section as instant and the spinner appears in-place.
  const autoRun = c.mth==='GET' && (!c.f || c.f.every(f => f.qs || f.def==null || f.def===''));
  if (autoRun){
    // Show a placeholder immediately so users see the panel is alive
    const outBd = document.getElementById('pro-out-body');
    const cached = proCacheGet(c.ep);
    if (!cached && outBd) outBd.innerHTML = '<div style="color:#7986cb;font-size:11px">Loading…</div>';
    requestAnimationFrame(()=> proExecute(c));
  }
}
function proShowGroup(grp,icon){
  const items=PRO_CATALOG.filter(x=>x.grp===grp);
  const main=document.getElementById('mainArea');
  main.innerHTML=`
    <div style="padding:14px 18px;height:100%;display:flex;flex-direction:column">
      <h2 style="color:#42a5f5;margin:0 0 10px;font-size:15px">${icon} ${grp}
        <span style="color:#7986cb;font-size:11px;font-weight:500;margin-left:8px">${items.length} tools</span></h2>
      <div class="pro-sub-tabs">
        ${items.map((c,i)=>`<button class="pro-sub-tab ${i===0?'active':''}" data-cid="${c.id}" onclick="proShowCalc('${c.id}')">${c.title}</button>`).join('')}
      </div>
      <div id="pro-pane" style="flex:1;overflow:hidden"></div>
    </div>`;
  if(items.length) proShowCalc(items[0].id);
}

/* -------- INTERIOR DESIGNER GUIDED WORKFLOW --------
   6 steps arranged as sub-tabs. Each step delegates to an existing
   catalog tile — no duplicate data, just a curated journey:
     1. Style palette      (/api/design/experience/palettes)
     2. Per-room emotion   (/api/design/experience/emotion)
     3. Anchor colours     (/api/interior/palette/anchors)
     4. Inspiration extract(/api/interior/palette/extract)
     5. Finishes spec      (/api/design/villa/finishes)
     6. Restraint score    (/api/design/experience/restraint)
     7. Materials library  (/api/render/materials)
*/
const INTERIOR_STEPS = [
  {n:1, id:'ex_pal',   label:'Step 1 · Style palette',   hint:'Pick your architectural style — each has a curated material/finish palette (render, flooring, glazing, metalwork, pool, planting).'},
  {n:2, id:'ex_emo',   label:'Step 2 · Room emotion',    hint:'For every room, get an emotion target plus ceiling height, palette, accent material, lighting concept, glazing strategy, acoustic target.'},
  {n:3, id:'cu_pal1',  label:'Step 3 · Anchor colours',  hint:'Browse the EIMS anchor-colour library — each anchor shows the materials it pairs with (e.g. the "Warm white" anchor pairs with limewash, travertine, bleached oak, linen).'},
  {n:4, id:'cu_pal2',  label:'Step 4 · Inspiration',     hint:'Upload an inspiration photograph — the median-cut quantiser extracts the dominant colour palette directly from the image.'},
  {n:5, id:'vs_fin',   label:'Step 5 · Finishes spec',   hint:'Manufacturer-cited finishes (Topciment, Vitrocsa, Marmoles Castellanos, Alttoglass) for your chosen style. Ready to paste into spec sheets.'},
  {n:6, id:'ex_rest',  label:'Step 6 · Restraint score', hint:'Grade your material / feature choices against the SAOTA / John Pawson standard. Fewer primary materials, higher the score.'},
  {n:7, id:'in_mats',  label:'· PBR materials',          hint:'19 physically-based render materials — ready to drop into Three.js / Blender / Rhino scenes.'},
];
const INTERIOR_HINTS = Object.fromEntries(INTERIOR_STEPS.map(s=>[s.id, s.hint]));

function showInterior(){
  const main=document.getElementById('mainArea');
  // Pass ONLY the calcId through onclick — the hint comes from
  // INTERIOR_HINTS lookup so we never embed user text in attributes
  // (previous implementation broke when a hint contained double quotes).
  main.innerHTML=`
    <div style="padding:14px 18px;height:100%;display:flex;flex-direction:column">
      <h2 style="color:#42a5f5;margin:0 0 4px;font-size:15px">🛋️ Interior Designer
        <span style="color:#7986cb;font-size:11px;font-weight:500;margin-left:8px">guided workflow · 6 steps + PBR library</span></h2>
      <div style="color:#7986cb;font-size:11px;margin-bottom:10px">Walk through style → emotion → colour → inspiration → finishes → restraint check. Every step is backed by real EIMS endpoints — results render as cards, tables and colour swatches, not code.</div>
      <div class="pro-sub-tabs">
        ${INTERIOR_STEPS.map((s,i)=>`<button class="pro-sub-tab${i===0?' active':''}" data-cid="${s.id}" onclick="proShowInteriorStep('${s.id}')">${proEscape(s.label)}</button>`).join('')}
      </div>
      <div id="pro-pane" style="flex:1;overflow:hidden"></div>
    </div>`;
  proShowInteriorStep(INTERIOR_STEPS[0].id);
}
function proShowInteriorStep(calcId){
  const hint = INTERIOR_HINTS[calcId] || '';
  proShowCalc(calcId);
  // Prepend the step hint at the top of the pane. Using textContent via
  // .innerHTML on a controlled template — hint goes through proEscape.
  const pane=document.getElementById('pro-pane');
  if(!pane) return;
  const existing=pane.firstElementChild;
  if(existing && hint){
    const hintBox=document.createElement('div');
    hintBox.style.cssText='padding:10px 12px;background:rgba(100,181,246,.06);border-left:3px solid #64b5f6;border-radius:0 4px 4px 0;margin-bottom:10px;font-size:11px;color:#a5b4fc;line-height:1.55';
    hintBox.innerHTML='<b style="color:#64b5f6">Guidance:</b> '+proEscape(hint);
    pane.insertBefore(hintBox, existing);
  }
}
