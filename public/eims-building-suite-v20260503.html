function _polyArea(pts){
    if (!pts || pts.length < 3) return 0;
    let s = 0;
    for (let i = 0; i < pts.length; i++){
        const a = pts[i], b = pts[(i+1)%pts.length];
        s += a.x * b.y - b.x * a.y;
    }
    return Math.abs(s) / 2;
}

async function bimSaveSelected(){
    const sel = bimState.selected;
    if (!sel || !bimState.projectId) return;
    const patch = {};
    if (sel.kind === 'wall'){
        patch.type_name = document.getElementById('bimP_type').value;
        patch.height_m  = parseFloat(document.getElementById('bimP_height').value);
        patch.structural_role = document.getElementById('bimP_role').value;
    } else if (sel.kind === 'opening'){
        patch.type_name  = document.getElementById('bimP_type').value;
        patch.position_m = parseFloat(document.getElementById('bimP_position').value);
        patch.sill_m     = parseFloat(document.getElementById('bimP_sill').value);
    } else if (sel.kind === 'space'){
        patch.name    = document.getElementById('bimP_name').value;
        patch.program = document.getElementById('bimP_program').value;
    }
    try{
        const r = await fetch(API + '/bim/element/update', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({project_id: bimState.projectId, element_id: sel.id, patch}),
        });
        const j = await r.json();
        if (!j.success){
            alert('Save failed: ' + (j.error || 'unknown'));
            return;
        }
        // Reload model so the renderer sees the change
        const r2 = await fetch(API + '/bim/project/' + encodeURIComponent(bimState.projectId));
        const j2 = await r2.json();
        if (j2.success){ bimState.bim = j2.bim; }
        bimRefreshStats();
        bimRenderPlan();
        // Re-select
        setTimeout(() => bimSelect(sel.id), 200);
    }catch(e){
        alert('Save error: ' + (e.message || e));
    }
}

function bimScheduleTab(key){
    bimState.scheduleTab = key;
    document.querySelectorAll('#bimRight > .rtabs .rtab').forEach((t,i) => {
        t.classList.toggle('on', t.textContent.toLowerCase().includes({
            spaces:'spaces', doors:'doors', windows:'windows',
            walls:'walls', materials:'materials', structural:'structural'
        }[key]));
    });
    const sch = bimState.schedules?.[key];
    const tbl = document.getElementById('bimSchTbl');
    if (!sch || !tbl) return;
    if (!sch.rows.length){
        tbl.innerHTML = `<div style="padding:30px;text-align:center;color:#7986cb">No rows in this schedule.</div>`;
        return;
    }
    const cols = Object.keys(sch.rows[0]).filter(c => c !== 'sources' && c !== 'element_id');
    let h = '<div style="overflow-x:auto;background:#0d1030;border:1px solid #1e2560;border-radius:6px">';
    h += '<table style="width:100%;border-collapse:collapse;font-size:11px;color:#e0e0e0">';
    h += '<thead style="background:#1a237e;color:#bbdefb;text-align:left">';
    h += '<tr>' + cols.map(c => `<th style="padding:8px 10px;font-weight:700">${bimEsc(c)}</th>`).join('') + '</tr>';
    h += '</thead><tbody>';
    sch.rows.forEach((r,i) => {
        h += `<tr style="border-top:1px solid #1e2560" onclick="${r.element_id?`bimSelect('${r.element_id}');bimTab('plan')`:''}" `
              + `style="${r.element_id?'cursor:pointer;':''}border-top:1px solid #1e2560">`;
        cols.forEach(c => {
            const v = r[c];
            const txt = v===null || v===undefined ? '–'
                      : (typeof v === 'object' ? JSON.stringify(v) : String(v));
            h += `<td style="padding:6px 10px">${bimEsc(txt)}</td>`;
        });
        h += '</tr>';
    });
    h += '</tbody>';
    // Totals row
    if (sch.totals){
        h += `<tfoot style="background:rgba(100,181,246,.06);color:#bbdefb">
                <tr><td colspan="${cols.length}" style="padding:8px 10px;font-size:10px">
                  <b>Totals:</b> ${Object.entries(sch.totals).map(([k,v]) =>
                    `${bimEsc(k)}=<b>${typeof v === 'object' ? bimEsc(JSON.stringify(v)) : bimEsc(v)}</b>`).join(' &nbsp;·&nbsp; ')}
                </td></tr></tfoot>`;
    }
    h += '</table></div>';
    if (sch.sources && sch.sources.length){
        h += `<div style="margin-top:8px;font-size:10px;color:#7986cb">
                <b style="color:#bbdefb">Sources:</b> ${sch.sources.map(bimEsc).join(' · ')}
              </div>`;
    }
    h += `<div class="btn-row" style="margin-top:10px">
            <button class="btn btn-p" onclick="bimDownloadScheduleCSV('${key}')">📥 Download ${key} CSV</button>
          </div>`;
    tbl.innerHTML = h;
}

function bimDownloadScheduleCSV(key){
    const sch = bimState.schedules?.[key];
    if (!sch || !sch.rows.length){ alert('No rows.'); return; }
    const cols = Object.keys(sch.rows[0]).filter(c => c !== 'sources');
    const esc = v => {
        if (v === null || v === undefined) return '';
        const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
    };
    let csv = cols.join(',') + '\n';
    sch.rows.forEach(r => csv += cols.map(c => esc(r[c])).join(',') + '\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bim_schedule_${key}.csv`; a.click();
    URL.revokeObjectURL(url);
}

function bimDownloadAllSchedulesCSV(){
    if (!bimState.schedules){ alert('Open the Schedules tab first to compute them.'); return; }
    Object.keys(bimState.schedules).forEach(k => bimDownloadScheduleCSV(k));
}

    h+='<button onclick="fpe.snapOn=!fpe.snapOn;this.style.color=fpe.snapOn?\'#64b5f6\':\'#666\'" title="Toggle Snap" style="color:'+(fpe.snapOn?'#64b5f6':'#666')+'">\u{1F9F2} Snap</button>';
    h+='<button onclick="fpe.showGrid=!fpe.showGrid;fpeRender()" title="Toggle Grid">\u2637 Grid</button>';
    h+='<button onclick="fpe.showDims=!fpe.showDims;fpeRender()" title="Toggle Dimensions">\u{1F4CF} Dims</button>';
    h+='<button onclick="fpeZoom(1.2)" title="Zoom In">+</button>';
    h+='<button onclick="fpeZoom(1/1.2)" title="Zoom Out">\u2212</button>';
    h+='<button onclick="fpeZoomFit()" title="Fit All">\u26F6</button>';
    h+='</div>';
    h+='<div class="fpe-status" id="fpeStatus">Select tool | Grid: 50mm | Floor: '+fpe.floor+'</div>';
    h+='<div class="fpe-dims" id="fpeDimsInfo"></div>';
    h+='</div>'; // canvas area end

    h+='</div>'; // fpe-wrap end
    document.getElementById('mainArea').innerHTML=h;

    // Create SVG canvas
    setTimeout(()=>fpeInitCanvas(),30);
}

function fpeInitCanvas(){
    let area=document.getElementById('fpeCanvasArea');
    if(!area)return;
    fpe.wrapEl=area;
    let W=area.clientWidth, H=area.clientHeight;
    let svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width',W);
    svg.setAttribute('height',H);
    svg.setAttribute('viewBox','0 0 '+W+' '+H);
    svg.id='fpeSvg';
    area.insertBefore(svg,area.querySelector('.fpe-toolbar'));
    fpe.svgEl=svg;

    // Mouse events on SVG
    svg.addEventListener('mousedown',fpeMouseDown);
    svg.addEventListener('mousemove',fpeMouseMove);
    svg.addEventListener('mouseup',fpeMouseUp);
    svg.addEventListener('wheel',fpeWheel,{passive:false});
    svg.addEventListener('dblclick',fpeDblClick);

    // Keyboard
    document.addEventListener('keydown',fpeKeyDown);

    // Drop zone for palette drag
    area.addEventListener('dragover',e=>e.preventDefault());
    area.addEventListener('drop',fpeDrop);

    fpeRender();
    fpeUpdatePlacedList();
}

function fpeSnap(v){
    if(!fpe.snapOn)return v;
    let gridM=0.05; // 50mm snap
    return Math.round(v/gridM)*gridM;
}

function fpePxToM(px){return px/(fpe.gridSize*fpe.zoom);}
function fpeMToPx(m){return m*fpe.gridSize*fpe.zoom;}

function fpeSvgPt(e){
    let rect=fpe.svgEl.getBoundingClientRect();
    return {
        x: (e.clientX-rect.left-fpe.panX)/fpe.zoom,
        y: (e.clientY-rect.top-fpe.panY)/fpe.zoom
    };
}

function fpeWorldToM(px){return px/fpe.gridSize;} // 50px = 1m
function fpeMToWorld(m){return m*fpe.gridSize;}

// ---- RENDER ----
function fpeRender(){
    let svg=fpe.svgEl;if(!svg)return;
    let W=+svg.getAttribute('width'), H=+svg.getAttribute('height');
    let html='';

    // Transform group
    html+='<g transform="translate('+fpe.panX+','+fpe.panY+') scale('+fpe.zoom+')">';

    // Grid
    if(fpe.showGrid){
        let gs=fpe.gridSize;
        let startX=Math.floor(-fpe.panX/(fpe.zoom*gs))*gs - gs;
        let startY=Math.floor(-fpe.panY/(fpe.zoom*gs))*gs - gs;
        let endX=startX+W/fpe.zoom+gs*2;
        let endY=startY+H/fpe.zoom+gs*2;
        html+='<g opacity="0.3">';
        for(let x=startX;x<=endX;x+=gs){
            let isMajor=(Math.round(x/gs)%5===0);
            html+='<line x1="'+x+'" y1="'+startY+'" x2="'+x+'" y2="'+endY+'" stroke="'+(isMajor?'#bbb':'#ddd')+'" stroke-width="'+(isMajor?0.8:0.3)+'"/>';
        }
        for(let y=startY;y<=endY;y+=gs){
            let isMajor=(Math.round(y/gs)%5===0);
            html+='<line x1="'+startX+'" y1="'+y+'" x2="'+endX+'" y2="'+y+'" stroke="'+(isMajor?'#bbb':'#ddd')+'" stroke-width="'+(isMajor?0.8:0.3)+'"/>';
        }
        // Origin cross
        html+='<line x1="-10" y1="0" x2="'+endX+'" y2="0" stroke="#e53935" stroke-width="1" opacity="0.5"/>';
        html+='<line x1="0" y1="-10" x2="0" y2="'+endY+'" stroke="#1565c0" stroke-width="1" opacity="0.5"/>';
        html+='</g>';
    }

    // Elements for current floor
    let floorEls=fpe.elements.filter(el=>el.floor===fpe.floor);
    floorEls.forEach(el=>{
        let x=fpeMToWorld(el.x), y=fpeMToWorld(el.y);
        let w=fpeMToWorld(el.w), h=fpeMToWorld(el.h);
        let sel=el.id===fpe.selectedId;
        let rot=el.rotation||0;

        html+='<g transform="translate('+x+','+y+')'+(rot?' rotate('+rot+','+w/2+','+h/2+')':'')+'" data-id="'+el.id+'">';

        if(el.type==='room'){
            html+='<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="'+el.color+'" stroke="'+(sel?'#1565c0':'#37474f')+'" stroke-width="'+(sel?2.5:1.5)+'" rx="1"/>';
            // Room label
            html+='<text x="'+w/2+'" y="'+h/2+'" text-anchor="middle" dominant-baseline="middle" font-size="'+(Math.min(w,h)>40?11:8)+'" fill="#333" font-weight="600">'+el.label+'</text>';
            html+='<text x="'+w/2+'" y="'+(h/2+13)+'" text-anchor="middle" font-size="8" fill="#777">'+el.w.toFixed(1)+' \u00D7 '+el.h.toFixed(1)+' m</text>';
            html+='<text x="'+w/2+'" y="'+(h/2+23)+'" text-anchor="middle" font-size="7" fill="#999">'+(el.w*el.h).toFixed(1)+' m\u00B2</text>';
        }else if(el.type==='wall'){
            html+='<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="'+el.color+'" stroke="'+(sel?'#e53935':'#212121')+'" stroke-width="'+(sel?2:1)+'"/>';
            // Hatch pattern for walls
            if(w>10){
                for(let hx=4;hx<w;hx+=8){
                    html+='<line x1="'+hx+'" y1="0" x2="'+(hx+Math.min(h,6))+'" y2="'+h+'" stroke="#555" stroke-width="0.3"/>';
                }
            }
        }else if(el.type==='door'){
            // Door symbol: line + arc
            html+='<rect x="0" y="-2" width="'+w+'" height="5" fill="'+el.color+'" stroke="'+(sel?'#e53935':'#b71c1c')+'" stroke-width="'+(sel?2:1)+'" rx="1"/>';
            // Swing arc
            if(el.swing!==0){
                html+='<path d="M 0,0 A '+w+','+w+' 0 0,1 '+w+','+(-w)+'" fill="none" stroke="#d32f2f" stroke-width="0.8" stroke-dasharray="3,2"/>';
            }
            html+='<text x="'+w/2+'" y="12" text-anchor="middle" font-size="7" fill="#c62828">'+el.label+'</text>';
        }else if(el.type==='window'){
            html+='<rect x="0" y="-2" width="'+w+'" height="5" fill="#bbdefb" stroke="'+(sel?'#0d47a1':'#1565c0')+'" stroke-width="'+(sel?2:1)+'"/>';
            // Glazing lines
            html+='<line x1="'+w*0.33+'" y1="-2" x2="'+w*0.33+'" y2="3" stroke="#1565c0" stroke-width="0.5"/>';
            html+='<line x1="'+w*0.67+'" y1="-2" x2="'+w*0.67+'" y2="3" stroke="#1565c0" stroke-width="0.5"/>';
            html+='<text x="'+w/2+'" y="12" text-anchor="middle" font-size="7" fill="#1565c0">'+el.label+'</text>';
        }else if(el.type==='furniture'){
            html+='<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="'+el.color+'" stroke="'+(sel?'#ff9800':'#5d4037')+'" stroke-width="'+(sel?2:0.8)+'" stroke-dasharray="'+(sel?'':'2,1')+'" rx="2" opacity="0.7"/>';
            html+='<text x="'+w/2+'" y="'+h/2+'" text-anchor="middle" dominant-baseline="middle" font-size="7" fill="#fff">'+el.label+'</text>';
        }

        // Selection handles
        if(sel){
            let hs=6;
            html+='<rect class="fpe-handle" x="'+(-hs/2)+'" y="'+(-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="tl" rx="1"/>';
            html+='<rect class="fpe-handle" x="'+(w-hs/2)+'" y="'+(-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="tr" rx="1"/>';
            html+='<rect class="fpe-handle" x="'+(-hs/2)+'" y="'+(h-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="bl" rx="1"/>';
            html+='<rect class="fpe-handle" x="'+(w-hs/2)+'" y="'+(h-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="br" rx="1"/>';
            // Mid handles for walls
            if(el.type==='wall'||el.type==='room'){
                html+='<rect class="fpe-handle" x="'+(w/2-hs/2)+'" y="'+(-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="tc" rx="1" style="cursor:ns-resize"/>';
                html+='<rect class="fpe-handle" x="'+(w/2-hs/2)+'" y="'+(h-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="bc" rx="1" style="cursor:ns-resize"/>';
                html+='<rect class="fpe-handle" x="'+(-hs/2)+'" y="'+(h/2-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="ml" rx="1" style="cursor:ew-resize"/>';
                html+='<rect class="fpe-handle" x="'+(w-hs/2)+'" y="'+(h/2-hs/2)+'" width="'+hs+'" height="'+hs+'" data-handle="mr" rx="1" style="cursor:ew-resize"/>';
            }
        }

        // Dimensions
        if(fpe.showDims && (sel || el.type==='room')){
            // Width dim (top)
            html+='<text x="'+w/2+'" y="-6" text-anchor="middle" font-size="8" fill="#e65100" font-weight="600">'+el.w.toFixed(2)+'m</text>';
            // Height dim (right)
            html+='<text x="'+(w+6)+'" y="'+h/2+'" text-anchor="start" dominant-baseline="middle" font-size="8" fill="#e65100" font-weight="600">'+el.h.toFixed(2)+'m</text>';
        }

        html+='</g>';
    });

    // Ghost element (during palette drag)
    if(fpe.ghostEl){
        let g=fpe.ghostEl;
        let gw=fpeMToWorld(g.w), gh=fpeMToWorld(g.h);
        html+='<rect x="'+g.px+'" y="'+g.py+'" width="'+gw+'" height="'+gh+'" fill="'+g.color+'" stroke="#64b5f6" stroke-width="2" stroke-dasharray="5,3" opacity="0.5" rx="2"/>';
        html+='<text x="'+(g.px+gw/2)+'" y="'+(g.py+gh/2)+'" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#1565c0">'+g.label+'</text>';
    }

    // Measure line
    if(fpe.tool==='measure'&&fpe._measureStart){
        let ms=fpe._measureStart, me=fpe._measureEnd||ms;
        html+='<line x1="'+ms.x+'" y1="'+ms.y+'" x2="'+me.x+'" y2="'+me.y+'" stroke="#ff5722" stroke-width="1.5" stroke-dasharray="4,2"/>';
        let dx=me.x-ms.x, dy=me.y-ms.y;
        let dist=Math.sqrt(dx*dx+dy*dy);
        let distM=fpeWorldToM(dist);
        html+='<text x="'+((ms.x+me.x)/2)+'" y="'+((ms.y+me.y)/2-8)+'" text-anchor="middle" font-size="10" fill="#ff5722" font-weight="700">'+distM.toFixed(2)+' m</text>';
    }

    html+='</g>'; // close transform group

    svg.innerHTML=html;
}

// ---- MOUSE HANDLERS ----
function fpeMouseDown(e){
    if(e.button===1||(e.button===0&&e.altKey)){
        // Middle click or Alt+click = pan
        fpe.panning=true;
        fpe.panStart={x:e.clientX-fpe.panX,y:e.clientY-fpe.panY};
        fpe.svgEl.style.cursor='grabbing';
        return;
    }

    let pt=fpeSvgPt(e);

    if(fpe.tool==='measure'){
        fpe._measureStart={x:pt.x,y:pt.y};
        fpe._measureEnd=null;
        return;
    }

    // Check if clicking a resize handle
    if(fpe.selectedId){
        let target=e.target;
        if(target.classList&&target.classList.contains('fpe-handle')){
            fpe.resizing={id:fpe.selectedId,handle:target.getAttribute('data-handle'),startPt:pt};
            let el=fpe.elements.find(x=>x.id===fpe.selectedId);
            if(el)fpe.resizing.startDims={x:el.x,y:el.y,w:el.w,h:el.h};
            return;
        }
    }

    // Hit test elements (reverse order for top-most)
    let floorEls=fpe.elements.filter(el=>el.floor===fpe.floor);
    let hit=null;
    for(let i=floorEls.length-1;i>=0;i--){
        let el=floorEls[i];
        let ex=fpeMToWorld(el.x), ey=fpeMToWorld(el.y);
        let ew=fpeMToWorld(el.w), eh=fpeMToWorld(el.h);
        if(pt.x>=ex&&pt.x<=ex+ew&&pt.y>=ey-5&&pt.y<=ey+eh+5){
            hit=el;break;
        }
    }

    if(fpe.tool==='select'){
        if(hit){
            fpe.selectedId=hit.id;
            fpe.dragging={id:hit.id, offX:pt.x-fpeMToWorld(hit.x), offY:pt.y-fpeMToWorld(hit.y)};
            fpe.svgEl.style.cursor='move';
        }else{
            fpe.selectedId=null;
        }
        fpeRender();
        fpeUpdatePlacedList();
        fpeShowProps();
    }else if(hit&&fpe.tool==='select'){
        // already handled
    }else{
        // Quick-place tool
        let mX=fpeSnap(fpeWorldToM(pt.x));
        let mY=fpeSnap(fpeWorldToM(pt.y));
        let newEl=null;
        if(fpe.tool==='wall') newEl={type:'wall',label:'Wall',w:3,h:0.2,color:'#37474f'};
        else if(fpe.tool==='door') newEl={type:'door',label:'Door 900',w:0.9,h:0.05,color:'#d32f2f',swing:90};
        else if(fpe.tool==='window') newEl={type:'window',label:'Window 1200',w:1.2,h:0.05,color:'#1976d2'};
        else if(fpe.tool==='room') newEl={type:'room',label:'Room',w:3,h:3,color:'#e3f2fd'};
        if(newEl){
            newEl.id=fpe.nextId++;
            newEl.x=mX; newEl.y=mY;
            newEl.floor=fpe.floor;
            newEl.rotation=0;
            fpeSaveHistory();
            fpe.elements.push(newEl);
            fpe.selectedId=newEl.id;
            fpe.dragging={id:newEl.id,offX:0,offY:0};
            fpeRender();
            fpeUpdatePlacedList();
            fpeShowProps();
        }
    }
}

function fpeMouseMove(e){
    if(fpe.panning){
        fpe.panX=e.clientX-fpe.panStart.x;
        fpe.panY=e.clientY-fpe.panStart.y;
        fpeRender();
        return;
    }

    let pt=fpeSvgPt(e);
    let mX=fpeWorldToM(pt.x), mY=fpeWorldToM(pt.y);

    // Status bar
    let status=document.getElementById('fpeStatus');
    if(status)status.textContent=fpe.tool.charAt(0).toUpperCase()+fpe.tool.slice(1)+' | '+mX.toFixed(2)+'m, '+mY.toFixed(2)+'m | Grid: '+Math.round(fpe.gridSize/fpe.zoom*20)+'mm | Floor: F'+fpe.floor;

    if(fpe.tool==='measure'&&fpe._measureStart){
        fpe._measureEnd={x:pt.x,y:pt.y};
        fpeRender();
        return;
    }

    if(fpe.resizing){
        let el=fpe.elements.find(x=>x.id===fpe.resizing.id);
        if(!el)return;
        let sd=fpe.resizing.startDims;
        let dx=fpeWorldToM(pt.x)-fpeWorldToM(fpe.resizing.startPt.x);
        let dy=fpeWorldToM(pt.y)-fpeWorldToM(fpe.resizing.startPt.y);
        let h=fpe.resizing.handle;

        if(h==='br'||h==='tr'||h==='mr'){el.w=Math.max(0.1,fpeSnap(sd.w+dx));}
        if(h==='br'||h==='bl'||h==='bc'){el.h=Math.max(0.1,fpeSnap(sd.h+dy));}
        if(h==='tl'||h==='ml'||h==='bl'){el.x=fpeSnap(sd.x+dx);el.w=Math.max(0.1,fpeSnap(sd.w-dx));}
        if(h==='tl'||h==='tc'||h==='tr'){el.y=fpeSnap(sd.y+dy);el.h=Math.max(0.1,fpeSnap(sd.h-dy));}

        fpeRender();
        fpeShowProps();
        fpeShowDimsInfo(el);
        return;
    }

    if(fpe.dragging){
        let el=fpe.elements.find(x=>x.id===fpe.dragging.id);
        if(!el)return;
        let rawX=fpeWorldToM(pt.x-fpe.dragging.offX);
        let rawY=fpeWorldToM(pt.y-fpe.dragging.offY);
        el.x=fpeSnap(rawX);
        el.y=fpeSnap(rawY);

        // Snap guides: check alignment with other elements
        let floorEls=fpe.elements.filter(x=>x.floor===fpe.floor&&x.id!==el.id);
        let snapThresh=0.1; // 100mm
        floorEls.forEach(other=>{
            // Left edge alignment
            if(Math.abs(el.x-other.x)<snapThresh) el.x=other.x;
            if(Math.abs(el.x-(other.x+other.w))<snapThresh) el.x=other.x+other.w;
            // Right edge
            if(Math.abs((el.x+el.w)-other.x)<snapThresh) el.x=other.x-el.w;
            if(Math.abs((el.x+el.w)-(other.x+other.w))<snapThresh) el.x=other.x+other.w-el.w;
            // Top
            if(Math.abs(el.y-other.y)<snapThresh) el.y=other.y;
            if(Math.abs(el.y-(other.y+other.h))<snapThresh) el.y=other.y+other.h;
            // Bottom
            if(Math.abs((el.y+el.h)-other.y)<snapThresh) el.y=other.y-el.h;
            if(Math.abs((el.y+el.h)-(other.y+other.h))<snapThresh) el.y=other.y+other.h-el.h;
        });

        fpeRender();
        fpeShowProps();
        fpeShowDimsInfo(el);
    }

    // Ghost update for palette drag
    if(fpe.ghostEl){
        fpe.ghostEl.px=pt.x;
        fpe.ghostEl.py=pt.y;
        fpeRender();
    }
}

function fpeMouseUp(e){
    if(fpe.panning){
        fpe.panning=false;
        fpe.svgEl.style.cursor='crosshair';
        return;
    }
    if(fpe.dragging){
        fpeSaveHistory();
        fpe.dragging=null;
        fpe.svgEl.style.cursor='crosshair';
    }
    if(fpe.resizing){
        fpeSaveHistory();
        fpe.resizing=null;
    }
    if(fpe.tool==='measure'&&fpe._measureStart&&fpe._measureEnd){
        // Keep measurement visible
    }
}

function fpeWheel(e){
    e.preventDefault();
    let factor=e.deltaY<0?1.1:1/1.1;
    let rect=fpe.svgEl.getBoundingClientRect();
    let mx=e.clientX-rect.left, my=e.clientY-rect.top;
    fpe.panX=mx-(mx-fpe.panX)*factor;
    fpe.panY=my-(my-fpe.panY)*factor;
    fpe.zoom*=factor;
    fpe.zoom=Math.max(0.2,Math.min(5,fpe.zoom));
    fpeRender();
}

function fpeDblClick(e){
    // Double click to rename
    let el=fpe.elements.find(x=>x.id===fpe.selectedId);
    if(el){
        let name=prompt('Rename element:',el.label);
        if(name){fpeSaveHistory();el.label=name;fpeRender();fpeUpdatePlacedList();}
    }
}

// ---- PALETTE DRAG ----
function fpeStartPaletteDrag(e,group,idx){
    let item=FPE_PALETTE[group][idx];
    // Set up HTML5 drag data
    e.dataTransfer.setData('text/plain',JSON.stringify({group,idx}));
    e.dataTransfer.effectAllowed='copy';
}

function fpeDrop(e){
    e.preventDefault();
    let data;
    try{data=JSON.parse(e.dataTransfer.getData('text/plain'));}catch(x){return;}
    let item=FPE_PALETTE[data.group][data.idx];
    if(!item)return;

    let rect=fpe.svgEl.getBoundingClientRect();
    let px=(e.clientX-rect.left-fpe.panX)/fpe.zoom;
    let py=(e.clientY-rect.top-fpe.panY)/fpe.zoom;
    let mX=fpeSnap(fpeWorldToM(px));
    let mY=fpeSnap(fpeWorldToM(py));

    let newEl={
        id:fpe.nextId++,
        type:item.type,
        label:item.label,
        x:mX, y:mY,
        w:item.w, h:item.h,
        color:item.color,
        floor:fpe.floor,
        rotation:0
    };
    if(item.swing!==undefined) newEl.swing=item.swing;
    if(item.min_area) newEl.min_area=item.min_area;

    fpeSaveHistory();
    fpe.elements.push(newEl);
    fpe.selectedId=newEl.id;
    fpeRender();
    fpeUpdatePlacedList();
    fpeShowProps();
}

// ---- TOOLS ----
function fpeTool(t){
    fpe.tool=t;
    document.querySelectorAll('.fpe-toolbar button').forEach(b=>b.classList.remove('fpe-active'));
    let btn=document.getElementById('fpeTool_'+t);
    if(btn)btn.classList.add('fpe-active');
    if(t!=='select'){fpe.selectedId=null;fpeRender();fpeShowProps();}
    fpe._measureStart=null;fpe._measureEnd=null;
}

// ---- FLOOR MANAGEMENT ----
function fpeSetFloor(f){
    fpe.floor=f;
    fpe.selectedId=null;
    document.querySelectorAll('.fpe-floor-tab').forEach((t,i)=>t.classList.toggle('on',i===f));
    fpeRender();
    fpeUpdatePlacedList();
    fpeShowProps();
}

function fpeAddFloor(){
    fpe.floors++;
    // Copy elements from current floor to new floor (stacking)
    let curEls=fpe.elements.filter(el=>el.floor===fpe.floor&&el.type==='room');
    if(curEls.length>0&&confirm('Copy rooms from Floor '+fpe.floor+' to Floor '+(fpe.floors-1)+'?')){
        curEls.forEach(el=>{
            fpe.elements.push({
                id:fpe.nextId++,
                type:el.type,label:el.label,
                x:el.x,y:el.y,w:el.w,h:el.h,
                color:el.color,floor:fpe.floors-1,
                rotation:el.rotation||0,
                min_area:el.min_area
            });
        });
        // Also copy walls
        fpe.elements.filter(el=>el.floor===fpe.floor&&el.type==='wall').forEach(el=>{

// ---- ELEMENT OPERATIONS ----
function fpeRotate90(){
    let el=fpe.elements.find(x=>x.id===fpe.selectedId);
    if(!el)return;
    fpeSaveHistory();
    // Swap w/h and rotate
    let tmp=el.w; el.w=el.h; el.h=tmp;
    fpeRender();fpeShowProps();fpeUpdatePlacedList();
}

function fpeDuplicate(){
    let el=fpe.elements.find(x=>x.id===fpe.selectedId);
    if(!el)return;
    fpeSaveHistory();
    let copy={...el,id:fpe.nextId++,x:el.x+0.5,y:el.y+0.5};
    fpe.elements.push(copy);
    fpe.selectedId=copy.id;
    fpeRender();fpeUpdatePlacedList();fpeShowProps();
}

function fpeDelete(){
    if(!fpe.selectedId)return;
    fpeSaveHistory();
    fpe.elements=fpe.elements.filter(x=>x.id!==fpe.selectedId);
    fpe.selectedId=null;
    fpeRender();fpeUpdatePlacedList();fpeShowProps();
}

}

// ---- UNDO/REDO ----
function fpeSaveHistory(){
    fpe.history=fpe.history.slice(0,fpe.histIdx+1);
    fpe.history.push(JSON.stringify(fpe.elements));
    fpe.histIdx=fpe.history.length-1;
    if(fpe.history.length>50)fpe.history.shift();
}

function fpeUndo(){
    if(fpe.histIdx<=0)return;
    fpe.histIdx--;
    fpe.elements=JSON.parse(fpe.history[fpe.histIdx]);
    fpe.selectedId=null;
    fpeRender();fpeUpdatePlacedList();fpeShowProps();
}

function fpeRedo(){
    if(fpe.histIdx>=fpe.history.length-1)return;
    fpe.histIdx++;
    fpe.elements=JSON.parse(fpe.history[fpe.histIdx]);
    fpe.selectedId=null;
    fpeRender();fpeUpdatePlacedList();fpeShowProps();
}

// ---- KEYBOARD ----
function fpeKeyDown(e){
    if(curMode!=='floorEditor')return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;

    if(e.key==='Delete'||e.key==='Backspace'){fpeDelete();e.preventDefault();}
    else if(e.key==='Escape'){fpe.selectedId=null;fpe._measureStart=null;fpe._measureEnd=null;fpeRender();fpeUpdatePlacedList();fpeShowProps();}
    else if(e.ctrlKey&&e.key==='z'){fpeUndo();e.preventDefault();}
    else if(e.ctrlKey&&e.key==='y'){fpeRedo();e.preventDefault();}
    else if(e.ctrlKey&&e.key==='d'){fpeDuplicate();e.preventDefault();}
    else if(e.key==='r'||e.key==='R'){fpeRotate90();}
    else if(e.key==='g'){fpe.showGrid=!fpe.showGrid;fpeRender();}
    else if(e.key==='s'&&!e.ctrlKey){fpe.snapOn=!fpe.snapOn;}
    // Arrow keys to nudge
    else if(e.key.startsWith('Arrow')&&fpe.selectedId){
        let el=fpe.elements.find(x=>x.id===fpe.selectedId);if(!el)return;
        let step=e.shiftKey?0.5:0.05;
        fpeSaveHistory();
        if(e.key==='ArrowLeft')el.x-=step;
        if(e.key==='ArrowRight')el.x+=step;
        if(e.key==='ArrowUp')el.y-=step;
        if(e.key==='ArrowDown')el.y+=step;
        fpeRender();fpeShowProps();
        e.preventDefault();
    }
}

// ---- ZOOM ----
function fpeZoom(factor){
    let svg=fpe.svgEl;if(!svg)return;
    let W=+svg.getAttribute('width'), H=+svg.getAttribute('height');
    let cx=W/2, cy=H/2;
    fpe.panX=cx-(cx-fpe.panX)*factor;
    fpe.panY=cy-(cy-fpe.panY)*factor;
    fpe.zoom*=factor;
    fpe.zoom=Math.max(0.2,Math.min(5,fpe.zoom));
    fpeRender();
}

function fpeZoomFit(){
    if(!fpe.elements.length){fpe.panX=200;fpe.panY=100;fpe.zoom=1;fpeRender();return;}
    let floorEls=fpe.elements.filter(x=>x.floor===fpe.floor);
    if(!floorEls.length){fpe.panX=200;fpe.panY=100;fpe.zoom=1;fpeRender();return;}
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    floorEls.forEach(el=>{
        minX=Math.min(minX,el.x);minY=Math.min(minY,el.y);
        maxX=Math.max(maxX,el.x+el.w);maxY=Math.max(maxY,el.y+el.h);
    });
    let svg=fpe.svgEl;if(!svg)return;
    let W=+svg.getAttribute('width'),H=+svg.getAttribute('height');
    let worldW=fpeMToWorld(maxX-minX+2), worldH=fpeMToWorld(maxY-minY+2);
    fpe.zoom=Math.min((W-40)/worldW,(H-60)/worldH,3);
    fpe.panX=W/2-fpeMToWorld((minX+maxX)/2)*fpe.zoom;
    fpe.panY=H/2-fpeMToWorld((minY+maxY)/2)*fpe.zoom;
    fpeRender();
}

// ---- BACKEND INTEGRATION ----
async function fpeValidate(){
    let rooms=fpe.elements.filter(x=>x.type==='room'&&x.floor===fpe.floor);
    if(!rooms.length){document.getElementById('fpeValidateOut').innerHTML='<div style="color:#ff9800;font-size:10px">No rooms to validate. Place rooms first.</div>';return;}
    let roomData=rooms.map(r=>({name:r.label,width:r.w,depth:r.h,area:r.w*r.h}));
    try{
        let resp=await fetch(API+'/spatial/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rooms:roomData})});
        let d=await resp.json();
        let out=document.getElementById('fpeValidateOut');
        if(d.valid){
            out.innerHTML='<div class="safety"><b>\u2705 Layout Valid</b> - All '+d.rooms_checked+' rooms meet building code minimums. Code: '+d.code+'</div>';
        }else{
            let h='<div class="recs"><b>\u26A0\uFE0F Violations Found:</b><ul style="font-size:10px;margin:4px 0;padding-left:16px">';
            (d.violations||[]).forEach(v=>{h+='<li style="color:#ef5350">'+v.room+': '+v.issue+'</li>';});
            h+='</ul></div>';
            out.innerHTML=h;
        }
    }catch(e){document.getElementById('fpeValidateOut').innerHTML='<div style="color:#ef5350;font-size:10px">Server offline</div>';}
}

async function fpeAutoSolve(){
    let rooms=fpe.elements.filter(x=>x.type==='room'&&x.floor===fpe.floor);
    if(!rooms.length)return;
    let roomData=rooms.map(r=>({name:r.label,width:r.w,depth:r.h,area:r.w*r.h}));
    try{
        let resp=await fetch(API+'/spatial/solve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rooms:roomData,grid_size:0.05})});
        let d=await resp.json();
        if(d.success&&d.adjusted_rooms){
            fpeSaveHistory();
            d.adjusted_rooms.forEach(adj=>{
                let el=rooms.find(r=>r.label===adj.name);
                if(el){el.w=adj.width;el.h=adj.depth;}
            });
            fpeRender();fpeUpdatePlacedList();
            let out=document.getElementById('fpeValidateOut');
            if(out)out.innerHTML='<div class="safety"><b>\u{1F9E0} Auto-Fixed:</b> '+d.adjusted_rooms.length+' rooms adjusted to meet codes.</div>';
        }
    }catch(e){}
}

/* ============ CAD CANVAS ============ */
function setupCad(){let cv=document.getElementById('cadCanvas');if(!cv)return;cadCtx=cv.getContext('2d');cadHistory=[];drawGrid();
cv.onmousedown=e=>{cadDrawing=true;cadCtx.beginPath();let r=cv.getBoundingClientRect();cadCtx.moveTo(e.clientX-r.left,e.clientY-r.top);};
cv.onmousemove=e=>{if(!cadDrawing)return;let r=cv.getBoundingClientRect();let x=e.clientX-r.left,y=e.clientY-r.top;if(cadShowGrid){x=Math.round(x/20)*20;y=Math.round(y/20)*20;}cadCtx.strokeStyle=cadPenColor;cadCtx.lineWidth=cadPenW;cadCtx.lineCap='round';cadCtx.lineTo(x,y);cadCtx.stroke();};
cv.onmouseup=()=>{cadDrawing=false;cadHistory.push(cv.toDataURL());};cv.onmouseout=()=>cadDrawing=false;}
function setCadTool(t){let c={wall:'#2d3436',room:'#0c2461',door:'#e74c3c',window:'#3498db',dim:'#e67e22',text:'#636e72',free:'#0c2461'};cadPenColor=c[t]||'#0c2461';cadPenW=t==='wall'?4:2;}
function drawGrid(){if(!cadCtx)return;cadCtx.strokeStyle='#eee';cadCtx.lineWidth=0.5;for(let x=0;x<=900;x+=20){cadCtx.beginPath();cadCtx.moveTo(x,0);cadCtx.lineTo(x,450);cadCtx.stroke();}for(let y=0;y<=450;y+=20){cadCtx.beginPath();cadCtx.moveTo(0,y);cadCtx.lineTo(900,y);cadCtx.stroke();}}
function clearCad(){if(cadCtx){cadCtx.clearRect(0,0,900,450);drawGrid();}cadHistory=[];}
function undoCad(){if(cadHistory.length){cadHistory.pop();cadCtx.clearRect(0,0,900,450);drawGrid();if(cadHistory.length){let img=new Image();img.onload=()=>cadCtx.drawImage(img,0,0);img.src=cadHistory[cadHistory.length-1];}}}
async function saveCadSketch(){try{let r=await fetch(API+'/wizard/sketch-to-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sketch_data:document.getElementById('cadCanvas').toDataURL(),building_type:gv('p3_type')||'Residential',stories:+gv('p2_stories')||2,bedrooms:+gv('p4_beds')||3})});let d=await r.json();if(d.result){let det=d.result.detected_dimensions;alert('Analyzed! Rooms: '+det.rooms_detected+', Area: '+det.estimated_area+'m\u00B2, Stories: '+det.stories_detected);}else{alert('Analysis returned no results');}}catch(e){alert('Server unreachable - sketch saved locally only');}}

let _locTimer=null;
function setupLocationListener(){

async function fetchLocationIntel(location){
    let card=document.getElementById('locationIntelCard');
    let el=document.getElementById('locationIntel');
    if(!el||!location||location.length<2)return;
    if(card)card.style.display='block';
    el.innerHTML='<div class="spinner" style="width:16px;height:16px"></div>';
    try{
        let [codeR,recsR]=await Promise.all([
            fetch(API.replace('/api','')+'/api/global/building-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:location})}),
            fetch(API.replace('/api','')+'/api/global/design-recommendations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:location,building_type:gv('p3_type')||'Residential'})})
        ]);
        let code=await codeR.json(),recs=await recsR.json();
        let h='<div class="res-grid">';
        if(code.country)h+=rb('\uD83C\uDDFA\uD83C\uDDF3 Country',code.country);
        if(code.code_name)h+=rb('\uD83D\uDCCB Building Code',code.code_name);
        if(recs.recommendations){
            let r=recs.recommendations;
            if(r.climate_zone)h+=rb('\u2600\uFE0F Climate',r.climate_zone.charAt(0).toUpperCase()+r.climate_zone.slice(1));
            if(r.seismic_zone)h+=rb('\uD83C\uDF0B Seismic',r.seismic_zone);
            if(r.design_tips){
                h+='</div><div style="margin-top:8px"><b style="color:#42a5f5;font-size:10px">\u2728 AI Design Tips:</b><ul style="font-size:10px;margin:4px 0;padding-left:16px;color:#aaa">';
                r.design_tips.forEach(t=>{h+='<li>'+t+'</li>';});

let pmScene,pmCamera,pmRenderer,pmControls,pmElements=[],pmSelectedType=null,pmSelectedIdx=-1,pmRaycaster,pmMouse,pmCurrentParams=[];

async function pmInit(){
    // Load element types
    try{
        const r=await fetch(API+'/modeler/element-types');
        const d=await r.json();
        const el=document.getElementById('pm-elements');
        if(d.element_types){
            el.innerHTML='';
            const icons={'wall':'🧱','column':'🏛️','beam':'📏','slab':'⬜','door':'🚪','window':'🪟','stair':'🪜','roof':'🏠','ramp':'♿','opening':'🔲'};
            Object.keys(d.element_types).forEach(t=>{
                const btn=document.createElement('button');
                btn.style.cssText='background:#16213e;border:1px solid #333;color:#ccc;padding:6px;border-radius:4px;font-size:10px;cursor:pointer;text-align:center';
                btn.innerHTML=(icons[t]||'📦')+'<br>'+t.replace('_',' ');
                btn.onclick=()=>pmSelectType(t,d.element_types[t]);
                el.appendChild(btn);
            });
        }
    }catch(e){console.error('Modeler init:',e)}
    // Load PBR materials
    try{
        const r=await fetch(API+'/render/materials');
        const d=await r.json();
        const el=document.getElementById('pm-materials');
        if(d.materials){
            el.innerHTML='';
            const matNames=Array.isArray(d.materials)?d.materials:Object.keys(d.materials);
            matNames.slice(0,8).forEach(m=>{
                const btn=document.createElement('button');
                btn.style.cssText='background:#16213e;border:1px solid #333;color:#aaa;padding:4px;border-radius:3px;font-size:9px;cursor:pointer';
                btn.textContent=m.replace('_',' ');
                btn.onclick=()=>pmApplyMaterial(m);
                el.appendChild(btn);
            });
        }
    }catch(e){}
    // Init Three.js viewport
    const vp=document.getElementById('pm-viewport');
    pmScene=new THREE.Scene();
    pmScene.background=new THREE.Color(0x0a0a1a);
    pmScene.fog=new THREE.Fog(0x0a0a1a,50,200);
    pmCamera=new THREE.PerspectiveCamera(45,vp.clientWidth/vp.clientHeight,0.1,500);
    pmCamera.position.set(15,12,15);
    pmRenderer=new THREE.WebGLRenderer({antialias:true});
    pmRenderer.setSize(vp.clientWidth,vp.clientHeight);
    pmRenderer.shadowMap.enabled=true;
    pmRenderer.shadowMap.type=THREE.PCFSoftShadowMap;
    pmRenderer.toneMapping=THREE.ACESFilmicToneMapping;
    pmRenderer.toneMappingExposure=1.2;
    vp.appendChild(pmRenderer.domElement);
    // Lights
    const amb=new THREE.AmbientLight(0x404060,0.4);pmScene.add(amb);
    const sun=new THREE.DirectionalLight(0xffeedd,1.2);
    sun.position.set(20,30,15);sun.castShadow=true;
    sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.far=100;
    sun.shadow.camera.left=-30;sun.shadow.camera.right=30;
    sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;
    pmScene.add(sun);
    const fill=new THREE.DirectionalLight(0x8888ff,0.3);fill.position.set(-10,15,-10);pmScene.add(fill);
    // Ground
    const gnd=new THREE.Mesh(new THREE.PlaneGeometry(100,100),new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.9}));
    gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;pmScene.add(gnd);
    // Grid
    const grid=new THREE.GridHelper(50,50,0x222244,0x111133);pmScene.add(grid);
    // Orbit controls
    pmControls=new THREE.OrbitControls(pmCamera,pmRenderer.domElement);
    pmControls.enableDamping=true;pmControls.dampingFactor=0.08;pmControls.target.set(0,2,0);
    // Raycaster for selection
    pmRaycaster=new THREE.Raycaster();pmMouse=new THREE.Vector2();
    pmRenderer.domElement.addEventListener('click',pmOnClick);
    pmAnimateLoop();
}
function pmAnimateLoop(){requestAnimationFrame(pmAnimateLoop);pmControls&&pmControls.update();pmRenderer&&pmRenderer.render(pmScene,pmCamera);}

function pmSelectType(type,spec){
    pmSelectedType=type;
    const props=document.getElementById('pm-props');
    const defs=spec.defaults||{};
    const params=spec.parameters||Object.keys(defs);
    let fields='';
    params.forEach(p=>{
        const val=defs[p]||1;
        if(typeof val==='string'){
            fields+=`<label style="font-size:10px;color:#888">${p}:</label>
              <input id="pm-p-${p}" value="${val}" style="width:100%;background:#16213e;color:#ccc;border:1px solid #333;padding:3px;border-radius:3px;font-size:10px;margin:2px 0">`;
        }else{
            fields+=`<label style="font-size:10px;color:#888">${p} ${typeof val==='number'&&val<10?'(m)':''}:</label>
              <input id="pm-p-${p}" type="number" value="${val}" step="0.1" style="width:100%;background:#16213e;color:#ccc;border:1px solid #333;padding:3px;border-radius:3px;font-size:10px;margin:2px 0">`;
        }
    });
    props.innerHTML=`<b style="color:#42a5f5">${type.replace('_',' ').toUpperCase()}</b><br>
      ${fields}
      <label style="font-size:10px;color:#888">X Position:</label>
      <input id="pm-x" type="number" value="0" step="0.5" style="width:100%;background:#16213e;color:#ccc;border:1px solid #333;padding:3px;border-radius:3px;font-size:10px;margin:2px 0">
      <label style="font-size:10px;color:#888">Z Position:</label>
      <input id="pm-z" type="number" value="0" step="0.5" style="width:100%;background:#16213e;color:#ccc;border:1px solid #333;padding:3px;border-radius:3px;font-size:10px;margin:2px 0">
      <button onclick="pmAddElement()" style="background:#42a5f5;color:#fff;border:none;padding:6px;border-radius:4px;width:100%;margin-top:8px;cursor:pointer;font-size:11px;font-weight:bold">+ Add to Scene</button>`;
    pmCurrentParams=params;
}

async function pmAddElement(){
    if(!pmSelectedType)return;
    const params={};
    pmCurrentParams.forEach(p=>{
        const el=document.getElementById('pm-p-'+p);
        if(el){const v=el.value;params[p]=isNaN(v)?v:parseFloat(v);}
    });
    const w=params.width||params.length||params.span||1;
    const h=params.height||params.rise||3;
    const d=params.depth||params.thickness||0.2;
    const px=parseFloat(document.getElementById('pm-x').value)||0;
    const pz=parseFloat(document.getElementById('pm-z').value)||0;
    document.getElementById('pm-status').textContent='Creating '+pmSelectedType+'...';
    try{
        const r=await fetch(API+'/modeler/create',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({element_type:pmSelectedType,parameters:params})});
        const data=await r.json();
        if(!data.success)throw new Error(data.error||'Create failed');
        const elem=data.element||data;
        // Build 3D mesh from server geometry
        const geo=elem.geometry||data.geometry;
        const colors={wall:0x8B7355,column:0x888888,beam:0x666688,slab:0xaaaaaa,door:0x8B4513,window:0x88ccff,stair:0x996633,roof:0xcc4444,railing:0x444444,curtain_wall:0x4488aa};
        const color=colors[pmSelectedType]||0x888888;
        let mesh;
        if(geo&&geo.objects){
            const group=new THREE.Group();
            geo.objects.forEach(obj=>{
                let g;
                if(obj.type==='cylinder')g=new THREE.CylinderGeometry(obj.size[0]/2,obj.size[0]/2,obj.size[1]||h,16);
                else if(obj.type==='sphere')g=new THREE.SphereGeometry(obj.size[0],12,12);
                else g=new THREE.BoxGeometry(obj.size[0]||w,obj.size[1]||h,obj.size[2]||d);
                const mat=new THREE.MeshStandardMaterial({color:parseInt(obj.color?.replace('#','0x'))||color,roughness:0.7,metalness:0.1,wireframe:obj.wireframe||false});
                const m=new THREE.Mesh(g,mat);
                if(obj.position){m.position.set(obj.position[0],obj.position[1],obj.position[2]);}
                m.castShadow=true;m.receiveShadow=true;
                group.add(m);
            });
            group.position.set(px,0,pz);
            mesh=group;
        }else{
            const g=new THREE.BoxGeometry(w,h,d);
            const mat=new THREE.MeshStandardMaterial({color:color,roughness:0.7,metalness:0.1});
            mesh=new THREE.Mesh(g,mat);
            mesh.position.set(px,h/2,pz);
            mesh.castShadow=true;mesh.receiveShadow=true;
        }
        mesh.userData={type:pmSelectedType,serverData:elem,idx:pmElements.length};
        pmScene.add(mesh);
        pmElements.push({mesh,type:pmSelectedType,data:elem});
        pmUpdateSceneList();
        document.getElementById('pm-status').textContent=pmSelectedType+' added ('+elem.type+')';
    }catch(e){document.getElementById('pm-status').textContent='Error: '+e.message;}
}

function pmUpdateSceneList(){
    const el=document.getElementById('pm-scene-list');
    if(pmElements.length===0){el.innerHTML='No elements yet';return;}
    el.innerHTML=pmElements.map((e,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #222;${i===pmSelectedIdx?'color:#42a5f5;font-weight:bold':''}">
        <span style="cursor:pointer" onclick="pmSelect(${i})">${e.type} #${i+1}</span>
        <button onclick="pmRemove(${i})" style="background:#8b0000;color:#fff;border:none;padding:1px 6px;border-radius:3px;font-size:9px;cursor:pointer">✕</button>
    </div>`).join('');
}

function pmSelect(i){pmSelectedIdx=i;pmUpdateSceneList();
    pmElements.forEach((e,j)=>{
        if(e.mesh.material)e.mesh.material.emissive=new THREE.Color(j===i?0x224488:0x000000);
        else if(e.mesh.children)e.mesh.children.forEach(c=>{if(c.material)c.material.emissive=new THREE.Color(j===i?0x224488:0x000000);});
    });
}
function pmRemove(i){pmScene.remove(pmElements[i].mesh);pmElements.splice(i,1);if(pmSelectedIdx>=pmElements.length)pmSelectedIdx=-1;pmUpdateSceneList();}
function pmOnClick(ev){
    const rect=pmRenderer.domElement.getBoundingClientRect();
    pmMouse.x=((ev.clientX-rect.left)/rect.width)*2-1;
    pmMouse.y=-((ev.clientY-rect.top)/rect.height)*2+1;
    pmRaycaster.setFromCamera(pmMouse,pmCamera);
    const meshes=[];pmElements.forEach(e=>{if(e.mesh.isGroup)e.mesh.children.forEach(c=>meshes.push(c));else meshes.push(e.mesh);});
    const hits=pmRaycaster.intersectObjects(meshes);
    if(hits.length>0){
        let obj=hits[0].object;while(obj.parent&&!obj.userData.idx&&obj.userData.idx!==0)obj=obj.parent;
        const idx=pmElements.findIndex(e=>e.mesh===obj||e.mesh===obj.parent);
        if(idx>=0)pmSelect(idx);
    }
}

async function pmBoolean(op){
    if(pmElements.length<2){document.getElementById('pm-status').textContent='Need 2+ elements for boolean';return;}
    const a=pmSelectedIdx>=0?pmSelectedIdx:0;
    const b=a===0?1:0;
    try{
        const r=await fetch(API+'/modeler/boolean',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({operation:op,element_a:pmElements[a].data,element_b:pmElements[b].data})});
        const d=await r.json();
        document.getElementById('pm-status').textContent=`Boolean ${op}: ${d.result_vertices||'?'} vertices`;
    }catch(e){document.getElementById('pm-status').textContent='Boolean error: '+e.message;}
}

async function pmApplyMaterial(matName){
    if(pmSelectedIdx<0){document.getElementById('pm-status').textContent='Select an element first';return;}
    try{
        const r=await fetch(API+'/render/material',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({material:matName})});
        const d=await r.json();
        if(d.properties){
            const p=d.properties;
            const col=new THREE.Color(p.color||'#888888');
            const applyMat=(m)=>{if(m.material){m.material.color=col;m.material.roughness=p.roughness||0.7;m.material.metalness=p.metalness||0;m.material.needsUpdate=true;}};
            const el=pmElements[pmSelectedIdx].mesh;
            if(el.isGroup)el.children.forEach(applyMat);else applyMat(el);
            document.getElementById('pm-status').textContent=matName+' applied';
        }
    }catch(e){document.getElementById('pm-status').textContent='Material error: '+e.message;}
}

async function pmRenderScene(){
    document.getElementById('pm-status').textContent='Rendering scene...';
    const overlay=document.getElementById('pm-render-overlay');
    try{

            body:JSON.stringify({objects:objects,camera:{position:[15,12,15],target:[0,2,0]},environment:'studio',resolution:[1920,1080]})});

async function srDesignRebar(){
    const type=document.getElementById('rb-type').value;
    const el=document.getElementById('sr-rebar-result');
    const draw=document.getElementById('sr-drawing');
    el.innerHTML='<span style="color:#42a5f5">Calculating to Eurocode 2...</span>';
    const w=+document.getElementById('rb-w').value;
    const d=+document.getElementById('rb-d').value;
    const span=+document.getElementById('rb-span').value;
    const load=+document.getElementById('rb-load').value;
    const cover=+document.getElementById('rb-cover').value;
    const conc=document.getElementById('rb-conc').value;
    try{
        let url,body;
        if(type==='beam'){url=API+'/rebar/beam';body={width_mm:w,depth_mm:d,span_m:span,load_kn_m:load,concrete_grade:conc,cover_mm:cover};}
        else if(type==='column'){url=API+'/rebar/column';body={width_mm:w,depth_mm:d,height_m:span,axial_kn:+document.getElementById('rb-axial').value,concrete_grade:conc};}
        else{url=API+'/rebar/slab';body={span_m:span,thickness_mm:d,load_kn_m2:load,concrete_grade:conc};}
        const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data=await r.json();
        // Display results
        const rb=data.rebar||data;
        let html=`<div style="background:#0d1b2a;border-radius:6px;padding:10px;border:1px solid #27ae60">
            <div style="color:#27ae60;font-weight:bold;margin-bottom:6px">✅ ${type.toUpperCase()} REBAR DESIGN</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10px">`;
        const rec=rb.recommended||(rb.main_bar_options&&rb.main_bar_options[0])||rb.main_bars||rb.main_reinforcement||{};
        if(type==='beam'){
            html+=`<div>Main: ${rec.count||'-'}T${rec.diameter_mm||'-'}</div><div>As: ${rec.As_provided_mm2||rb.As_required_mm2||'-'} mm²</div>`;
            if(rb.shear_links)html+=`<div>Links: T${rb.shear_links.diameter_mm||8}@${rb.shear_links.spacing_mm||'-'}mm</div><div>${rb.shear_links.arrangement||''}</div>`;
        } else if(type==='column'){
            html+=`<div>Main: ${rec.count||'-'}T${rec.diameter_mm||'-'}</div><div>As: ${rec.As_provided_mm2||rb.As_required_mm2||'-'} mm²</div>`;
            if(rb.links)html+=`<div>Links: T${rb.links.diameter_mm||8}@${rb.links.spacing_mm||'-'}mm</div><div>Weight: ${rb.links.weight_kg||'-'} kg</div>`;
        } else {
            html+=`<div>Main: T${rec.diameter_mm||'-'}@${rec.spacing_mm||'-'}mm</div><div>As: ${rec.As_per_m_mm2||rb.As_required_mm2_per_m||'-'} mm²/m</div>`;
            if(rb.distribution_reinforcement)html+=`<div>Dist: T${rb.distribution_reinforcement.diameter_mm}@${rb.distribution_reinforcement.spacing_mm}mm</div>`;
        }
        if(rb.design_standard)html+=`<div style="color:#42a5f5">${rb.design_standard}</div>`;
        html+=`</div></div>`;
        el.innerHTML=html;

        // SVG cross-section drawing
        const sw=300,sh=250,cx=sw/2,cy=sh/2;
        let svg=`<svg width="${sw}" height="${sh}" xmlns="http://www.w3.org/2000/svg" style="background:#0d1b2a;border-radius:6px">`;
        const scale=Math.min((sw-40)/w,(sh-60)/d);
        const rw=w*scale,rd=d*scale,rx=cx-rw/2,ry=cy-rd/2+10;
        svg+=`<rect x="${rx}" y="${ry}" width="${rw}" height="${rd}" fill="#333" stroke="#888" stroke-width="2"/>`;
        svg+=`<text x="${cx}" y="${ry-8}" text-anchor="middle" fill="#888" font-size="10">${w}mm</text>`;
        svg+=`<text x="${rx-8}" y="${cy+10}" text-anchor="end" fill="#888" font-size="10" transform="rotate(-90,${rx-8},${cy+10})">${d}mm</text>`;
        // Cover lines
        const cover_v=cover*scale;
        svg+=`<rect x="${rx+cover_v}" y="${ry+cover_v}" width="${rw-2*cover_v}" height="${rd-2*cover_v}" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="4,4"/>`;
        // Main bars (bottom)
        const nBars=rec.count||rec.quantity||4;
        const dia=rec.diameter_mm||16;
        const barR=dia*scale/2*3; // exaggerated for visibility
        for(let i=0;i<Math.min(nBars,8);i++){
            const bx=rx+cover_v+barR+(rw-2*cover_v-2*barR)*i/Math.max(1,Math.min(nBars,8)-1);
            const by=ry+rd-cover_v;
            svg+=`<circle cx="${bx}" cy="${by}" r="${barR}" fill="#e74c3c" stroke="#fff" stroke-width="0.5"/>`;
        }
        // Top bars (2)
        for(let i=0;i<2;i++){
            const bx=rx+cover_v+barR+(rw-2*cover_v-2*barR)*i;
            svg+=`<circle cx="${bx}" cy="${ry+cover_v}" r="${barR*0.7}" fill="#e67e22" stroke="#fff" stroke-width="0.5"/>`;
        }
        // Stirrup
        svg+=`<rect x="${rx+cover_v-2}" y="${ry+cover_v-2}" width="${rw-2*cover_v+4}" height="${rd-2*cover_v+4}" fill="none" stroke="#27ae60" stroke-width="1.5" rx="3"/>`;
        const linkDia=rb.shear_links?.diameter_mm||rb.links?.diameter_mm||8;
        const linkSpacing=rb.shear_links?.spacing_mm||rb.links?.spacing_mm||200;
        svg+=`<text x="${cx}" y="${sh-5}" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">${nBars}T${dia} + T${linkDia}@${linkSpacing} stirrups</text>`;
        svg+=`</svg>`;
        draw.innerHTML=svg;
    }catch(e){el.innerHTML='<span style="color:#e74c3c">Error: '+e.message+'</span>';}
}

async function cmLoadRFIs(){

        if(subs.length===0){el.innerHTML='<div style="color:#555">No submittals yet.</div>';return;}

                    <button onclick="cmReviewSubmittal('${s.id}','approved')" style="background:#27ae60;color:#fff;border:none;padding:2px 8px;border-radius:3px;font-size:9px;cursor:pointer">Approve</button>

                    <button onclick="cmReviewSubmittal('${s.id}','revise_resubmit')" style="background:#ff6600;color:#fff;border:none;padding:2px 8px;border-radius:3px;font-size:9px;cursor:pointer">Revise</button>
                    <button onclick="cmReviewSubmittal('${s.id}','rejected')" style="background:#e74c3c;color:#fff;border:none;padding:2px 8px;border-radius:3px;font-size:9px;cursor:pointer">Reject</button>
                </div>`:''}

            </div>`;
        }).join('');
    }catch(e){document.getElementById('cm-sub-list').innerHTML='<span style="color:#e74c3c">Error loading</span>';}

async function cmReviewSubmittal(subNum,status){

}

async function crLoadCountries(){

function crChangeCountry(c){
    crCountry=c;
    let info=crCountries.find(x=>x.country===c);
    if(info){crCurrency=info.currency;}
    let curSel=document.getElementById('cr-currency');
    if(curSel){

        curSel.innerHTML=allCur.map(cu=>`<option value="${cu}"${cu===crCurrency?' selected':''}>${cu}</option>`).join('');

    crSwitchTab(crTab);

function crGetParams(){
    return {
        country: crCountry,
        currency: document.getElementById('cr-currency')?.value||crCurrency,
        area: parseFloat(document.getElementById('cr-area')?.value||450),
        stories: parseInt(document.getElementById('cr-stories')?.value||2),
        units: parseInt(document.getElementById('cr-units')?.value||3),
        bedrooms: parseInt(document.getElementById('cr-beds')?.value||3),
        building_type: 'residential',
        location: crCountry,
    };
}

function crSwitchTab(tab){
    crTab=tab;
    ['materials','report','quotation','package'].forEach(t=>{
        let btn=document.getElementById('cr-tab-'+t);
        if(btn){btn.style.color=t===tab?'#42a5f5':'#aaa';btn.style.borderColor=t===tab?'#42a5f5':'#333';}

    if(tab==='materials') crShowMaterials();
    else if(tab==='report') crShowReport();
    else if(tab==='quotation') crShowQuotation();
    else if(tab==='package') crShowPackage();
}

/* Costing materials — editable prices with localStorage persistence.
   Keys per country (so Kenya overrides ≠ UAE overrides). Auto-save on
   input, debounced auto-recalc, search + category filter, CSV export/
   import. Overrides survive page reloads and browser restarts. */
function crLoadOverrides(country){
    try{ return JSON.parse(localStorage.getItem('eims_cost_overrides_'+country)||'{}'); }
    catch(e){ return {}; }
}
function crSaveOverrides(country, ov){
    localStorage.setItem('eims_cost_overrides_'+country, JSON.stringify(ov));
}
let crRecalcTimer=null, crFilter='', crCatFilter='all';

function crOnRateChange(input){
    // Persist the override to localStorage, visually mark the row, and
    // schedule a debounced recalculation (500ms after last keystroke).
    const name=input.dataset.name;
    const def=parseFloat(input.dataset.default);
    const val=parseFloat(input.value);
    const ov=crLoadOverrides(crCountry);
    if(isNaN(val)||Math.abs(val-def)<0.0001){
        delete ov[name];
        input.style.borderColor='#333';
        input.style.color='#e0e0e0';
    } else {
        ov[name]=val;
        input.style.borderColor='#ff9800';
        input.style.color='#ffb74d';
    }
    crSaveOverrides(crCountry, ov);
    clearTimeout(crRecalcTimer);
    crRecalcTimer=setTimeout(crRecalculate, 500);
}

function crFilterMaterials(q){
    crFilter=q||'';
    const qq=crFilter.toLowerCase();
    document.querySelectorAll('#cr-mat-tbl tbody tr').forEach(tr=>{
        const desc=(tr.dataset.desc||'').toLowerCase();
        const cat=tr.dataset.cat||'';
        const matchSearch=!qq||desc.includes(qq)||cat.toLowerCase().includes(qq);
        const matchCat=crCatFilter==='all'||cat===crCatFilter;
        tr.style.display=matchSearch&&matchCat?'':'none';
    });
}
function crFilterByCategory(cat){
    crCatFilter=cat;
    crFilterMaterials(crFilter);
    // Re-render buttons with new active state
    const tbl=document.getElementById('cr-mat-tbl');
    if(!tbl) return;
    crShowMaterials(); // simpler: re-render so pill highlights update
}

async function crRecalculate(){
    let el=document.getElementById('cr-content');
    if(!el) return;
    const overrides=crLoadOverrides(crCountry);
    const p=crGetParams();
    if(Object.keys(overrides).length) p.price_overrides=overrides;
    try{
        let r=await fetch(API+'/materials/estimate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
        let d=await r.json();
        if(d.success){
            crEstimate=d;
            // Update just the summary numbers in-place (no full re-render — keeps
            // focus on the input the user is currently editing)
            const totalEl=el.querySelector('[style*="28px"]');
            if(totalEl){
                const sym=d.symbol||'$';
                totalEl.textContent=`${sym} ${d.total_material_cost_local?.toLocaleString()}`;
            }
            // Update each row's amount column
            (d.items||[]).forEach(it=>{
                const tr=el.querySelector(`tr[data-desc="${CSS.escape(it.description||'')}"]`);
                if(tr){
                    const amt=tr.querySelector('.cr-amount');
                    if(amt) amt.textContent=`${d.symbol||'$'} ${it.local_amount?.toLocaleString()}`;
                }
            });
        }
    }catch(e){/* silent — stale numbers show until next edit */}
}

function crResetOverrides(){
    const ov=crLoadOverrides(crCountry);
    const n=Object.keys(ov).length;
    if(!n){ alert('No custom prices to reset for '+crCountry); return; }
    if(!confirm(`Clear all ${n} custom prices for ${crCountry}? This cannot be undone.`)) return;
    localStorage.removeItem('eims_cost_overrides_'+crCountry);
    crShowMaterials();
}
function crExportCSV(){
    if(!crEstimate||!crEstimate.items){ alert('Load material costs first.'); return; }
    const sym=crEstimate.symbol||'$';
    const lines=[['Item','Description','Unit','Quantity','Rate_'+crEstimate.currency,'Amount_'+crEstimate.currency,'Category','Is_Custom'].join(',')];
    const ov=crLoadOverrides(crCountry);
    crEstimate.items.forEach(it=>{
        lines.push([
            it.item_no,
            '"'+(it.description||'').replace(/"/g,'""')+'"',
            it.unit,
            it.quantity,
            it.local_rate,
            it.local_amount,
            it.category,
            (it.description in ov)?'YES':'',
        ].join(','));
    });
    const stamp=new Date().toISOString().slice(0,10);
    const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`eims_costing_${crCountry}_${stamp}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function crImportCSV(fileInput){
    const f=fileInput.files&&fileInput.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{
        const text=String(reader.result);
        const lines=text.split(/\r?\n/).filter(Boolean);
        if(lines.length<2){ alert('CSV is empty or unreadable.'); return; }
        // Parse header, find Description + Rate columns
        const header=lines[0].split(',').map(s=>s.trim().replace(/^"|"$/g,'').toLowerCase());
        const descIdx=header.findIndex(h=>h==='description');
        const rateIdx=header.findIndex(h=>h.startsWith('rate'));
        if(descIdx<0||rateIdx<0){ alert('CSV needs at least "Description" and "Rate_*" columns.'); return; }
        const ov=crLoadOverrides(crCountry);
        let n=0;
        for(let i=1;i<lines.length;i++){
            const parts=[]; let cur=''; let inQ=false;
            for(const ch of lines[i]){
                if(ch==='"'){ inQ=!inQ; continue; }
                if(ch===','&&!inQ){ parts.push(cur); cur=''; continue; }
                cur+=ch;
            }
            parts.push(cur);
            const desc=(parts[descIdx]||'').trim();
            const rate=parseFloat(parts[rateIdx]);
            if(desc && !isNaN(rate)){ ov[desc]=rate; n++; }
        }
        crSaveOverrides(crCountry, ov);
        alert('Imported '+n+' prices for '+crCountry+'. Reloading table…');
        crShowMaterials();
    };
    reader.readAsText(f);
    fileInput.value='';
}

/* -------- GENERIC CALC RUNNER -------- */
function proFieldInput(f){
  const id=`pf_${f.k}`;
  if(f.type==='select'){
    const opts=f.opts.map(o=>`<option value="${o}" ${String(o)===String(f.def)?'selected':''}>${o}</option>`).join('');
    return `<div class="fg"><label class="fl" for="${id}">${f.l}</label><select id="${id}">${opts}</select></div>`;
  }
  if(f.type==='textarea'){
    const uploader = f.upload==='image'
      ? `<input type="file" accept="image/*" id="${id}_file" onchange="proReadImageToField('${id}', this)" style="margin-top:6px;font-size:11px;color:#8899aa"/>
         <span id="${id}_st" style="display:none;margin-left:6px;font-size:10px;color:#81c784">loaded ✓</span>` : '';
    return `<div class="fg">
      <label class="fl" for="${id}">${f.l}</label>
      <textarea id="${id}" rows="6" oninput="proValidateJSON('${id}')">${(f.def||'').replace(/</g,'&lt;')}</textarea>
      <div id="${id}_err" style="display:none;color:#ef9a9a;font-size:10px;margin-top:2px"></div>
      ${uploader}
    </div>`;
  }
  const step=f.step?`step="${f.step}"`:'';
  return `<div class="fg"><label class="fl" for="${id}">${f.l}</label><input id="${id}" type="${f.type}" value="${f.def??''}" ${step}/></div>`;
}
function proValidateJSON(id){
  const ta=document.getElementById(id);
  const err=document.getElementById(id+'_err');
  if(!ta||!err) return;
  const v=ta.value.trim();
  // Empty textareas are allowed (may be intentionally optional)
  if(!v||!/^[\[\{]/.test(v)){ err.style.display='none'; ta.style.borderColor=''; return; }
  try{ JSON.parse(v); err.style.display='none'; ta.style.borderColor='#1b5e20'; }
  catch(e){ err.textContent='JSON: '+e.message; err.style.display='block'; ta.style.borderColor='#c62828'; }
}
function proReadImageToField(id, fileInput){
  const file=fileInput.files && fileInput.files[0];
  if(!file) return;
  const st=document.getElementById(id+'_st');
  const ta=document.getElementById(id);
  const reader=new FileReader();
  reader.onload=()=>{ ta.value=String(reader.result); if(st){ st.style.display='inline'; st.textContent=`loaded ✓ (${(file.size/1024).toFixed(1)} KB)`; } };
  reader.onerror=()=>{ if(st){ st.style.display='inline'; st.style.color='#ef9a9a'; st.textContent='failed to read file'; } };
  reader.readAsDataURL(file);
}
function proReadForm(calc){
  const body={},qs={};
  for(const f of calc.f){
    const el=document.getElementById(`pf_${f.k}`); if(!el) continue;
    let v=el.value;
    if(f.type==='number') v=v===''?null:Number(v);
    else if(f.type==='textarea'){
      const trimmed=(v||'').trim();
      if(trimmed===''||trimmed==='null') v=null;
      else if(/^[\[\{]/.test(trimmed)){
        try{ v=JSON.parse(trimmed); }
        catch(e){ throw new Error(`Field "${f.l||f.k}" — invalid JSON: ${e.message}`); }
      }
      // else: plain text string (used for image base64 etc.)
    }
    else if(f.type==='select' && (v==='true'||v==='false')) v=(v==='true');
    (f.qs?qs:body)[f.k]=v;
  }
  return {body,qs};
}
/* ====== SMART RESULT RENDERING ======
   Raw JSON is for developers. Clients want formatted tables, labeled
   values, color swatches, PASS/FAIL badges. Below:
     - proRenderResult()  — main dispatcher (per-endpoint overrides + fallback)
     - proRenderObject()  — object → bold-label field list
     - proRenderArray()   — array of objects → HTML table (or cards if too wide)
     - proFmtValue()      — unit-aware, hex-swatch-aware, bool → ✓/✗
     - proPrettyJSON()    — kept for the collapsible "raw" section
*/
const PRO_UNIT_SUFFIXES = {'_kNm':'kNm','_kN':'kN','_MPa':'MPa','_kPa':'kPa','_psf':'psf',
  '_m2':'m²','_m3':'m³','_m3_s':'m³/s','_mm_hr':'mm/hr','_mm_day':'mm/day',
  '_mm':'mm','_ft':'ft','_m_per_m':'m/m','_W_mK':'W/mK','_W_m2K':'W/m²K',
  '_kgCO2e_per_unit':'kg CO₂e/unit','_kgCO2e':'kg CO₂e','_kg':'kg',
  '_hr':'hr','_deg':'°','_C':'°C','_K':'K','_mph':'mph','_mps':'m/s',
  '_days':'days','_months':'months','_min':'min','_Hz':'Hz','_pct':'%','_psi':'psi',
  '_lux':'lux','_s':'s','_dB':'dB','_y_in':'in','_lbf':'lbf'};

function proLabel(k){ return String(k).replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase()); }
function proExtractUnit(k){
  for(const suf in PRO_UNIT_SUFFIXES) if(k.endsWith(suf)) return PRO_UNIT_SUFFIXES[suf];
  return '';
}
function proFmtNumber(n){
  if(n==null) return '—';
  if(typeof n!=='number'||!isFinite(n)) return String(n);
  if(n!==0 && Math.abs(n)<0.001) return n.toExponential(2);
  if(Math.abs(n)>=10000) return n.toLocaleString(undefined,{maximumFractionDigits:0});
  return n.toLocaleString(undefined,{maximumFractionDigits:3});
}
function proEscape(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function proFmtValue(k,v){
  if(v==null) return '<span style="color:#555">—</span>';
  if(typeof v==='boolean') return v?'<span style="color:#81c784;font-weight:700">✓ yes</span>':'<span style="color:#ef9a9a">✗ no</span>';
  if(typeof v==='number'){
    const unit=proExtractUnit(k);
    return `<span style="color:#90caf9;font-weight:600">${proFmtNumber(v)}</span>${unit?' <span style="color:#7986cb;font-size:10px">'+unit+'</span>':''}`;
  }
  if(Array.isArray(v)){
    if(v.length===0) return '<span style="color:#555">(empty)</span>';
    if(v.every(x=>typeof x!=='object'||x===null))
      return v.map(x=>'<span style="color:#a5b4fc">'+proEscape(x)+'</span>').join(' · ');
    return proRenderArray(v);
  }
  if(typeof v==='object') return proRenderObject(v,1);
  const s=String(v);
  if(/^#[0-9a-f]{6}$/i.test(s))
    return `<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:18px;height:18px;background:${s};border:1px solid #333;border-radius:3px;display:inline-block"></span><span style="color:#a5b4fc;font-family:monospace">${s}</span></span>`;
  if(/^RED|AMBER|GREEN$/.test(s)){
    const c={RED:'#ef5350',AMBER:'#ff9800',GREEN:'#4caf50'}[s];
    return `<span style="padding:2px 8px;border-radius:3px;background:${c};color:#fff;font-size:10px;font-weight:700">${s}</span>`;
  }
  return `<span style="color:#e0e0e0">${proEscape(s)}</span>`;
}
function proRenderObject(obj,depth){
  depth=depth||0;
  return Object.entries(obj).map(([k,v])=>{
    const label=proLabel(k);
    if(v && typeof v==='object' && !Array.isArray(v) && Object.keys(v).length){
      return `<div style="margin-top:${depth?6:10}px"><div style="font-weight:600;color:#7986cb;font-size:11px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid #1e2560">${label}</div><div style="padding-left:${depth?0:8}px">${proRenderObject(v,depth+1)}</div></div>`;
    }
    if(Array.isArray(v) && v.length && v.every(x=>x && typeof x==='object')){
      return `<div style="margin-top:${depth?6:10}px"><div style="font-weight:600;color:#7986cb;font-size:11px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">${label} <span style="color:#555;font-size:10px;font-weight:400">(${v.length})</span></div>${proRenderArray(v)}</div>`;
    }
    return `<div style="display:grid;grid-template-columns:180px 1fr;gap:10px;padding:4px 0;font-size:12px;border-bottom:1px dotted #1e2560"><div style="color:#8899aa">${label}</div><div>${proFmtValue(k,v)}</div></div>`;
  }).join('');
}
function proRenderArray(arr){
  if(!arr.length) return '<div style="color:#555;font-size:11px">(empty)</div>';
  const cols=new Set();
  arr.forEach(o=>Object.keys(o).forEach(k=>cols.add(k)));
  const colKeys=Array.from(cols);
  if(colKeys.length>7){
    return arr.map((o,i)=>`<div style="border:1px solid #1e2560;border-radius:4px;padding:8px;margin-bottom:6px;background:rgba(100,181,246,.03)"><div style="color:#7986cb;font-size:10px;margin-bottom:4px">#${i+1}</div>${proRenderObject(o,1)}</div>`).join('');
  }
  return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:4px">
    <thead><tr style="background:rgba(100,181,246,.08);color:#7986cb">${colKeys.map(k=>`<th style="padding:6px;text-align:left;border-bottom:1px solid #1e2560;white-space:nowrap">${proLabel(k)}</th>`).join('')}</tr></thead>
    <tbody>${arr.map(o=>`<tr>${colKeys.map(k=>`<td style="padding:5px 6px;border-bottom:1px solid #1e2560;vertical-align:top">${proFmtValue(k,o[k])}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}
function proPrettyJSON(obj){
  let s=JSON.stringify(obj,null,2);
  return s.replace(/(&)/g,'&amp;').replace(/</g,'&lt;')
          .replace(/"([^"]+)":/g,'<span class="k">"$1"</span>:')
          .replace(/: ("[^"]*")/g,': <span class="s">$1</span>')
          .replace(/: (-?[0-9]+\.?[0-9]*)/g,': <span class="n">$1</span>')
          .replace(/: (true|false|null)/g,': <span class="b">$1</span>');
}
function proHeadlines(obj){
  const pick=[];
  for(const [k,v] of Object.entries(obj)){
    if(typeof v!=='number') continue;
    if(k.startsWith('_')) continue;
    const unit=proExtractUnit(k);
    pick.push(`<div class="rb"><div class="rl">${proLabel(k)}</div><div class="rv">${proFmtNumber(v)}${unit?' <span style="font-size:10px;color:#7986cb">'+unit+'</span>':''}</div></div>`);

// DEV_MODE: when off (default), raw JSON is hidden behind a collapsible
// developer panel. Response headers never show HTTP method, paths, or
// status codes — use ?dev=1 for raw JSON only.
const DEV_MODE = (() => {
  try {
    const qs = new URLSearchParams(location.search);
    if (qs.get('dev') === '1' || qs.get('devmode') === '1') {
      localStorage.setItem('eims_devmode', '1');
      return true;
    }
    if (qs.get('dev') === '0') { localStorage.removeItem('eims_devmode'); return false; }
    return localStorage.getItem('eims_devmode') === '1';
  } catch(_) { return false; }
})();
window.eimsToggleDevMode = function(on){
  if (on === undefined) on = localStorage.getItem('eims_devmode') !== '1';
  if (on) localStorage.setItem('eims_devmode', '1');
  else    localStorage.removeItem('eims_devmode');
  location.reload();
};

function proRenderResult(endpoint,data){
  if(!data||typeof data!=='object') return `<div style="padding:14px;color:#7986cb;font-size:12px">${proEscape(data)}</div>`;
  if(data.success===false) return `<div class="err">❌ ${proEscape(data.error||data.message||'Request failed')}</div>`;

  const SPECIAL=new Set(['success','disclaimer','code','clauses','standard','reference','generated_utc','fetched_at','data_provenance','source','sources','copyright','notice']);
  const specials={}, main={};
  for(const [k,v] of Object.entries(data)){ (SPECIAL.has(k)?specials:main)[k]=v; }

  const override=PRO_RESULT_OVERRIDES[endpoint];
  let body;
  if(override){
    try{ body=override(main,specials); }catch(e){ body=`<div class="err">render error: ${e.message}</div>`+proRenderObject(main); }
  } else {
    body = proHeadlines(main) + proRenderChecks(main.checks) + proRenderObject(main);
  }
  const footer = proRenderFooter(specials);
  // Raw-JSON dump is engineer-only — hidden from clients by default.
  const raw = DEV_MODE
    ? `<details style="margin-top:10px"><summary style="cursor:pointer;color:#7986cb;font-size:10px;padding:4px 0;user-select:none">▸ View raw JSON (developer mode)</summary><pre style="margin-top:6px;font:11px/1.4 monospace;color:#a5b4fc;max-height:300px;overflow:auto;background:#0a0e27;border:1px solid #1e2560;padding:8px;border-radius:4px;white-space:pre-wrap">${proPrettyJSON(data)}</pre></details>`
    : '';
  return body + footer + raw;
}

/* Download helper — used by SVG renderer + CSV export */
function proDownloadText(text, filename, mimeType){
  const blob = new Blob([text], {type: mimeType || 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function proMatOverridePrice(inputEl){
  const key = inputEl.dataset.key;
  const country = inputEl.dataset.country;
  const def = parseFloat(inputEl.dataset.default);
  const val = parseFloat(inputEl.value);
  const overrides = proLoadMatOverrides(country);
  const prev = Object.keys(overrides).length;
  if (isNaN(val) || Math.abs(val - def) < 0.0001) {
    delete overrides[key];
    inputEl.style.borderColor = '#1e2560';
    inputEl.style.color = '#90caf9';
    const tr = inputEl.closest('tr'); if (tr) tr.style.background = '';
  } else {
    overrides[key] = val;
    inputEl.style.borderColor = '#ff9800';
    inputEl.style.color = '#ffb74d';
    const tr = inputEl.closest('tr'); if (tr) tr.style.background = 'rgba(255,152,0,.04)';
  }
  proSaveMatOverrides(country, overrides);
  const n = Object.keys(overrides).length;
  const countEl = document.getElementById('matOvN');
  const bdg = document.getElementById('matOvCount');
  if (countEl) countEl.textContent = n;
  if (bdg) bdg.style.display = n ? 'inline-block' : 'none';
}
function proMatResetOverrides(country){
  const overrides = proLoadMatOverrides(country);
  const n = Object.keys(overrides).length;
  if (!n) { alert('No custom prices to reset for ' + country); return; }
  if (!confirm('Clear all '+n+' custom prices for '+country+'?\n\nThis cannot be undone.')) return;
  localStorage.removeItem('eims_mat_prices_'+country);

function proMatExportCSV(country){
  const rows = document.querySelectorAll('#matT tbody tr');
  if (!rows.length) { alert('No prices loaded. Run the tile first.'); return; }
  const lines = [['Category','Material','Unit','Baseline_USD','Local_Price','Waste_Pct'].join(',')];
  rows.forEach(tr => {
    const c = tr.querySelectorAll('td');
    const input = tr.querySelector('input[type=number]');
    lines.push([
      '"'+c[0].textContent.trim()+'"',
      '"'+c[1].textContent.trim().replace(/"/g,'""')+'"',
      '"'+c[2].textContent.trim()+'"',
      c[3].textContent.replace(/[^\d.]/g,''),
      input ? input.value : '',
      c[5].textContent.replace(/[^\d]/g,''),
    ].join(','));
  });
  const stamp = new Date().toISOString().slice(0,10);
  proDownloadText(lines.join('\n'), `eims_materials_${country}_${stamp}.csv`, 'text/csv;charset=utf-8');
}
function proMatImportCSV(btnEl, country){
  const fileInput = btnEl.nextElementSibling;
  if (fileInput && fileInput.type === 'file') fileInput.click();
}
function proMatImportCSVFile(fileInputEl, country){
  const f = fileInputEl.files && fileInputEl.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    const text = String(reader.result);
    const lines = text.split(/\r?\n/).filter(Boolean);
    if (lines.length < 2) { alert('CSV is empty or unreadable.'); return; }
    // Skip header
    const overrides = proLoadMatOverrides(country);
    let imported = 0;
    for (let i = 1; i < lines.length; i++){
      // very simple CSV parser — quoted fields with ""
      const parts = []; let cur = ''; let inQ = false;
      for (const ch of lines[i]){
        if (ch === '"'){ inQ = !inQ; continue; }
        if (ch === ',' && !inQ){ parts.push(cur); cur = ''; continue; }
        cur += ch;
      }
      parts.push(cur);
      const [cat, name, , , local_price] = parts;
      const key = (cat||'').trim().toLowerCase() + '::' + (name||'').trim();
      const val = parseFloat(local_price);
      if (!isNaN(val) && key !== '::') { overrides[key] = val; imported++; }
    }
    proSaveMatOverrides(country, overrides);
    alert('Imported '+imported+' price overrides for '+country+'. Reloading...');
    const calc = PRO_CATALOG.find(x => x.id === 'qs_matlocal');
    if (calc) proExecute(calc);
  };
  reader.readAsText(f);
  fileInputEl.value = '';
}
