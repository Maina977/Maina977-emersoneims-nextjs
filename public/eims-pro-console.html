<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EmersonEIMS Building Suite Pro &middot; Console</title>
<style>
  :root{
    --bg:#0b1220;--panel:#111a2e;--panel2:#16223c;--ink:#e6edf7;--mute:#9aa7c2;
    --acc:#3b82f6;--acc2:#22c55e;--bad:#ef4444;--warn:#f59e0b;--line:#1f2c4a;
    --code:#0e1730; --pill:#1f2a44;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif}
  a{color:var(--acc)}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;
         background:linear-gradient(90deg,#0b1220,#13203b);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  header h1{margin:0;font-size:16px;letter-spacing:.4px}
  header h1 small{color:var(--mute);font-weight:400;margin-left:8px}
  .pill{padding:3px 8px;border-radius:999px;background:var(--pill);color:var(--mute);font-size:11px;margin-left:6px}
  .ok{color:var(--acc2)}.bad{color:var(--bad)}.warn{color:var(--warn)}
  main{display:grid;grid-template-columns:260px 1fr;height:calc(100% - 46px)}
  nav{border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:10px 0}
  nav .grp{padding:10px 14px 4px;color:var(--mute);font-size:11px;letter-spacing:1px;text-transform:uppercase}
  nav button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:0;color:var(--ink);
             cursor:pointer;font-size:13px;border-left:3px solid transparent}
  nav button:hover{background:var(--panel2)}
  nav button.active{background:var(--panel2);border-left-color:var(--acc);color:#fff}
  section.view{padding:18px 22px;overflow-y:auto}
  h2{margin:0 0 4px;font-size:18px}
  .sub{color:var(--mute);margin:0 0 14px;font-size:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--mute);margin:6px 0 4px}
  input,select,textarea{width:100%;background:#0e1730;border:1px solid var(--line);color:var(--ink);
                          padding:7px 9px;border-radius:6px;font:13px monospace}
  textarea{min-height:90px;font:12px/1.35 ui-monospace,Consolas,monospace}
  .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
  button.act{background:var(--acc);color:#fff;border:0;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:600;margin-top:10px}
  button.act:hover{background:#2563eb}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .out{background:var(--code);border:1px solid var(--line);border-radius:8px;padding:12px;
       max-height:520px;overflow:auto;color:#dbe7ff}
  .stat{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;background:#1f2a44;color:#c5d3f1}
  .chip.ok{background:#123526;color:#86efac}.chip.bad{background:#3a1111;color:#fca5a5}
  .metric{display:inline-block;background:#13203b;border:1px solid var(--line);padding:8px 10px;border-radius:8px;margin:0 8px 8px 0}
  .metric b{display:block;color:#9fb4dd;font-size:11px;font-weight:500}
  .metric span{font-size:15px;font-weight:700;color:#fff}
  .tblwrap{overflow:auto;border:1px solid var(--line);border-radius:8px}
  .note{padding:10px;border:1px solid var(--line);background:#101b33;border-radius:8px;white-space:pre-wrap;line-height:1.5}
  .ref{font-size:11px;color:var(--mute);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:980px){.grid2{grid-template-columns:1fr}}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:6px}
  .b-eng{background:#1e3a8a}.b-qs{background:#065f46}.b-arch{background:#7c2d12}.b-plat{background:#4c1d95}
  .b-safe{background:#b45309}.b-land{background:#15803d}.b-int{background:#be185d}.b-ai{background:#0e7490}
  .b-exp{background:#5b21b6}.b-disrupt{background:#dc2626}.b-collab{background:#0891b2}
  .b-mep{background:#059669}.b-health{background:#9333ea}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
  th,td{border-bottom:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
  th{color:var(--mute);font-weight:600}
  .tool-hint{color:var(--mute);font-size:12px;margin-left:8px;font-weight:400}
</style>
</head>
<body>

<header>
  <h1>EmersonEIMS Building Suite Pro <small>Professional Console</small></h1>
  <div>

<nav id="nav"></nav>
<section class="view" id="view"></section>

// ==========================================================================
//  UI render
// ==========================================================================
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>el.querySelectorAll(s);

function buildNav(){
  const nav = $('#nav'); nav.innerHTML='';
  const groups = {};
  MODULES.forEach(m=>{ (groups[m.group]=groups[m.group]||[]).push(m); });
  Object.entries(groups).forEach(([g, list])=>{
    const h = document.createElement('div'); h.className='grp'; h.textContent=g;
    nav.appendChild(h);
    list.forEach(m=>{
      const b = document.createElement('button');
      b.innerHTML = `<span class="badge ${m.tag}">${m.group[0]}</span>${m.title}`;
      b.dataset.id = m.id;
      b.onclick = ()=>show(m.id);
      nav.appendChild(b);
    });
  });
}

function show(id){
  $$('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  const m = MODULES.find(x=>x.id===id); if(!m) return;
  const v = $('#view');
  const refs = m.refs.length ? `<div class="ref"><strong>Standards / sources:</strong> ${m.refs.join(' &middot; ')}</div>` : '';
  v.innerHTML = `
    <h2>${m.title}</h2>
    <p class="sub"><span class="badge ${m.tag}">${m.group}</span><span class="tool-hint">Enter your parameters, then Run.</span></p>
    <div class="grid2">
      <div class="card">
        <form id="frm">${m.fields.map(renderField).join('')}</form>
        <button class="act" id="run">Run</button>
        <button class="act ghost" id="clear">Clear</button>
        ${refs}
      </div>
      <div class="card">
        <strong>Response</strong>
        <div class="out" id="out"><div class="note">Awaiting execution.</div></div>
      </div>
    </div>`;
  $('#run').onclick = ()=>execute(m);
  $('#clear').onclick = ()=>{ $('#out').innerHTML = '<div class="note">Cleared.</div>'; };
}

function renderField(f){
  const id = `f_${f.k}`;
  if(f.type==='select'){
    const opts = f.opts.map(o=>`<option value="${o}" ${String(o)===String(f.def)?'selected':''}>${String(o)}</option>`).join('');
    return `<label for="${id}">${f.label}</label><select id="${id}">${opts}</select>`;
  }
  if(f.type==='textarea'){
    return `<label for="${id}">${f.label}</label><textarea id="${id}">${f.def||''}</textarea>`;
  }
  const step = f.step?`step="${f.step}"`:'';
  return `<label for="${id}">${f.label}</label><input id="${id}" type="${f.type}" value="${f.def??''}" ${step}/>`;
}

function readForm(m){
  const body = {}; const qs = {};
  for(const f of m.fields){
    const el = $(`#f_${f.k}`); if(!el) continue;
    let v = el.value;
    if(f.type==='number') v = v===''?null:Number(v);
    else if(f.type==='textarea'){ try{ v = JSON.parse(v); }catch(e){ /* leave string */ } }
    else if(f.type==='select' && (v==='true'||v==='false')) v = (v==='true');
    if(f.querystring) qs[f.k] = v; else body[f.k] = v;
  }
  return {body, qs};
}

async function execute(m){
  const {body, qs} = readForm(m);
  let url = m.endpoint;
  const qstr = new URLSearchParams(qs).toString();
  if(qstr){ url += (url.includes('?')?'&':'?') + qstr; }
  const out = $('#out'); out.innerHTML = '<div class="note">Running request...</div>';
  try{
    const opts = {method: m.method, headers:{'Content-Type':'application/json'}};
    if(m.method!=='GET') opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    if(m.binary){
      const blob = await r.blob();
      const a = document.createElement('a');
      const dl = URL.createObjectURL(blob);
      a.href = dl; a.download = (r.headers.get('Content-Disposition')||'').match(/filename=([^;]+)/)?.[1] || 'eims_report.pdf';
      a.click(); URL.revokeObjectURL(dl);
      out.innerHTML = `<div class="stat"><span class="chip ${r.ok?'ok':'bad'}">${r.ok?'Download complete':'Download failed'}</span></div>
        <div class="note">${r.ok ? 'Your download should start automatically.' : 'The download did not complete.'} File: ${proEscape(a.download)}.</div>`;
      return;
    }
    const text = await r.text();
    let payload = text;
    try{ payload = JSON.parse(text); }catch(e){}
    out.innerHTML = renderResponse(r.status, r.statusText, payload, {endpoint: m.endpoint, title: m.title});
  }catch(err){
    out.innerHTML = renderError(err);
  }
}

function proEscape(v){
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toLabel(key){
  return String(key).replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
}

function isPlainObject(v){
  return v && typeof v === 'object' && !Array.isArray(v);
}

function formatValue(v){
  if (v === null || v === undefined) return 'n/a';
  if (typeof v === 'number') return Number.isFinite(v) ? v.toLocaleString() : String(v);
  if (typeof v === 'boolean') return v ? 'Yes' : 'No';
  return String(v);
}

function renderArray(arr){
  if (!arr.length) return '<div class="note">No records returned.</div>';
  if (arr.every(v => !isPlainObject(v))){
    return `<div>${arr.slice(0, 40).map(v => `<span class="chip">${proEscape(formatValue(v))}</span>`).join(' ')}</div>`;
  }
  const keys = [...new Set(arr.slice(0, 12).flatMap(o => Object.keys(o || {})))].slice(0, 8);
  const head = keys.map(k => `<th>${proEscape(toLabel(k))}</th>`).join('');
  const rows = arr.slice(0, 24).map(row => `<tr>${keys.map(k => `<td>${proEscape(formatValue(row?.[k]))}</td>`).join('')}</tr>`).join('');
  return `<div class="tblwrap"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function endpointProfile(endpoint){
  const p = [
    {test:'/api/mep/clash-detect', title:'MEP Coordination Summary', metrics:['coordination_score','clash_count']},
    {test:'/api/mep/clash/clearance-rules', title:'MEP Clearance Rules', metrics:[]},
    {test:'/api/highrise/p-delta', title:'P-Delta Stability Review', metrics:['amplification_factor','stability_index_theta','second_order_ratio']},
    {test:'/api/highrise/modal-rsa', title:'Modal Response Summary', metrics:['period_fundamental_s','cumulative_modal_mass_pct']},
    {test:'/api/highrise/wind/gust-flexible', title:'Dynamic Wind Response', metrics:['gust_effect_factor_Gf','peak_deflection_m','peak_accel_mps2']},
    {test:'/api/highrise/wind/vortex', title:'Vortex Shedding Check', metrics:['critical_speed_mps','service_speed_mps']},
    {test:'/api/highrise/comfort', title:'Occupant Comfort Assessment', metrics:['peak_accel_milli_g','limit_milli_g']},
    {test:'/api/healthcare/audit', title:'Healthcare Compliance Audit', metrics:['compliance_score','total_fail','total_warn']},
    {test:'/api/healthcare/standards', title:'Healthcare Standards Register', metrics:[]},
    {test:'/api/collab/lock/acquire', title:'Lock Acquisition Status', metrics:['ttl_s','expires_in_s']},
    {test:'/api/collab/lock/renew', title:'Lock Renewal Status', metrics:['expires_in_s']},
    {test:'/api/collab/lock/release', title:'Lock Release Status', metrics:['released']},
    {test:'/api/collab/lock/status', title:'Current Lock Status', metrics:['locked','expires_in_s']},
    {test:'/api/collab/presence/heartbeat', title:'Presence Heartbeat', metrics:[]},
    {test:'/api/collab/presence', title:'Active Team Presence', metrics:['count']},
    {test:'/api/collab/changes/record', title:'Change Recording Status', metrics:['change_id']},
    {test:'/api/collab/changes/poll', title:'Change Feed Snapshot', metrics:['last_id','timed_out']},
  ];
  return p.find(x => endpoint === x.test) || {title:'Result', metrics:[]};
}

function renderObject(obj, profile){
  const entries = Object.entries(obj || {});
  if (!entries.length) return '<div class="note">No data returned.</div>';
  const preferred = profile?.metrics?.length ? profile.metrics : [];
  const scalarEntries = entries.filter(([,v]) => ['string','number','boolean'].includes(typeof v) || v == null);
  const picked = preferred.length
    ? preferred.map(k => [k, obj?.[k]]).filter(([,v]) => v !== undefined)
    : scalarEntries.slice(0, 8);
  const extra = scalarEntries.filter(([k]) => !picked.some(([pk]) => pk===k)).slice(0, Math.max(0, 8 - picked.length));
  const metrics = [...picked, ...extra]
    .map(([k,v]) => `<div class="metric"><b>${proEscape(toLabel(k))}</b><span>${proEscape(formatValue(v))}</span></div>`)
    .join('');
  const nested = entries.filter(([,v]) => typeof v === 'object' && v !== null).slice(0, 8).map(([k,v])=>{
    const sectionTitle = `<div style="margin:10px 0 6px;color:#a8b8d8;font-weight:600">${proEscape(toLabel(k))}</div>`;
    if (Array.isArray(v)) return sectionTitle + renderArray(v);
    const rows = Object.entries(v).slice(0, 20).map(([ik,iv]) => `<tr><th>${proEscape(toLabel(ik))}</th><td>${proEscape(formatValue(iv))}</td></tr>`).join('');
    return sectionTitle + `<div class="tblwrap"><table><tbody>${rows}</tbody></table></div>`;
  }).join('');
  return (metrics ? `<div>${metrics}</div>` : '') + nested;
}

function renderResponse(status, statusText, payload, moduleInfo){
  const ok = status >= 200 && status < 300;
  const profile = endpointProfile(moduleInfo?.endpoint || '');
  const title = profile.title || moduleInfo?.title || 'Result';
  const head = `<div class="stat"><span class="chip ${ok?'ok':'bad'}">${ok ? 'Completed' : 'Could not complete'}</span><span class="chip">${proEscape(title)}</span></div>`;
  if (Array.isArray(payload)) return head + renderArray(payload);
  if (isPlainObject(payload)) return head + renderObject(payload, profile);
  return head + `<div class="note">${proEscape(formatValue(payload))}</div>`;
}

function renderError(err){
  return `<div class="stat"><span class="chip bad">Network error</span></div><div class="note">${proEscape(err?.message || err || 'Unknown error')}</div>`;
}

// Connection status only — no version/uptime or internal identifiers for end users
async function ping(){
  try{
    const r = await fetch('/api/health');
    if (!r.ok) throw new Error('bad status');
    $('#health').innerHTML = `<span class="ok">●</span> Ready`;
  }catch(e){
    $('#health').innerHTML = `<span class="bad">●</span> Unavailable`;
  }
}

buildNav();
// Honor #moduleId deep-links from the wizard (e.g. /console#hr_pdelta).
const _hash = (window.location.hash || '').replace(/^#/, '');
const _initial = _hash && MODULES.find(m=>m.id===_hash) ? _hash : MODULES[0].id;
show(_initial);
window.addEventListener('hashchange', ()=>{
  const id = (window.location.hash || '').replace(/^#/, '');
  if (id && MODULES.find(m=>m.id===id)) show(id);
});
ping();
setInterval(ping, 30000);
